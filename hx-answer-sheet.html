<h1>&#128196; History Taking &mdash; Answer Sheet (Flashcards)</h1>
<div class="sub">Flip a card to reveal the answer. Shuffle, filter by section, and drill the whole deck.</div>

<script>
var DATA=[
// ===== From the cram sheet (topic -> answer) =====
{sec:"Interview & Communication",q:"What are the 3 main functions of the medical interview (Cole & Bird), and what does each mean?",a:"(1) Build the relationship — develop rapport, mutual respect, trust, and convey empathy/compassion. (2) Assess and understand — questioning and data gathering. (3) Collaborate for management — patient education. Osler: 'Listen to your patient, they might be telling you their diagnosis' — 80-90% of the diagnosis comes from the history."},
{sec:"Interview & Communication",q:"Define empathy, compassion, and sympathy — and what non-verbal behavior builds rapport most?",a:"Empathy = ability to understand and share another's feelings (put yourself in their shoes). Compassion = sympathetic consciousness of others' distress + desire to alleviate it. Sympathy = sharing another's feelings; pity/sorrow for their hardships. Quiet, attentive listening conveys interest and builds rapport more powerfully than virtually any other action or utterance."},
{sec:"SOAP & Documentation",q:"What are the 4 sections of a SOAP note, and what goes in each?",a:"Subjective = the History (HPI): chief complaint, HPI, patient's perception and how it evolved; also past medical, social, sexual history. Objective = values, Physical Exam, and data (vitals, appearance, PE, labs). Assessment = diagnoses and differential diagnoses. Plan = the action plan."},
{sec:"History Components",q:"What are the components of the history, and who is the 'historian'?",a:"Under Subjective: Chief Complaint, HPI, Past Medical History, Family History, Social/Lifestyle/Sexual, and Review of Systems (documentation should 'paint a picture'). The 'historian' is the person providing the history — a patient historian should be alert, competent, with intact memory; a non-patient historian (parent, caretaker, translator) should be informed, trustworthy, and reliable."},
{sec:"History Components",q:"What is the Chief Complaint (CC) and how should it be documented?",a:"The patient's response to 'What brings you in today?' Even if it's on the intake form, confirm the problem and ask the patient to reiterate it for accuracy; when possible, directly quote the patient's own words. If a caregiver provides it, document the source (e.g., 'Caregiver (Niece, Doris Jones) reports...')."},
{sec:"History Components",q:"Define the HPI and spell out LOPQRST.",a:"HPI = 'a complete, clear, chronologic description of the problem(s) prompting the patient's visit.' LOPQRST = L Location, O Onset, P Prior/Palliative/Provocative/Progression, Q Quality of pain, R Radiation, S Severity, T Timing. Expanded: LOPPPPQRST."},
{sec:"History Components",q:"What is a patient 'narrative,' and what is Bates' basic HPI template?",a:"A narrative is the history written in paragraph form (not bullet points), logically composed and coherent; abbreviations may be used. Bates' template: opening statement (CC in clinical context), elaborate description of the CC, accompanying symptomatology, absent pertinent symptomatology, pertinent PMH/FH/social history, and a concluding statement of how the patient got to the care site."},
{sec:"History Components",q:"List the PMH components and spell out FAOMASH.",a:"PMH: chronic conditions, allergies, hospitalizations, trauma, medications, FHx, SHx (surgical), SoHx (social), sexual history, and ROS. FAOMASH = F Family history, A Allergies, O Other illness (chronic conditions / other doctors), M Medications, A Accidents, S Surgeries, H Hospitalizations."},
{sec:"History Components",q:"What are the key points for family history, allergies, and medications?",a:"Family history: immediate family's age/health (grandparents if known; cause of death if deceased) — focus on diabetes, heart disease, strokes, cancer, arthritis. Allergies: confirm for each patient at each visit and before prescribing; ask the type of reaction. Medications: what is taken, why, dosage (amount and frequency), and how long."},
{sec:"History Components",q:"What do you ask about accidents, surgeries, and hospitalizations?",a:"Accidents: when, how, the injuries, whether care was given, healed or ongoing. Surgeries: which procedure, when, reason, results, complications. Hospitalizations: when, why (reason/discharge dx), duration, treatment, residual problems. Hospitalizations and surgeries are NOT synonymous — you cannot ask one to cover both."},
{sec:"ROS",q:"What is the purpose of the Review of Systems (ROS)?",a:"A discussion of the body organ systems that may uncover problems not already mentioned, or pertinent negatives that support your diagnosis / streamline differentials. Patients often leave out facts not realizing the connection; the ROS reveals presence or absence of common symptoms head to toe."},
{sec:"ROS",q:"What question format and timing are acceptable for the ROS?",a:"It is acceptable to use closed-ended 'yes/no' questions. Questions vary by age, complaints, and general health using clinical judgement. ROS questions can be asked during the physical exam of that body area (e.g., GI questions during the abdominal exam). You may uncover events to add to the HPI or PMH."},
{sec:"ROS",q:"Which systems does the ROS address?",a:"Constitutional/General, Skin, HEENT (Head, Eyes, Ears, Nose/Sinuses, Mouth/Throat, Neck), Cardiovascular, Respiratory, Gastrointestinal, Genitourinary, Musculoskeletal, Neurologic, Psychiatric, Endocrine, and Hematologic/Lymphatic. Work in an organized fashion, generally top down."},
{sec:"ROS",q:"What does ABCDE stand for in the skin ROS?",a:"For skin lesions/moles: Asymmetry, Borders, Color, Diameter, Evolving (is the lesion changing?). Skin screening also covers rashes, lumps, sores, itching, dryness, color change (cyanosis, rubor, jaundice), and hair/nail changes (cracking, spooning, clubbing)."},
{sec:"ROS",q:"What is the Assessment, and what are Bates' steps for identifying problems?",a:"Assessment is where you analyze the data and move from description/observation to analysis and interpretation. Bates' steps: identify abnormal findings, localize them anatomically, cluster the clinical findings, search for the probable cause, generate hypotheses, then test them to establish a working diagnosis."},
{sec:"Interview & Communication",q:"What are the 3 therapeutic qualities (Carl Rogers)?",a:"Respect, Genuineness, and Empathy — observed in practitioners with good clinical outcomes. Respect = accept the patient as they are, don't judge, separate personal feelings. Genuineness = be yourself and acknowledge your position as a student / lack of knowledge (e.g., referring out)."},
{sec:"Interview & Communication",q:"How is empathy defined and contrasted with sympathy?",a:"Empathy is the ability to understand and share the feelings of another — putting yourself in the other person's shoes — contrasted with sympathy. Brene Brown: 'Rarely does a response make something better. What makes something better is a connection.'"},
{sec:"Interview & Communication",q:"What are the 4 qualities of empathy?",a:"Perspective Taking (validate their experience; their perspective is their truth), Staying out of Judgement, Recognizing the emotion in the other person, and Communicating the emotion back ('I hear you; I see you; I get it')."},
{sec:"Interview & Communication",q:"What evidence shows empathy improves outcomes?",a:"Patients who received emotional support/education after surgery or MI had fewer complications and were discharged about 2 days earlier. More empathetic/sympathetic practitioners have more satisfied patients (who are more likely to comply), and an 8-hour communication training program improved care without lengthening visits."},
{sec:"Interview & Communication",q:"What are Coulehan's levels of empathic response?",a:"Positive: Interchangeable (accurately recognize the feelings/symptoms the patient expresses) and Additive (recognize both what the patient expresses AND what they feel but don't express). Negative: Ignoring (not responding to cognitive/emotional content) and Minimizing (responding at a lesser level than the patient's expressed concern)."},
{sec:"Interview & Communication",q:"What is the 'delicate balance,' and how many diagnoses come from history alone?",a:"As many as three quarters of all diagnoses can be made by history alone. The delicate balance is Efficiency, Empathy, and Efficacy: gather enough information in a timely manner, validate the patient's experience, and arrive at a conclusion so the patient leaves satisfied."},
{sec:"Cultural Competence & Humility",q:"Define culture and intersectionality.",a:"Culture = the customary beliefs, social forms, and material traits of a racial, religious, or social group, plus shared attitudes, values, goals, and practices; affected by politics, class, gender, religion, age, and ethnicity. Intersectionality = how race, class, gender, and other characteristics intersect and overlap, creating unique sets of experiences."},
{sec:"Cultural Competence & Humility",q:"Contrast cultural competence and cultural humility (Bates).",a:"Cultural competence = a set of attitudes, skills, behaviors, and policies enabling staff to work effectively cross-culturally — being respectful/responsive to diverse populations' health beliefs, practices, and cultural/linguistic needs. Cultural humility = a process of continual self-reflection and self-critique as lifelong learners — 'the more you know about a culture, the more you realize you don't know.'"},
{sec:"Cultural Competence & Humility",q:"What does cultural humility require, and what is the problem with 'competence'?",a:"Humility requires respect, acknowledging differences and similarities, dynamic communication, and honest self-assessment; it commits to self-evaluation, fixing power imbalances, and developing partnerships/advocacy. The problem with 'competence' is it suggests culture can be reduced to a technical skill and yields lists of 'do's and don'ts' for treating patients of a given ethnic background."},
{sec:"Cultural Competence & Humility",q:"What is the Cross-Cultural Approach and the Golden Rule?",a:"A Cross-Cultural Approach uses communication skills, awareness of cross-cutting cultural and social issues, and recognizes health beliefs as universal human beliefs, needs, and traits. The Golden Rule: treat patients as we would want to be treated during periods of vulnerability and fear; patient centeredness = respect, sensitivity, composure, partnership, honesty, curiosity, and tolerance."},
{sec:"Sexual & Social",q:"Why take a sexual history, and from which patients?",a:"Take it from ALL patients, regardless of gender identity or sexual orientation — it is an important part of a routine exam. Sexual health is integral to general health (associated with happiness, well-being, longevity) and may indicate psychiatric or other medical disorders or the need for primary prevention (immunizations, contraception, PEP, PrEP)."},
{sec:"Sexual & Social",q:"How do sex, gender, orientation, and gender identity differ?",a:"Sex = biological differences (anatomy, chromosomes, hormones, genes). Gender = social and cultural distinctions (gender identity, expression, roles). Sexual orientation and gender identity are NOT the same; all people have both, and how people identify can change."},
{sec:"Sexual & Social",q:"How do you establish the relationship before a sexual history?",a:"Build rapport with effective listening and mirroring (names, pronouns, body parts), an individualized/holistic approach, and by asking permission — ask if it's ok to discuss a sexual history and be transparent about why. Start all appointments with clothes ON, and approach trauma experiences slowly and at a time when support can be offered."},
{sec:"Sexual & Social",q:"How do you use patient-centered language and an anatomic inventory?",a:"Take an anatomic inventory and establish shared words: 'When referring to your genitals, are there specific terms that you use?' Use open-ended questions to capture diverse behaviors, validate both high- and low-risk activities (and pleasures), and avoid assumptions about what kinds of sex someone has."},
{sec:"Sexual & Social",q:"What are the CDC 5 P's and the Fenway 8 P's?",a:"CDC 5 P's: Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy. Fenway 8 P's: Preferences, Partners, Practices, Protection for STIs, Past history of STIs, Pregnancy, Pleasure, and Partner Violence."},
{sec:"Sexual & Social",q:"What is the trauma-informed approach before an exam and when responding to disclosure?",a:"Before the exam: review prior experiences, explain the purpose, offer to talk through the steps, and remind 'You're in control here. If you want me to stop at any point, please let me know.' Responding to disclosure: communicate belief ('That must have been frightening'), validate the decision to disclose, emphasize violence is unacceptable, be clear it is not their fault, and make a safety plan / provide resources."},
{sec:"Sexual & Social",q:"Why ask everyone about sexual orientation, and what is the stat?",a:"Ask ALL people and make it policy — asking everyone normalizes the questions and decreases stigma. Nearly 80% of providers believed patients would refuse to disclose orientation, but only about 10% of patients said they would refuse. 'Find your Yucks and fix your face' — we can't eliminate bias by pretending not to have any."},
// ===== From the concept MC bank (stem -> correct answer + why) =====
{sec:"History Components",q:"In the LOPQRST mnemonic, what does the 'L' stand for?",a:"Location. (L = Location — ask where, and have the patient point to the area.)"},
{sec:"History Components",q:"The 'Q' in LOPQRST refers to which of the following?",a:"Quality of pain — describe the symptom (sharp/dull/achy/burning, throbbing/pounding/pulsating, etc.)."},
{sec:"History Components",q:"A patient says the pain 'travels down my leg from my low back.' Which LOPQRST component is this?",a:"Radiation — the symptom travels from its point of origin."},
{sec:"History Components",q:"Per the slides, pain that is 'severely restricting ADLs' would be classified as:",a:"Severe. (Mild = doesn't interfere with ADLs; Moderate = starting to interfere; Severe = severely restricting ADLs.)"},
{sec:"History Components",q:"Which is the correct order of the FAOMASH mnemonic?",a:"Family history, Allergies, Other illness, Medications, Accidents, Surgeries, Hospitalizations."},
{sec:"History Components",q:"In the FAOMASH mnemonic, the second 'A' stands for:",a:"Accidents. (The first A = Allergies; the second A = Accidents.)"},
{sec:"History Components",q:"Per the slides, hospitalizations and surgeries are:",a:"NOT synonymous — you cannot ask about one to cover both."},
{sec:"SOAP & Documentation",q:"Roughly what percentage of the diagnosis comes from the history (SOAP/HPI deck)?",a:"80-90% of the diagnosis comes from the history."},
{sec:"ROS",q:"The 'ABCDE' mnemonic in the Skin portion of the ROS refers to what?",a:"Asymmetry, Borders, Color, Diameter, Evolving."},
{sec:"ROS",q:"A patient needs extra pillows to sleep and is short of breath lying flat. Which ROS system?",a:"Cardiovascular — orthopnea (number of pillows) and PND are cardiovascular ROS items."},
{sec:"ROS",q:"Intermittent claudication and varicose veins are screened under which ROS heading?",a:"Peripheral Vascular — claudication, varicose veins, clots, and swelling."},
{sec:"Interview & Communication",q:"The three therapeutic qualities of the practitioner (Carl Rogers) are:",a:"Respect, Genuineness, and Empathy."},
{sec:"Interview & Communication",q:"In Coulehan's levels of response, which is a POSITIVE (helpful) response?",a:"Interchangeable. (Interchangeable and Additive are positive; Ignoring and Minimizing are negative.)"},
{sec:"Interview & Communication",q:"Roughly what proportion of diagnoses can be made by history alone?",a:"As many as three quarters."},
{sec:"Interview & Communication",q:"The 'delicate balance' the Communication deck describes is between which three elements?",a:"Efficiency, Empathy, and Efficacy."},
{sec:"Sexual & Social",q:"The CDC's '5 P's' of the sexual history are:",a:"Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy."},
{sec:"Sexual & Social",q:"Fenway expands the CDC's 5 P's into 8 P's by adding which additional P's?",a:"Preferences, Pleasure, and Partner Violence."},
{sec:"Sexual & Social",q:"In a trauma-informed exam, which phrase does the Fenway deck recommend?",a:"'You're in control here. If you want me to stop at any point, please let me know.'"},
{sec:"Sexual & Social",q:"When a patient discloses a history of violence, the clinician should:",a:"Communicate belief, emphasize that violence is unacceptable, and be clear the patient is not to blame."}
];
var SECTIONS=["Interview & Communication","Cultural Competence & Humility","SOAP & Documentation","History Components","ROS","Sexual & Social"];
DATA.forEach(function(d,i){d._i=i;});
var order=[],idx=0,showAnswer=false,filter="__all";
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffleArr(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function pool(){return filter==='__all'?DATA:DATA.filter(function(d){return d.sec===filter;});}
function buildSel(){
  var s=document.getElementById('secSel');
  var opt='<option value="__all">All sections ('+DATA.length+')</option>';
  SECTIONS.forEach(function(sec){
    var n=DATA.filter(function(d){return d.sec===sec;}).length;
    if(n)opt+='<option value="'+esc(sec)+'">'+esc(sec)+' ('+n+')</option>';
  });
  s.innerHTML=opt;
  s.onchange=function(){filter=s.value;buildOrder(false);};
}
function buildOrder(shuf){
  var p=pool().map(function(d){return d._i;});
  order=shuf?shuffleArr(p):p;
  idx=0;showAnswer=false;render();
}
function render(){
  if(!order.length)return;
  var d=DATA[order[idx]];
  (function(){var oi=order[idx];var host=document.getElementById('hint');var mr=document.getElementById('hxmedia');if(host&&!mr){mr=document.createElement('div');mr.id='hxmedia';mr.className='hx-mrow';host.parentNode.insertBefore(mr,host);}if(mr){mr.innerHTML='';var sb=document.createElement('button');sb.className='hx-mbtn';sb.innerHTML='\uD83C\uDFA7 Hear Q&A';sb.onclick=function(){hxSayQA(d.q,d.a,d.sec);};mr.appendChild(sb);var s=window.HX_SLD&&window.HX_SLD[oi];if(s){var ib=document.createElement('button');ib.className='hx-mbtn sld';ib.innerHTML='\uD83D\uDDBC\uFE0F Slide';ib.onclick=function(){hxSlide(s);};mr.appendChild(ib);}}})();
  document.getElementById('tag').textContent=d.sec;
  document.getElementById('prog').textContent='Card '+(idx+1)+' of '+order.length;
  document.getElementById('secLab').textContent=filter==='__all'?'All sections':filter;
  var side=document.getElementById('side');
  var face=document.getElementById('face');
  if(showAnswer){
    side.textContent='Answer';side.className='side a';
    face.className='a';face.innerHTML=esc(d.a);
    document.getElementById('hint').textContent='Next for a new card, or Prev to go back.';
  }else{
    side.textContent='Prompt';side.className='side';
    face.className='q';face.innerHTML=esc(d.q);
    document.getElementById('hint').textContent='Tap the card or press Flip to reveal the answer.';
  }
}
function flip(){showAnswer=!showAnswer;render();}
function next(){idx=(idx+1)%order.length;showAnswer=false;render();}
function prev(){idx=(idx-1+order.length)%order.length;showAnswer=false;render();}
document.getElementById('flipBtn').onclick=flip;
document.getElementById('nextBtn').onclick=next;
document.getElementById('prevBtn').onclick=prev;
document.getElementById('shuffleBtn').onclick=function(){buildOrder(true);};
document.getElementById('resetBtn').onclick=function(){buildOrder(false);};
document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
});
buildSel();buildOrder(false);
if(localStorage.getItem('dcDavidView')==='1'){var w=document.querySelector('.wm');if(w)w.style.display='none';}
</script>

<script id="hx-media-shared">
(function(){
 var vl=[],vA=null,vB=null,rate=1.0;
 function pickA(){return vl.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||vl.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||vl.find(function(v){return /google us english/i.test(v.name);})||vl.find(function(v){return /en[-_]US/i.test(v.lang);})||vl.find(function(v){return /^en/i.test(v.lang);})||vl[0]||null;}
 function pickB(){return vl.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||vl.find(function(v){return /microsoft.*(aria|jenny).*natural/i.test(v.name);})||vl.find(function(v){return /google uk english female/i.test(v.name);})||vA;}
 function load(){if(!window.speechSynthesis)return;vl=speechSynthesis.getVoices()||[];vA=pickA();vB=pickB();}
 if(window.speechSynthesis){load();speechSynthesis.onvoiceschanged=load;var t=0,iv=setInterval(function(){t++;load();if(vA||t>20)clearInterval(iv);},250);}
 window.hxRate=function(r){rate=r;Array.prototype.forEach.call(document.querySelectorAll(".hx-rate"),function(s){s.textContent=r.toFixed(2)+"x";});};
 window.hxStop=function(){if(window.speechSynthesis)speechSynthesis.cancel();};
 window.hxSay=function(text,label){if(!window.speechSynthesis){return;}speechSynthesis.cancel();
   var bar=document.getElementById("hxbar");if(bar)bar.style.display="flex";
   var lbl=document.getElementById("hxlabel");if(lbl)lbl.textContent="🎧 "+(label||"Read aloud");
   var u=new SpeechSynthesisUtterance(String(text).replace(/<[^>]+>/g," ").replace(/\s+/g," "));
   u.rate=rate;if(vA){u.voice=vA;u.lang=vA.lang||"en-US";}speechSynthesis.speak(u);};
 window.hxSayQA=function(q,a,label){if(!window.speechSynthesis)return;speechSynthesis.cancel();
   var bar=document.getElementById("hxbar");if(bar)bar.style.display="flex";
   var lbl=document.getElementById("hxlabel");if(lbl)lbl.textContent="🎧 "+(label||"Q & A");
   function strip(x){return String(x).replace(/<[^>]+>/g," ").replace(/\s+/g," ");}
   var uq=new SpeechSynthesisUtterance(strip(q));uq.rate=rate;if(vA){uq.voice=vA;uq.lang=vA.lang||"en-US";}
   var ua=new SpeechSynthesisUtterance(strip(a));ua.rate=rate;if(vB){ua.voice=vB;ua.lang=vB.lang||"en-US";}
   speechSynthesis.speak(uq);speechSynthesis.speak(ua);};
 window.hxGal=null;window.hxGi=0;
 window.hxSlide=function(fr){if(!fr)return;var arr=Array.isArray(fr)?fr:[fr];if(!arr.length)return;window.hxGal=arr;window.hxGi=0;
   document.getElementById("hxslideImg").src=arr[0];document.getElementById("hxslCount").textContent=arr.length>1?("1 / "+arr.length):"";
   document.getElementById("hxslNav").style.display=arr.length>1?"flex":"none";document.getElementById("hxslide").style.display="flex";};
 window.hxGalStep=function(d){if(!window.hxGal)return;window.hxGi=(window.hxGi+d+window.hxGal.length)%window.hxGal.length;
   document.getElementById("hxslideImg").src=window.hxGal[window.hxGi];document.getElementById("hxslCount").textContent=(window.hxGi+1)+" / "+window.hxGal.length;};
})();
</script>
<div id="hxbar">
 <span id="hxlabel" style="color:#7dd3fc;font-size:.8rem;font-weight:700;white-space:nowrap"></span>
 <button class="hb" onclick="hxRate(0.8)">0.8x</button><button class="hb" onclick="hxRate(1)">1x</button><button class="hb" onclick="hxRate(1.25)">1.25x</button><button class="hb" onclick="hxRate(1.5)">1.5x</button><button class="hb" onclick="hxRate(2)">2x</button>
 <span class="hx-rate" style="color:#bae6fd;font-size:.72rem;font-weight:700;min-width:42px;text-align:center">1.00x</span>
 <button class="hb" onclick="hxStop();document.getElementById('hxbar').style.display='none';">■ Stop</button>
</div>
<div id="hxslide" onclick="if(event.target===this)this.style.display='none'">
 <img id="hxslideImg" alt="slide">
 <div id="hxslNav" style="display:none;gap:16px;margin-top:12px;align-items:center">
  <button onclick="event.stopPropagation();hxGalStep(-1)" style="background:#132132;color:#bae6fd;border:1px solid #38bdf8;border-radius:8px;padding:8px 16px;cursor:pointer">&#8249;</button>
  <span id="hxslCount" style="color:#bae6fd;font-size:.85rem;font-weight:700"></span>
  <button onclick="event.stopPropagation();hxGalStep(1)" style="background:#132132;color:#bae6fd;border:1px solid #38bdf8;border-radius:8px;padding:8px 16px;cursor:pointer">&#8250;</button></div>
 <div style="position:fixed;top:12px;right:18px;color:#fff;font-size:26px;font-weight:800;pointer-events:none">&#215;</div>
</div>
