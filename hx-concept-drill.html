Quality of pain", "C. Questions asked", "D. Quickness of onset"], "answer": "B", "why": "Q = Quality of pain (describe the symptom: sharp/dull/achy/burning, etc.).", "src": "SOAP_Notes.pdf slide 'LOPQRST - Quality'"}, {"q": "In LOPQRST, which letter covers Prior, Palliative, Provocative, and Progression?", "choices": ["A. O", "B. P", "C. Q", "D. R"], "answer": "B", "why": "P = Prior, Palliative, Provocative, Progression (expanded as LOPPPPQRST).", "src": "SOAP_Notes.pdf slides 'LOPQRST' and 'Summary LOPPPPQRST'"}, {"q": "A patient states the pain 'travels down my leg from my low back.' Which LOPQRST component does this describe?", "choices": ["A. Severity", "B. Onset", "C. Radiation", "D. Quality"], "answer": "C", "why": "Radiation = does the symptom travel from the point of origin.", "src": "SOAP_Notes.pdf slide 'HPI - Radiation/Referral'"}, {"q": "The slides describe rating pain 0-10 at onset, current, best, and worst. Which LOPQRST component is this?", "choices": ["A. Timing", "B. Quality", "C. Onset", "D. Severity"], "answer": "D", "why": "Severity uses the 0-10 Numeric/Visual Analogue Scale.", "src": "SOAP_Notes.pdf slide 'HPI - Severity'"}, {"q": "Per the slides, pain that is 'severely restricting ADLs' would be classified as:", "choices": ["A. Mild", "B. Moderate", "C. Severe", "D. Referred"], "answer": "C", "why": "Severe = severely restricting ADLs (Mild = doesn't interfere; Moderate = starting to interfere).", "src": "SOAP_Notes.pdf slide 'HPI - Severity'"}, {"q": "'What makes the symptoms worse?' (position, movement, foods, modalities) is which LOPQRST element?", "choices": ["A. Palliative", "B. Provocative", "C. Progression", "D. Prior"], "answer": "B", "why": "Provocative = what makes the symptoms worse.", "src": "SOAP_Notes.pdf slide 'HPI - Provocative'"}, {"q": "Asking 'What have you tried that helped the symptoms?' addresses which LOPQRST element?", "choices": ["A. Provocative", "B. Progression", "C. Palliative", "D. Quality"], "answer": "C", "why": "Palliative = what have you tried to help the symptoms; what was most helpful.", "src": "SOAP_Notes.pdf slide 'HPI - Palliative'"}, {"q": "According to the slides, how is the HPI defined?", "choices": ["A. A list of the patient's medications", "B. A complete, clear, chronologic description of the problem(s) prompting the patient's visit", "C. The physical exam findings", "D. The differential diagnosis"], "answer": "B", "why": "The HPI is defined as a complete, clear, chronologic description of the problem(s) prompting the visit.", "src": "SOAP_Notes.pdf slide 'History of Present Illness (HPI)'"}, {"q": "The person providing the patient's history is referred to as the:", "choices": ["A. Informant", "B. Reporter", "C. Historian", "D. Narrator"], "answer": "C", "why": "The slides state the person providing the history is the 'historian.'", "src": "SOAP_Notes.pdf slide 'Chief Complaint'"}, {"q": "Even when the chief complaint is listed on the intake form, the clinician should:", "choices": ["A. Confirm the problem and ask the patient to reiterate it for accuracy", "B. Skip re-asking to save time", "C. Only document the form verbatim", "D. Refer to a specialist"], "answer": "A", "why": "The slide says confirm the problem; ask the patient to reiterate the complaint for accuracy.", "src": "SOAP_Notes.pdf slide 'Chief Complaint'"}, {"q": "Which is the correct order of the FAOMASH mnemonic as spelled out in the slides?", "choices": ["A. Family, Age, Onset, Meds, Allergies, Surgeries, History", "B. Family history, Allergies, Other illness, Medications, Accidents, Surgeries, Hospitalizations", "C. Fever, Allergies, Onset, Meds, Accidents, Surgery, HPI", "D. Family, Allergies, Onset, Meds, Age, Sex, Habits"], "answer": "B", "why": "FAOMASH = Family history, Allergies, Other illness, Medications, Accidents, Surgeries, Hospitalizations.", "src": "PastMedicalHistory.pdf slide 'FAOMASH'"}, {"q": "In the FAOMASH mnemonic, the second 'A' stands for:", "choices": ["A. Allergies", "B. Age", "C. Accidents", "D. Assessment"], "answer": "C", "why": "The first A = Allergies; the second A = Accidents.", "src": "PastMedicalHistory.pdf slide 'FAOMASH'"}, {"q": "Which of the following is NOT listed on the slides as a Past Medical History component?", "choices": ["A. Chronic conditions", "B. Allergies", "C. Hospitalizations", "D. Vital signs"], "answer": "D", "why": "PMH includes chronic conditions, allergies, hospitalizations, trauma, medications, FHx, SHx, SoHx, sexual history, ROS; vital signs are Objective.", "src": "PastMedicalHistory.pdf slide 'Past Medical History'"}, {"q": "According to the slides, what is the major focus of family history questions?", "choices": ["A. Only the patient's own past surgeries", "B. The family's insurance coverage", "C. Whether anyone in the family has diabetes, heart disease, strokes, cancer, arthritis, or other disease", "D. The patient's occupation"], "answer": "C", "why": "Major focus: does anyone in your family have a history of diabetes, heart disease, strokes, cancer, arthritis, or any other condition.", "src": "PastMedicalHistory.pdf slide 'Family History'"}, {"q": "Per the slides, hospitalizations and surgeries are:", "choices": ["A. Synonymous, so one question covers both", "B. Not synonymous; you cannot ask about one to cover both", "C. Only relevant for pediatric patients", "D. Part of the Objective section"], "answer": "B", "why": "The slide explicitly states hospitalizations and surgeries are not synonymous; you cannot ask one to cover both.", "src": "PastMedicalHistory.pdf slide 'Hospitalizations'"}, {"q": "According to the slides, allergy status should be confirmed:", "choices": ["A. Only at the first visit", "B. Only if the patient mentions an allergy", "C. Once per year", "D. For each patient at each visit, and for certain before prescribing any medication"], "answer": "D", "why": "Allergy status should be confirmed for each patient at each visit, and certainly before prescribing medication.", "src": "PastMedicalHistory.pdf slide 'Allergies'"}, {"q": "What are the 3 main functions of the medical interview per the slides (Cole & Bird)?", "choices": ["A. Diagnose, treat, bill", "B. Build the relationship; assess and understand; collaborate for management", "C. Observe, palpate, auscultate", "D. Subjective, objective, plan"], "answer": "B", "why": "The 3 functions are: build the relationship, assess and understand, and collaborate for management.", "src": "HxTaking_Intro.pdf slide '3 Main Functions of the medical interview'"}, {"q": "Per the slides, which nonverbal behavior 'conveys interest and builds rapport more powerfully than virtually any other action'?", "choices": ["A. Quiet, attentive listening", "B. Rapid note-taking", "C. Standing over the patient", "D. Frequent interrupting"], "answer": "A", "why": "The slide states quiet, attentive listening builds rapport more powerfully than any other action or utterance.", "src": "HxTaking_Intro.pdf slide 'Non-verbal Communication'"}, {"q": "According to the slides, how is empathy defined?", "choices": ["A. Feeling pity for another's hardships", "B. The ability to understand and share the feelings of another; putting yourself in their shoes", "C. A desire to alleviate distress only", "D. Sharing insurance information"], "answer": "B", "why": "Empathy = ability to understand and share another's feelings; putting yourself in their shoes.", "src": "HxTaking_Intro.pdf slide 'Empathy/Compassion/Sympathy'"}, {"q": "Which definition matches 'compassion' per the slides?", "choices": ["A. Sharing another's interests or feelings", "B. Understanding and sharing another's feelings", "C. Sympathetic consciousness of others' distress together with a desire to alleviate it", "D. Feeling pity for another's hardships"], "answer": "C", "why": "Compassion is defined as 'sympathetic consciousness of others' distress together with a desire to alleviate it.'", "src": "HxTaking_Intro.pdf slide 'Empathy/Compassion/Sympathy'"}, {"q": "The SOAP/HPI deck states that roughly what percentage of the diagnosis comes from the history?", "choices": ["A. 20-30%", "B. 50%", "C. 80-90%", "D. 100%"], "answer": "C", "why": "The deck states 80-90% of the diagnosis comes from the history (Intro deck cites ~80%).", "src": "SOAP_Notes.pdf slide 'Remember...'"}, {"q": "For medications, which set of details does the slide say to obtain?", "choices": ["A. Only the drug name", "B. Only the prescribing doctor", "C. Only the pharmacy location", "D. What is taken, why, dosage (amount and frequency), and how long"], "answer": "D", "why": "Medications: what is taken, why it is used, dosage (amount and frequency), and how long.", "src": "PastMedicalHistory.pdf slide 'Medications'"}, {"q": "According to the slides, a patient 'narrative' is:", "choices": ["A. A bulleted problem list", "B. The patient's history written in paragraph form, logically composed and coherent", "C. The physical exam section", "D. The billing summary"], "answer": "B", "why": "A narrative is the patient's history written in paragraph form (not bullet points), logically composed and coherent.", "src": "SOAP_Notes.pdf slide 'Putting it all together'"}, {"q": "A patient reports back pain that has 'stayed the same' since it began. Which LOPQRST element does this answer?", "choices": ["A. Progression", "B. Palliative", "C. Severity", "D. Radiation"], "answer": "A", "why": "Progression asks whether, since it started, the problem has improved, worsened, or stayed the same.", "src": "SOAP_Notes.pdf slide 'HPI - Progression'"}, {"q": "What is the primary purpose of performing a Review of Systems (ROS)?", "choices": ["A. To uncover problems not already mentioned and reveal the presence or absence of common symptoms of major body systems", "B. To replace the physical examination", "C. To bill for additional services", "D. To confirm the patient's insurance status"], "answer": "A", "why": "The ROS reveals presence/absence of common symptoms and uncovers problems or pertinent negatives.", "src": "ReviewOfSystems.pdf - ROS Why ask"}, {"q": "Which question format does the ROS deck say is acceptable to use during the Review of Systems?", "choices": ["A. Only open-ended questions", "B. Closed-ended 'yes or no' questions", "C. Leading questions only", "D. Multiple-choice questions"], "answer": "B", "why": "The slide states it is acceptable to use closed-ended yes/no questions.", "src": "ReviewOfSystems.pdf - Format"}, {"q": "According to the deck, when may ROS questions be appropriately asked?", "choices": ["A. Only after the patient leaves", "B. Only before the chief complaint", "C. During the physical exam of that body area, e.g., GI questions during the abdominal exam", "D. Only by telephone"], "answer": "C", "why": "ROS questions can be asked during the physical exam of that body area.", "src": "ReviewOfSystems.pdf - Format"}, {"q": "The 'ABCDE' mnemonic taught in the Skin portion of the ROS refers to what?", "choices": ["A. Airway, Breathing, Circulation, Disability, Exposure", "B. Age, Baseline, Cause, Duration, Effect", "C. Assess, Bandage, Clean, Dress, Evaluate", "D. Asymmetry, Borders, Color, Diameter, Evolving"], "answer": "D", "why": "For moles/lesions: Asymmetry, Borders, Color, Diameter, Evolving.", "src": "ReviewOfSystems.pdf - Skin"}, {"q": "A patient reports needing extra pillows to sleep and shortness of breath when lying flat. In which ROS system are these screening findings addressed?", "choices": ["A. Cardiovascular", "B. Endocrine", "C. Skin", "D. Psychiatric"], "answer": "A", "why": "Orthopnea (number of pillows) and PND are cardiovascular ROS items.", "src": "ReviewOfSystems.pdf - Cardiovascular"}, {"q": "Which set of symptoms belongs to the Constitutional/General portion of the ROS?", "choices": ["A. Tinnitus and vertigo", "B. Unintentional weight change, weakness, fatigue, fever, and night sweats", "C. Dysuria and hematuria", "D. Varicose veins and leg cramps"], "answer": "B", "why": "General ROS covers weight change, weakness, fatigue, fever, night sweats, sleep changes.", "src": "ReviewOfSystems.pdf - General"}, {"q": "Intermittent claudication and varicose veins are screening items under which ROS heading?", "choices": ["A. Neurologic", "B. Gastrointestinal", "C. Peripheral Vascular", "D. Hematologic"], "answer": "C", "why": "The Peripheral Vascular slide asks about claudication, varicose veins, clots, and swelling.", "src": "ReviewOfSystems.pdf - Peripheral Vascular"}, {"q": "According to the Assessment portion, what are the first steps in Bates' process for identifying problems?", "choices": ["A. Order every possible lab test", "B. Prescribe treatment immediately", "C. Refer the patient out", "D. Identify abnormal findings and localize them anatomically"], "answer": "D", "why": "Bates' steps begin with identifying abnormal findings and localizing anatomically.", "src": "ReviewOfSystems.pdf - Steps for Identifying Problems"}, {"q": "The three therapeutic qualities of the practitioner, borrowed from Carl Rogers, are:", "choices": ["A. Respect, Genuineness, and Empathy", "B. Speed, accuracy, and documentation", "C. Authority, distance, and objectivity", "D. Sympathy, pity, and reassurance"], "answer": "A", "why": "Carl Rogers' qualities: Respect, Genuineness, Empathy.", "src": "Communication_Empathy.pdf - Therapeutic Qualities"}, {"q": "How does the deck define empathy?", "choices": ["A. Feeling sorry for the patient", "B. The ability to understand and share the feelings of another - putting yourself in their shoes", "C. Agreeing with everything the patient says", "D. Remaining emotionally detached"], "answer": "B", "why": "Empathy is defined as understanding and sharing another's feelings.", "src": "Communication_Empathy.pdf - What is Empathy"}, {"q": "Which is one of the four qualities of empathy taught in the deck?", "choices": ["A. Correcting the patient's beliefs", "B. Offering advice quickly", "C. Perspective taking - understanding that someone's perspective is their truth", "D. Minimizing the patient's concern"], "answer": "C", "why": "Perspective taking (their perspective is their truth) is one of the 4 qualities.", "src": "Communication_Empathy.pdf - 4 Qualities of Empathy"}, {"q": "In Coulehan's levels of response, which is a POSITIVE (helpful) response?", "choices": ["A. Ignoring", "B. Minimizing", "C. Dismissing", "D. Interchangeable"], "answer": "D", "why": "Interchangeable and Additive are positive; Ignoring and Minimizing are negative.", "src": "Communication_Empathy.pdf - Levels of Response"}, {"q": "A clinician who responds to a patient's feelings at a lesser level than the patient's expressed concern is demonstrating which response level?", "choices": ["A. Minimizing", "B. Additive", "C. Interchangeable", "D. Perspective taking"], "answer": "A", "why": "Minimizing = responding at a lesser level than the patient's expressed concern.", "src": "Communication_Empathy.pdf - Levels of Response"}, {"q": "According to the deck, roughly what proportion of diagnoses can be made by history alone?", "choices": ["A. About one quarter", "B. As many as three quarters", "C. About one tenth", "D. Nearly all"], "answer": "B", "why": "Studies confirm as many as three quarters of diagnoses can be made by history alone.", "src": "Communication_Empathy.pdf - What about efficiency"}, {"q": "The 'delicate balance' the Communication deck describes is between which three elements?", "choices": ["A. Speed, cost, and volume", "B. Authority, distance, and control", "C. Efficiency, Empathy, and Efficacy", "D. Diagnosis, treatment, and billing"], "answer": "C", "why": "The delicate balance is Efficiency, Empathy, and Efficacy.", "src": "Communication_Empathy.pdf - A Delicate Balance"}, {"q": "How does the deck define intersectionality?", "choices": ["A. The point where two hospital hallways meet", "B. A billing code category", "C. A type of physical exam maneuver", "D. How race, class, gender, and other characteristics intersect and overlap to create unique experiences"], "answer": "D", "why": "Intersectionality: overlapping identities create unique sets of experiences.", "src": "CulturalCompetence_Humility.pdf - Intersectionality"}, {"q": "Per Bates as cited in the deck, cultural humility is best described as:", "choices": ["A. A process requiring ongoing self-reflection and self-critique as lifelong learners", "B. A checklist of do's and don'ts for each ethnic group", "C. A one-time training certificate", "D. Memorizing facts about every culture"], "answer": "A", "why": "Bates: humility is a process of continual self-reflection and self-critique.", "src": "CulturalCompetence_Humility.pdf - Competence vs Humility"}, {"q": "What does the deck identify as 'the problem with cultural competence'?", "choices": ["A. It takes too long to teach", "B. It suggests culture can be reduced to a technical skill and produces lists of 'do's and don'ts'", "C. It is illegal", "D. It only applies to physicians"], "answer": "B", "why": "Competence implies culture is a technical skill and yields do/don't lists.", "src": "CulturalCompetence_Humility.pdf - The Problem with Cultural Competence"}, {"q": "Which statement reflects the spirit of cultural humility as the deck frames it?", "choices": ["A. 'Once trained, you are an expert in a culture'", "B. 'Treat all patients identically regardless of background'", "C. 'The more you know about a particular culture, the more you realize you don't know'", "D. 'Cultural concepts equal race'"], "answer": "C", "why": "Humility slide: the more you know, the more you realize you don't know.", "src": "CulturalCompetence_Humility.pdf - Competence vs Humility"}, {"q": "The 'Golden Rule' the Cultural deck closes with states that patient-centeredness is built on:", "choices": ["A. Speed and efficiency alone", "B. Authority and expertise", "C. Documentation and billing accuracy", "D. Respect, sensitivity, composure, partnership, honesty, curiosity, and tolerance"], "answer": "D", "why": "Patient centeredness = respect, sensitivity, composure, partnership, honesty, curiosity, tolerance.", "src": "CulturalCompetence_Humility.pdf - The Golden Rule"}, {"q": "According to the Fenway presentation, sexual health history should be taken from which patients?", "choices": ["A. ALL patients, regardless of gender identity or sexual orientation", "B. Only patients who appear to be LGBT", "C. Only patients over 40", "D. Only patients presenting with a genitourinary complaint"], "answer": "A", "why": "Sexual health history is important for ALL patients regardless of gender identity/orientation.", "src": "Fenway_SexualHx.pdf - Sexual History"}, {"q": "How does the Fenway deck distinguish sex from gender?", "choices": ["A. They are identical terms", "B. Sex refers to biological differences; gender refers to social and cultural distinctions", "C. Sex is chosen; gender is assigned", "D. Both are determined solely by chromosomes"], "answer": "B", "why": "Sex = biological differences; gender = social/cultural distinctions.", "src": "Fenway_SexualHx.pdf - Sex and Gender"}, {"q": "The CDC's '5 P's' of the sexual history, per the Fenway deck, are:", "choices": ["A. Preferences, Pleasure, Partners, Practices, and Protection", "B. Pain, Pregnancy, Partners, Protection, and Prevention", "C. Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy", "D. Partners, Pleasure, Pregnancy, Protection, and Partner violence"], "answer": "C", "why": "CDC 5 P's: Partners, Practices, Protection for STDs, Past history of STDs, Prevention of pregnancy.", "src": "Fenway_SexualHx.pdf - The 8 Ps"}, {"q": "Fenway expands the CDC's 5 P's into '8 P's' by adding which additional P's?", "choices": ["A. Pain, Prognosis, and Prescription", "B. Payment, Privacy, and Policy", "C. Position, Procedure, and Prevention", "D. Preferences, Pleasure, and Partner Violence"], "answer": "D", "why": "The 8 P's add Preferences, Pleasure, and Partner Violence.", "src": "Fenway_SexualHx.pdf - The 8 Ps"}, {"q": "Before beginning a sexual history, the Fenway deck recommends the clinician:", "choices": ["A. Ask if it is ok to discuss a sexual history and be transparent about why you are asking", "B. Assume the patient's orientation from their appearance", "C. Have the patient undress first", "D. Skip the topic unless the patient raises it"], "answer": "A", "why": "Ask permission and explain why; start appointments with clothes on.", "src": "Fenway_SexualHx.pdf - Establishing a Relationship"}, {"q": "Which is an example of taking an 'anatomic inventory' with patient-centered language?", "choices": ["A. 'You look like you've had surgery'", "B. 'When referring to your genitals, are there specific terms that you use?'", "C. 'I'll use whatever terms I prefer'", "D. 'We don't need to discuss body parts'"], "answer": "B", "why": "Establish shared terms: ask what words the patient uses for their genitals.", "src": "Fenway_SexualHx.pdf - Talking About Sex"}, {"q": "Why does the Fenway deck recommend asking sexual orientation/gender questions of EVERYONE?", "choices": ["A. To fill a quota", "B. Because insurance requires it", "C. Asking everyone normalizes the questions and reduces stigma and assumptions", "D. To identify who to refer out"], "answer": "C", "why": "Ask all people and make it policy - it normalizes questions and decreases stigma.", "src": "Fenway_SexualHx.pdf - Collecting Data / Just Ask"}, {"q": "In a trauma-informed exam, which phrase does the Fenway deck recommend?", "choices": ["A. 'Don't be scared, everything will be fine'", "B. 'Hold still and relax your hands'", "C. 'Scoot down until your bottom touches my hand'", "D. 'You're in control here. If you want me to stop at any point, please let me know.'"], "answer": "D", "why": "Trauma-informed: emphasize patient control and the ability to stop.", "src": "Fenway_SexualHx.pdf - Before the Exam"}, {"q": "When a patient discloses a history of violence, the Fenway trauma-informed approach advises the clinician to:", "choices": ["A. Communicate belief, emphasize that violence is unacceptable, and be clear the patient is not to blame", "B. Bombard the patient with detailed questions", "C. Tell the patient it was partly their responsibility", "D. Change the subject immediately"], "answer": "A", "why": "Responding to disclosure: believe, validate, state violence is unacceptable, not their fault.", "src": "Fenway_SexualHx.pdf - Trauma-Informed Approach"}];

function pick(btn,letter,m){
  if(answered)return;answered=true;score.total++;
  var right=letter===(m.answer||'').trim().charAt(0);
  if(right)score.right++;else missed.push(m);
  [].forEach.call(document.querySelectorAll('#qchoices .choice'),function(c){
    var cl=(c.textContent.trim().match(/^([A-D])/)||[])[1];
    if(cl===(m.answer||'').trim().charAt(0))c.classList.add('correct');
    else if(c===btn)c.classList.add('wrong');else c.classList.add('dim');
    var rr=window.RAT&&RAT[m._i];if(rr){var ri=cl?cl.charCodeAt(0)-65:-1;if(ri>=0&&ri<rr.length){var d=document.createElement('div');d.className='crat';d.textContent=rr[ri];c.appendChild(d);}}
  });
  var ex=document.getElementById('explain');
  ex.innerHTML=(right?'&#9989; ':'&#10060; ')+esc(m.why||'')+(m.src?('<span class="src">Source: '+esc(m.src)+'</span>'):'');
  ex.className='explain show';
  document.getElementById('scoreLab').textContent='Score '+score.right+'/'+score.total;
  document.getElementById('nextBtn').style.display='inline-block';
}
function next(){idx++;render();}
function done(){
  var pct=score.total?Math.round(100*score.right/score.total):0;
  var cls=pct>=85?'good':(pct>=70?'mid':'low');
  var h='<div class="done"><div class="pct '+cls+'">'+pct+'%</div><div style="color:#9fb0cc;margin:4px 0 8px">'+score.right+' of '+score.total+' correct</div>';
  if(missed.length){h+='<button class="btn" onclick="retry()">&#8635; Retry '+missed.length+' missed</button><div class="missed">';

  else h+='<div style="color:#6ee7b7;margin-top:8px">Perfect &mdash; every one correct.</div>';
  h+='<button class="btn" onclick="start()" style="margin-top:10px">Start over</button></div>';
  document.getElementById('qcard').innerHTML=h;
}
function retry(){var ids=missed.map(function(m){return m._i;});document.getElementById('qcard').innerHTML=QCARD;order=shuffle(ids);idx=0;score={right:0,total:0};missed=[];render();}

<script>window.RAT=[["Vital signs are Objective data (values/data gathered), not part of the Subjective history section.", "Correct: Subjective is the History section containing the chief complaint and HPI.", "Physical exam findings are Objective (PE), not Subjective.", "Laboratory data is Objective (data gathered), not Subjective."], ["Subjective holds the patient's history (CC/HPI), not measured values.", "Correct: Objective = values, Physical Exam (PE), and data gathered.", "Assessment holds the diagnoses and differentials, not the raw exam data.", "Plan is the action plan, not the exam/lab data."], ["Subjective is the history section (CC/HPI), not the diagnoses.", "Objective is values/PE/data gathered, not the diagnoses.", "Correct: Assessment = diagnoses and differential diagnoses.", "Plan is the action plan, not the diagnoses themselves."], ["Subjective is the history section, not the action plan.", "Objective is values/PE/data, not the action plan.", "Assessment is diagnoses and differentials, not the action plan.", "Correct: Plan = the action plan."], ["Objective is measured values/PE/data, not the patient's own account.", "Correct: Subjective holds the patient's perception and description of how the problem has evolved.", "Assessment is the clinician's diagnoses, not the patient's description.", "Plan is the action plan, not the patient's description."], ["Correct: L = Location (ask where and have the patient point to the area).", "'Level' is not a LOPQRST term; intensity is captured by S (Severity).", "'Length' is not the L; duration falls under T (Timing).", "'Laterality' is not a LOPQRST letter; L stands for Location."], ["Medication questions fall under Palliative/Provocative, not Q.", "Correct: Q = Quality of pain (sharp/dull/achy/burning, etc.).", "'Questions asked' is not what Q denotes.", "Quickness/onset is O (Onset), not Q."], ["O = Onset, not the four P's.", "Correct: P = Prior, Palliative, Provocative, Progression.", "Q = Quality, not the P's.", "R = Radiation, not the P's."], ["Severity is the 0-10 intensity, not the symptom traveling.", "Onset is when it started, not where it travels.", "Correct: Radiation = the symptom travels from its point of origin.", "Quality describes what the pain feels like, not that it travels."], ["Timing addresses constant vs intermittent/frequency, not the 0-10 rating.", "Quality describes the symptom's character, not a 0-10 rating.", "Onset is when it began, not its rated intensity.", "Correct: Severity uses the 0-10 Numeric/Visual Analogue Scale (onset, current, best, worst)."], ["Mild means it doesn't interfere with ADLs.", "Moderate means it is starting to interfere with ADLs.", "Correct: Severe = severely restricting ADLs.", "'Referred' describes a symptom located away from its cause, not an ADL severity grade."], ["Palliative is what helps/relieves the symptoms, the opposite of what worsens them.", "Correct: Provocative = what makes the symptoms worse (position, movement, foods, modalities).", "Progression is whether it has improved/worsened/stayed the same, not what aggravates it.", "Prior is whether it has happened before, not what worsens it."], ["Provocative is what makes it worse, the opposite of what helps.", "Progression is the course over time, not what relieved it.", "Correct: Palliative = what you tried that helped and what was most helpful.", "Quality is the character of the symptom, not what relieved it."], ["A medication list is the meds portion of the PMH, not the HPI definition.", "Correct: the HPI is a complete, clear, chronologic description of the problem(s) prompting the visit.", "Physical exam findings are Objective, not the HPI.", "The differential diagnosis belongs to Assessment, not the HPI."], ["'Informant' is not the term the slides use.", "'Reporter' is not the slide term.", "Correct: the person providing the history is called the historian.", "'Narrator' is not the term; a narrative is the paragraph write-up, not the person."], ["Correct: confirm the problem and ask the patient to reiterate the complaint for accuracy.", "Skipping it is wrong; the slide says to confirm the problem even when it is on the form.", "Documenting the form verbatim skips the required confirmation with the patient.", "Referring to a specialist is unrelated to confirming the chief complaint."], ["Wrong expansions: FAOMASH has no 'Age' or 'Onset'.", "Correct: Family history, Allergies, Other illness, Medications, Accidents, Surgeries, Hospitalizations.", "Wrong: F is Family history, not Fever, and there is no Onset.", "Wrong: O is Other illness, not Onset."], ["Allergies is the FIRST A, not the second.", "'Age' is not part of FAOMASH.", "Correct: the second A = Accidents.", "Assessment is a SOAP section, not part of FAOMASH."], ["Chronic conditions are a listed PMH component.", "Allergies are a listed PMH component.", "Hospitalizations are a listed PMH component.", "Correct: vital signs are Objective, not a PMH component."], ["The patient's own past surgeries are surgical history, not family history.", "The family's insurance coverage is not part of history-taking content.", "Correct: the major focus is whether anyone in the family has diabetes, heart disease, strokes, cancer, arthritis, or other conditions.", "The patient's occupation belongs to social history, not family history."], ["Wrong: the slide states hospitalizations and surgeries are not synonymous.", "Correct: they are not synonymous, and you cannot ask one to cover both.", "Wrong: this applies to all patients, not just pediatric.", "Wrong: both are Subjective/PMH, not Objective."], ["Wrong: allergy status is confirmed at each visit, not only the first.", "Wrong: confirm for each patient regardless of whether they mention an allergy.", "Wrong: confirm at each visit, not once per year.", "Correct: confirm for each patient at each visit, and certainly before prescribing any medication."], ["'Diagnose, treat, bill' is not the 3-function model.", "Correct: build the relationship; assess and understand; collaborate for management (Cole & Bird).", "Observe/palpate/auscultate are physical-exam techniques, not interview functions.", "Subjective/objective/plan are SOAP sections, not the interview's 3 functions."], ["Correct: quiet, attentive listening builds rapport more powerfully than any other action.", "Rapid note-taking is not identified as the rapport-builder and can detract from attentive listening.", "Standing over the patient is not favored; leaning forward with open posture is.", "Frequent interrupting is the opposite of attentive listening."], ["Feeling pity for another's hardships is sympathy, not empathy.", "Correct: empathy is the ability to understand and share another's feelings, putting yourself in their shoes.", "A desire to alleviate distress is part of compassion, not the definition of empathy.", "Sharing insurance information is unrelated to empathy."], ["Merely sharing another's interests/feelings aligns with sympathy, not compassion.", "Understanding and sharing another's feelings is empathy, not compassion.", "Correct: compassion is sympathetic consciousness of others' distress together with a desire to alleviate it.", "Feeling pity for another's hardships is sympathy, not compassion."], ["Too low; the deck states 80-90% of the diagnosis comes from the history.", "Too low; the deck states 80-90%.", "Correct: 80-90% of the diagnosis comes from the history.", "Too high; the deck cites 80-90%, not 100%."], ["Only the drug name is incomplete; the slide also wants why, dosage, and duration.", "The prescribing doctor is not the required medication detail.", "The pharmacy location is not asked for medications.", "Correct: ask what is taken, why, dosage (amount and frequency), and how long."], ["A bulleted problem list is the opposite; a narrative is paragraph form, not bullets.", "Correct: a narrative is the patient's history in paragraph form, logically composed and coherent.", "The physical exam section is Objective, not the narrative.", "A billing summary is unrelated to the narrative."], ["Correct: Progression asks whether, since it started, the problem improved, worsened, or stayed the same.", "Palliative is what relieved it, not its course over time.", "Severity is the 0-10 intensity, not its course.", "Radiation is whether the symptom travels, not its course."], ["Correct: the ROS uncovers problems not already mentioned and reveals the presence or absence of common symptoms of major systems.", "Wrong: the ROS supplements, and does not replace, the physical examination.", "Billing for additional services is not the stated purpose of the ROS.", "Confirming insurance status is unrelated to the ROS."], ["Wrong: closed-ended yes/no questions are acceptable, so it is not open-ended only.", "Correct: it is acceptable to use closed-ended 'yes or no' questions in the ROS.", "Leading questions only is not the format the slide endorses.", "Multiple-choice is not the format the slide names."], ["Wrong: the ROS is done during the encounter, not after the patient leaves.", "Wrong: the ROS is not restricted to before the chief complaint.", "Correct: ROS questions can be asked during the physical exam of that body area (e.g., GI questions during the abdominal exam).", "Wrong: the slide does not limit ROS questions to telephone."], ["Airway/Breathing/Circulation/Disability/Exposure is emergency assessment, not the skin/mole ABCDE.", "'Age, Baseline, Cause, Duration, Effect' is not the mole mnemonic.", "'Assess, Bandage, Clean, Dress, Evaluate' is not the mnemonic.", "Correct: for moles/lesions, ABCDE = Asymmetry, Borders, Color, Diameter, Evolving."], ["Correct: orthopnea (number of pillows) and PND (shortness of breath lying flat) are cardiovascular ROS items.", "Endocrine covers heat/cold intolerance and weight/hair changes, not orthopnea.", "Skin covers rashes, moles, and lesions, not breathing when lying flat.", "Psychiatric covers mood, concentration, and sleep, not orthopnea."], ["Tinnitus and vertigo are HEENT (ears) items, not Constitutional/General.", "Correct: General/Constitutional covers unintentional weight change, weakness, fatigue, fever, and night sweats.", "Dysuria and hematuria are genitourinary (urinary) items.", "Varicose veins and leg cramps are peripheral vascular items."], ["Neurologic covers numbness, paresthesia, and seizures, not claudication/varicose veins.", "Gastrointestinal covers GI symptoms, not leg vascular findings.", "Correct: Peripheral Vascular covers intermittent claudication, varicose veins, clots, and swelling.", "Hematologic covers anemia, easy bruising, and clots as blood disorders, not claudication/varicose veins."], ["Ordering every possible lab test is not a step in Bates' process.", "Prescribing treatment immediately comes after a working diagnosis, not first.", "Referring the patient out is not the first step.", "Correct: the first steps are to identify abnormal findings and localize them anatomically."], ["Correct: Carl Rogers' therapeutic qualities are Respect, Genuineness, and Empathy.", "Speed, accuracy, and documentation are not Rogers' therapeutic qualities.", "Authority, distance, and objectivity are not the therapeutic qualities.", "Sympathy, pity, and reassurance are not Rogers' qualities (it is empathy, not sympathy)."], ["Feeling sorry for the patient is sympathy/pity, not empathy.", "Correct: empathy is the ability to understand and share another's feelings, putting yourself in their shoes.", "Agreeing with everything the patient says is not empathy.", "Remaining emotionally detached is the opposite of empathy."], ["Trying to correct the patient's beliefs is not one of the four qualities of empathy.", "Offering advice quickly is not one of the four qualities.", "Correct: perspective taking (someone's perspective is their truth) is one of the four qualities of empathy.", "Minimizing the patient's concern is a negative response level, not a quality of empathy."], ["Ignoring is a negative response level (no response to the content).", "Minimizing is a negative response level (responding at a lesser level).", "Dismissing is not a positive level; it aligns with ignoring/minimizing.", "Correct: Interchangeable is a positive level (along with Additive)."], ["Correct: Minimizing = responding at a lesser level than the patient's expressed concern.", "Additive is a positive level that recognizes even unexpressed feelings.", "Interchangeable is a positive level that accurately matches expressed feelings.", "Perspective taking is a quality of empathy, not a Coulehan response level."], ["Too low; the deck says as many as three quarters of diagnoses can be made by history alone.", "Correct: as many as three quarters of diagnoses can be made by history alone.", "Too low; the deck says as many as three quarters.", "Overstates it; the deck says as many as three quarters, not nearly all."], ["Speed, cost, and volume are not the three elements of the balance.", "Authority, distance, and control are not the balance.", "Correct: the delicate balance is Efficiency, Empathy, and Efficacy.", "Diagnosis, treatment, and billing are not the balance."], ["The meeting point of two hallways is a literal misread, not the concept.", "A billing code category is unrelated to intersectionality.", "A physical exam maneuver is unrelated to intersectionality.", "Correct: intersectionality is how race, class, gender, and other characteristics intersect and overlap to create unique experiences."], ["Correct: cultural humility is a process requiring ongoing self-reflection and self-critique as lifelong learners.", "A checklist of do's and don'ts per ethnic group is the problem with competence, not humility.", "A one-time training certificate is the opposite of a lifelong process.", "Memorizing facts about every culture is the opposite of humility."], ["Taking too long to teach is not the stated problem with competence.", "Correct: competence suggests culture can be reduced to a technical skill and produces lists of do's and don'ts.", "The deck does not say cultural competence is illegal.", "Applying only to physicians is not the stated problem."], ["'Once trained, you are an expert' is the opposite of humility.", "Treating all patients identically regardless of background is not the humility framing.", "Correct: the more you know about a culture, the more you realize you don't know.", "The deck explicitly states cultural concepts do NOT equal race."], ["Speed and efficiency alone are not the Golden Rule list.", "Authority and expertise are not the list.", "Documentation and billing accuracy are not the list.", "Correct: patient-centeredness is built on respect, sensitivity, composure, partnership, honesty, curiosity, and tolerance."], ["Correct: sexual health history is for ALL patients, regardless of gender identity or sexual orientation.", "Wrong: the deck says ask everyone and avoid appearance-based assumptions.", "Wrong: it is for all patients, not only those over 40.", "Wrong: it is a routine part of the exam for all, not only genitourinary complaints."], ["Wrong: sex and gender are distinct terms, not identical.", "Correct: sex refers to biological differences; gender refers to social and cultural distinctions.", "Wrong: this reverses/misstates the definitions.", "Wrong: only sex refers to biology; gender is social and cultural, not solely chromosomal."], ["Preferences and Pleasure are Fenway 8-P additions, not part of the CDC 5.", "Pain is not one of the CDC's P's.", "Correct: the CDC 5 P's are Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy.", "Pleasure and Partner Violence are 8-P additions, not part of the CDC 5."], ["Pain, Prognosis, and Prescription are not the added P's.", "Payment, Privacy, and Policy are not the added P's.", "Position, Procedure, and Prevention are not the added P's.", "Correct: the 8 P's add Preferences, Pleasure, and Partner Violence."], ["Correct: ask if it is ok to discuss a sexual history and be transparent about why you are asking.", "Wrong: the deck says to avoid assuming orientation from appearance.", "Wrong: start all appointments with clothes on, not undressed.", "Wrong: the deck says to ask all patients, not skip unless raised."], ["Assuming the patient had surgery is an assumption, not patient-centered language.", "Correct: ask what specific terms the patient uses for their genitals to establish shared language.", "Insisting on your own preferred terms ignores establishing shared language.", "Refusing to discuss body parts avoids the anatomic inventory entirely."], ["Filling a quota is not the reason the deck gives.", "Insurance requirements are not the reason.", "Correct: asking everyone normalizes the questions and reduces stigma and assumptions.", "Identifying who to refer out is not the reason."], ["'Don't be scared, everything will be fine' is a phrase the deck says to avoid.", "'Hold still and relax your hands' is a phrase the deck says to avoid.", "'Scoot down until your bottom touches my hand' is an example of language to avoid (unnecessary touching).", "Correct: emphasize the patient is in control and can ask you to stop at any point."], ["Correct: communicate belief, emphasize that violence is unacceptable, and be clear the patient is not to blame.", "Wrong: the deck says do not bombard the patient with questions.", "Wrong: be clear the patient is not to blame, not partly responsible.", "Wrong: changing the subject is the opposite of listening and validating."]];window.MC_SLIDE=["frames/hx/soap_005.jpg", "frames/hx/soap_002.jpg", "frames/hx/soap_005.jpg", "frames/hx/soap_005.jpg", "frames/hx/soap_005.jpg", "frames/hx/soap_019.jpg", "frames/hx/soap_026.jpg", "frames/hx/soap_019.jpg", "frames/hx/soap_027.jpg", "frames/hx/soap_028.jpg", "frames/hx/soap_028.jpg", "frames/hx/soap_025.jpg", "frames/hx/soap_024.jpg", "frames/hx/soap_002.jpg", "frames/hx/soap_002.jpg", "frames/hx/soap_002.jpg", "frames/hx/pmh_004.jpg", "frames/hx/
