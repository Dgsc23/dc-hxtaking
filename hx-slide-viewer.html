 As part of this work, we need to increase the number of nationally-representative health-related surveys that collect information on sexual orientation and gender identity (SOGI)”"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 12, "file": "frames/hx/sexual_012.jpg", "text": "fenwayhealth.org www.lgbthealtheducation.org STIGMA  Interpersonal Stigma: Discrimination or violence against LGBT people in the community, health care settings, etc  Structural Stigma: Includes the policies of institutions that intentionally or unintentionally restrict the opportunities of certain people  Intrapersonal Stigma: Internalized distress, humiliation, and/or self-hatred due to societal constraints/norms that one might not fit into ▪ Is it safe talking about my identity with a provider? ▪ Is it worth it to talk about these barriers to my health? ▪ Am I worth it to overcome all of these barriers to my health?  Behavioral health, sexual health, physical health going overlooked!"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 13, "file": "frames/hx/sexual_013.jpg", "text": "fenwayhealth.org INTERSECTIONALITY Intersectionality is the study of intersections between forms or systems of oppression, domination or discrimination. ▪The complexity of multiple identities overlapping and existing together (gender, race, socioeconomic status, religious beliefs, age, ability, etc)"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 14, "file": "frames/hx/sexual_014.jpg", "text": "fenwayhealth.org Minority Stress Health Care 23% Avoid 33% Mistreated 31% Hidden HIV 5x (1.4%) TWOC 20x (6.7%) US rate 0.3% Harassment 77% K-12 52% Non-binary 86% police Increased rates of diabetes Increased rates of smoking and obesity 4x eating disorders 2x unemployment 68% DV 14% homeless 70% mistreated in shelters Bandini et al, 2013; Clements-Nolle et al, 2006; Diemer et al, 2015; James et al, 2016; Vocks et al, 2009"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 15, "file": "frames/hx/sexual_015.jpg", "text": "fenwayhealth.org STD RISK FACTORS ▪LGBT individuals face increased risk for HIV and STIs ▪Best documented for cMSM - rates of HIV, syphilis, and gonorrhea exceed that of the general population ▪Transfeminine individuals face a 49x greater odds of HIV infection compared to all adults ▪Infection rates of STIs among lesbians, trans masculine, and non-binary folks remain unknown ▪24% of trans masculine individuals report avoiding health care due to fear of discrimination and harassment"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 16, "file": "frames/hx/sexual_016.jpg", "text": "fenwayhealth.org AN INTEGRATED APPROACH TO LGBT CARE Increasing access ▪You do not need to be a specialist to provide care to LGBT folks! Increasing comprehensive care ▪Goal of care is to facilitate affirmation of gender and sexual orientations ▪Address general health concerns! ▪ STD screening ▪ HIV care, mgmt of chronic conditions ▪ Behavioral health ▪ Case management"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 17, "file": "frames/hx/sexual_017.jpg", "text": "fenwayhealth.org “LGBT individuals encompass all races and ethnicities, religions, and social classes. Sexual orientation and gender identity questions are not asked on most national or State surveys, making it difficult to estimate the number of LGBT individuals and their health needs. Research suggests that LGBT individuals face health disparities linked to societal stigma, discrimination, and denial of their civil and human rights. Discrimination against LGBT persons has been associated with high rates of psychiatric disorders, substance abuse, and suicide. Experiences of violence and victimization are frequent for LGBT individuals, and have long-lasting effects on the individual and the community. Personal, family, and social acceptance of sexual orientation and gender identity affects the mental health and personal safety of LGBT individuals. The LGBT companion document to Healthy People 2010 highlighted the need for more research to document, understand, and address the environmental factors that contribute to health disparities in the LGBT community. As part of this work, we need to increase the number of nationally-representative health-related surveys that collect information on sexual orientation and gender identity (SOGI)”"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 18, "file": "frames/hx/sexual_018.jpg", "text": "fenwayhealth.org Gay and Transgender Patients to Doctors: We’ll Tell. Just Ask. By JAN HOFFMANMAY 29, 2017"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 19, "file": "frames/hx/sexual_019.jpg", "text": "fenwayhealth.org Gay and Transgender Patients to Doctors: We’ll Tell. Just Ask. By JAN HOFFMANMAY 29, 2017 By knowing whether a patient is lesbian, gay, bisexual, transgender or straight, say public health experts, clinicians can be more alert to a person’s medical needs and more thoughtful in interactions. If hospitals report statistics on all patients, health care disparities among L.G.B.T. patients can be identified and redressed more effectively. But most doctors and nurses are in no rush to comply. In several studies, they have said they feel uneasy about asking because they don’t want to make patients uncomfortable. Research now suggests those assumptions may be wrong. A new study of both patients and providers in the journal JAMA Internal Medicine looked at the feasibility of gathering such information in emergency departments. Nearly 80 percent of providers surveyed believed that patients would refuse to disclose their sexual orientation. By contrast, only 10 percent of patients from a randomized, national sample of lesbian, gay, bisexual and heterosexual subjects said they would refuse. (Those who said they would decline were more likely to be bisexual.)"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 20, "file": "frames/hx/sexual_020.jpg", "text": "fenwayhealth.org Gay and Transgender Patients to Doctors: We’ll Tell. Just Ask. By JAN HOFFMANMAY 29, 2017 By knowing whether a patient is lesbian, gay, bisexual, transgender or straight, say public health experts, clinicians can be more alert to a person’s medical needs and more thoughtful in interactions. If hospitals report statistics on all patients, health care disparities among L.G.B.T. patients can be identified and redressed more effectively. But most doctors and nurses are in no rush to comply. In several studies, they have said they feel uneasy about asking because they don’t want to make patients uncomfortable. Research now suggests those assumptions may be wrong. A new study of both patients and providers in the journal JAMA Internal Medicine looked at the feasibility of gathering such information in emergency departments. Nearly 80 percent of providers surveyed believed that patients would refuse to disclose their sexual orientation. By contrast, only 10 percent of patients from a randomized, national sample of lesbian, gay, bisexual and heterosexual subjects said they would refuse. (Those who said they would decline were more likely to be bisexual.)"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 21, "file": "frames/hx/sexual_021.jpg", "text": "fenwayhealth.org Gay and Transgender Patients to Doctors: We’ll Tell. Just Ask. By JAN HOFFMANMAY 29, 2017 The signature message from the study, added Dr. Haider, the director of the hospital’s Center for Surgery and Public Health, is that “patients are saying that you’ll make us feel more comfortable if you ask — and ask everyone, so that normalizes the questions.”"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 22, "file": "frames/hx/sexual_022.jpg", "text": "fenwayhealth.org COLLECTING DATA AND ENDING INVISIBILITY ▪Ask ALL people and make it policy! ▪Decrease assumptions ▪Decrease stigma ▪NORMALIZE these questions and emphasize the impact that identities make on health outcomes! ▪And educate"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 23, "file": "frames/hx/sexual_023.jpg", "text": "fenwayhealth.org WHY TALK ABOUT SEXUAL HEALTH? ▪It is integral to a person’s general health ▪It is associated with happiness, well-being, and longevity ▪Sexual function is lifelong and evolves over the lifespan ▪It may be associated with morbidity and mortality ▪There is a high prevalence of sexual dysfunction (or mis- function or misunderstanding!) ▪Sexual history and current function may indicate ▪psychiatric and/or other medical disorders ▪may explain current health problems (e.g abuse and violence, prior STDs) ▪may determine the need for primary prevention (e.g immunizations, contraception, PEP, PrEP, etc.) Nussbaum and Hamilton, “The Proactive Sexual Health History”, 2002"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 24, "file": "frames/hx/sexual_024.jpg", "text": "fenwayhealth.org SEXUAL HISTORY ▪Sexual health history is an important part of a routine medical exam or physical history for ALL patients, regardless of gender identity or sexual orientation ▪Important factors: 1. Heterogeneity of sexual identities 2. Diverse sexual partnerships & practices 3. Sensitivity to language"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 25, "file": "frames/hx/sexual_025.jpg", "text": "fenwayhealth.org UNDERSTANDING RISKS, TRIGGERS, SENSITIVITIES, VULNERABILITIES How do we help patients take care of the skin they’re in?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 26, "file": "frames/hx/sexual_026.jpg", "text": "fenwayhealth.org ESTABLISHING A RELATIONSHIP WITH YOUR PATIENT ▪Effective use of listening and mirroring - Names, pronouns, body parts ▪Use an individualized and holistic approach - Ask about PATIENT priorities and agenda ▪Acknowledge previous healthcare experiences with an attitude of respect and advocacy. Level the paying field - Start all appts with clothes ON! ▪Help regulate and pace disclosure and exploration of sexual history - Ask if ok to discuss a sexual history and be transparent about why you are asking ▪Approach trauma experiences slowly and at a time when support can be offered"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 27, "file": "frames/hx/sexual_027.jpg", "text": "fenwayhealth.org TALKING ABOUT SEX ▪Introductory language Start with open-ended questions ▪Acknowledge and affirm differences in identity, language use, and sexual practices Take an Anatomic Inventory! “Have you had any gender-affirming (or body modification) surgeries?” ▪Establish from the beginning what words you and the patient will use “When referring to your genitals, are there specific terms that you use?” “I typically stick with medical terms, but if there is language or words you prefer, please let me know.” ▪Check in to make certain that the both you and the patient have the same understanding of these terms Clitoris, phallus, dick, penis Vagina, genital canal, front hole Penetrative sex, vaginal sex, frontal sex Anus/anal, back hole, butt, plumbing"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 28, "file": "frames/hx/sexual_028.jpg", "text": "fenwayhealth.org NON-GENDERED LANGUAGE Use this Instead of this Genitals Vulva, vagina, penis, testicles External area, external pelvic area, outside Vulva Genital opening, front pelvic opening Vaginal opening Frontal canal, Internal canal, inside Vagina Internal organs, organs you retain Uterus, ovaries, cervix Chest Breasts Bleeding Period, menstruation"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 29, "file": "frames/hx/sexual_029.jpg", "text": "fenwayhealth.org TALKING ABOUT SEX ▪Ask questions to capture diverse sexual behaviors ▪Validate all sexual practices by asking about both high & low risk activities … and PLEASURES! ▪Don’t assume people are limited to certain kinds of sex based on gender (i.e., include questions about insertive sex) ▪Ask open ended questions - Who are you having sex with? - What kinds of sex are you engaging in? - “which body parts of yours touch which body parts of your partner” - Are you engaging in sex for pleasure or do you feel forced in any way? - Are you engaging in sex for money, housing, drugs, or any other service - Do you feel safe in your current relationships? Do you feel empowered to tell your partners to use condoms? ▪Are you using any prosthesis or toys for sex? Are you sharing these?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 30, "file": "frames/hx/sexual_030.jpg", "text": "fenwayhealth.org CHALLENGING ASSUMPTIONS: SEXUAL PARTNERS OF TRANS MASC PEOPLE Bauer et al. (2012) High heterogeneity of HIV-related sexual risk among transgender people in Ontario, Canada: a province-wide respondent-driven sampling survey. BMC Public Health, 12, 292."}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 31, "file": "frames/hx/sexual_031.jpg", "text": "fenwayhealth.org CHALLENGING ASSUMPTIONS: SEXUAL BEHAVIORS OF TRANS MASC PEOPLE Bauer et al. (2012) High heterogeneity of HIV-related sexual risk among transgender people in Ontario, Canada: a province-wide respondent-driven sampling survey. BMC Public Health, 12, 292."}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 32, "file": "frames/hx/sexual_032.jpg", "text": "fenwayhealth.org CLINICAL INTERVIEW: THE 8 “P”S The CDC’s 5 “P”s 1. Partners 2. Practices 3. Protection for STDs 4. Past history of STDs 5. Prevention of pregnancy The 8 “P”s 1. Preferences 2. Partners 3. Practices 4. Protection for STIs 5. Past history of STIs 6. Pregnancy 7. Pleasure 8. Partner Violence"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 33, "file": "frames/hx/sexual_033.jpg", "text": "fenwayhealth.org CLINICAL INTERVIEW: THE 8 “P”S “P” Example Questions 1 Preferences • Do you have preferred language that you use to refer to your body (i.e., genitals)? • Are you currently sexually active? • What kinds of sex do you engage in? 2 Partners • Are you sexually active with one partner or more than one? • Are you dating anyone or sexually active? • Do you have any outside partners? • How would your partners identify themselves in terms of gender? 3 Practices • Do you use toys inside your [insert preferred language for genitals] or anus, or do you use them on your partners? • Do you have any other types of sex that hasn’t been asked about? 4 Protection from STIs • Are there some kinds of sex where you do not use barriers? Why? 5 Past history of STIs • If yes… Do you remember the site?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 34, "file": "frames/hx/sexual_034.jpg", "text": "fenwayhealth.org CLINICAL INTERVIEW: THE 8“P”S 5 6 7 8 “P” Example Questions 6 Pregnancy • Have you considered fertility preservation/banking gametes? • Have you thought about having your own biological children, or carrying a pregnancy? • When you are having sex, is there any exposure to sperm or chance of pregnancy? • Have you considered contraceptive options? 7 Pleasure • Do you feel you are able to become physically aroused during sex? • How satisfied are you with your ability to achieve orgasm? • Do you have any pain or discomfort during or after orgasm? • Is sex fun? • Are you having sex for pleasure or are these other reasons (survival sex/transactional sex) 8 Partner Abuse • Has anyone ever forced or compelled you to do anything sexually that you did not want to do? • Is there any violence in any of your relationships? Do you feel safe at home?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 35, "file": "frames/hx/sexual_035.jpg", "text": "fenwayhealth.org EXPLORING RELATIONSHIPS ▪Basic forms: monogamy, open relationships, polyamory, BDSM, kink, etc ▪Sexual activities: oral, vaginal, anal sex … and beyond! ▪Gender presentation and disclosure ▪Survival sex ▪Transitioning within an established relationship ▪Safe spaces ▪The decision to be sexual ▪Trauma: past or present and impact"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 36, "file": "frames/hx/sexual_036.jpg", "text": "fenwayhealth.org A TRAUMA-INFORMED APPROACH Listen Communicate belief “That must have been frightening for you” Validate the decision to disclose “I understand it could be very difficult for you to talk about this” Emphasize the unacceptability of violence “Violence is unacceptable. I’m sorry that happened, that should not have happened” Be clear that the patient is not to blame “What happened is not your fault” Make a safety plan/Provide resources Preferably a “warm”, on-site referral Responding to Disclosure Acknowledging Injustice"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 37, "file": "frames/hx/sexual_037.jpg", "text": "fenwayhealth.org QUESTIONS ABOUT COPING/RESILIENCE ▪How do you cope with [stressful experiences][the fact that life can be unfair]? ▪Sometimes people are deeply affected by stressful experiences, and may feel depressed, anxious, or use drugs/ alcohol to feel better. Has this ever happened to you? ▪Who do you turn to when you need support [family][friends][the community]? ▪What brings you joy?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 38, "file": "frames/hx/sexual_038.jpg", "text": "fenwayhealth.org Health Risk Behaviors • Identity concealment • Social disengagement • Avoidance of routine healthcare Health Promoting Behaviors • Identity management • Validation • Connection to community • Participation in affirming routine healthcare Positive and Adverse Health Outcomes Physical Health Mental Health Overall Wellbeing CRISIS OPPORTUNITY MINORITY STRESS AND ADAPTIVE COPING"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 39, "file": "frames/hx/sexual_039.jpg", "text": "fenwayhealth.org ANY EXAM OR PROCEDURE HAS THE POTENTIAL TO BE TRAUMATIZING"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 40, "file": "frames/hx/sexual_040.jpg", "text": "fenwayhealth.org BEFORE THE EXAM ▪Review the patient’s prior experiences with the exam. ▪Explain the purpose and offer to talk through the steps of the exam. ▪Ask what you can do to make the experience more comfortable. ▪“You’re in control here. If you want me to stop at any point, please let me know.”"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 41, "file": "frames/hx/sexual_041.jpg", "text": "fenwayhealth.org EXAM MODIFICATIONS J Gen Intern Med 2015; 30: 1857-64. Exam or Technique Modification options Chaperone • Patient’s choice of support person Position for exam • Feet on tablet rather than footrests Speculum • Consider small or pediatric speculum • Ask patient if they want to bring home to practice Speculum/anoscope insertion • Self-insertion Cervical sampling • Trans mass person on T with prior unsatisfactory pap: pre-treat with topical estrogen"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 42, "file": "frames/hx/sexual_042.jpg", "text": "fenwayhealth.org EXAM MODIFICATIONS J Gen Intern Med 2015; 30: 1857-64. Phrases to Avoid Modification options Don’t be scared, everything will be fine. • What are you most afraid of? • How can we help you through this? Stirrups • Footrests Avoid unnecessary touching of the patient (e.g., “Scoot down on the table until your bottom touches my hand”) • Please move your body down until you’re almost hanging off the edge of the table. • Allow your knees to fall to the sides as much as you can. I’m going to insert the speculum. • I’m going to place the speculum now. • It’s normal to feel a little pressure. I’m going to take the sample now… you may feel a “poke” [“prick”]. • You may feel a little discomfort or cramping. Hold still. Relax • If you need to move, wiggle your toes/squeeze your hands. • Try to keep your pelvis resting on the table"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 43, "file": "frames/hx/sexual_043.jpg", "text": "fenwayhealth.org GENERAL DOS AND DON’TS Do: ▪Stay calm ▪Stop the exam ▪Provide reassurance ▪Use grounding techniques ▪Make a self-care plan Do not: ▪Engage in the trauma ▪Bombard with questions"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 44, "file": "frames/hx/sexual_044.jpg", "text": "fenwayhealth.org COMPETENT SEXUAL HISTORY TAKING ▪Create a transparent, non-judgmental, patient-centered environment - Can I ask?, why I’m asking, open-ended, patient’s priorities - Discuss pleasures as much as risks ▪Consider specific health disparities relevant to the population - Higher rates of trauma, sexual violence, STDs, gender and body dysphoria ▪Preventive health - STI screenings at all sites - What types of sex are you having? - Avoid assumptions - PrEP!!!"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 45, "file": "frames/hx/sexual_045.jpg", "text": "Sex Positive Messages Slide courtesy of Kate Bishop"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 46, "file": "frames/hx/sexual_046.jpg", "text": "fenwayhealth.org SEX-POSITIVE, LGBT-AFFIRMING INFO Image sources: http://www.queertransmen.org/15gms004_primedguide-redo_vfa4_booklet_eng.pdf http://librarypdf.catie.ca/pdf/ATI-20000s/26424.pdf Accessed: 2.26.16 Adapted from Dr Tonia Poteat, October 2018"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 47, "file": "frames/hx/sexual_047.jpg", "text": "fenwayhealth.org Everyone, even the most experienced sexpert, has a list of sexual activities we find icky. Slide courtesy of Kate Bishop We cannot eliminate our bias by pretending not to have any. Find your “Yucks” and fix your face"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 48, "file": "frames/hx/sexual_048.jpg", "text": "fenwayhealth.org TALKING ABOUT SEX Open-ended questions at the end  Anything else?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 49, "file": "frames/hx/sexual_049.jpg", "text": "•fenwayhealth.org Questions?"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 50, "file": "frames/hx/sexual_050.jpg", "text": "fenwayhealth.org RESOURCES National LGBT Health Education Center On-Demand Webinars ▪http://www.lgbthealtheducation.org/training/on-demand-webinars/ ▪Clinical Guidelines ▪World Professional Association for Transgender Health. Standards of Care (SOC) for the Health of Transsexual, Transgender, and Gender Nonconforming People, 7th version: http://www.wpath.org/publications_standards.cfm ▪Center of Excellence for Transgender Health, UCSF. Primary Care Protocol for Transgender Patient Care: http://transhealth.ucsf.edu/trans?page=protocol-00-00 ▪Endocrine Society’s Clinical Guidelines: Treatment of Transsexual Persons: http://www.endo-society.org/guidelines/final/upload/endocrine- treatment-of-transsexual-persons.pdf"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 51, "file": "frames/hx/sexual_051.jpg", "text": "fenwayhealth.org RESOURCES ▪FOR PROVIDERS Collecting Sexual Identity and Gender Identity Data ▪https://www.lgbthealtheducation.org/topic/sogi/ Do Ask, Do Tell. A toolkit for Collecting Data on Sexual Orientation and Gender Identity in Clinical Settings ▪doaskdotell.org Cervical Cancer Screening for Patients on the Female-to-Male Spectrum: a Narrative Review and Guide for Clinicians Potter, J., Peitzmeier, S.M., Bernstein, I. et al. J GEN INTERN MED (2015) 30: 1857. ▪https://link.springer.com/article/10.1007/s11606-015-3462-8 Canadian Cancer Society ▪http://convio.cancer.ca/site/PageServer?pagename=SSL_ON_Home&utm_source=VanityURL&utm_content=Can cer.cagetscreeened&s_locale=en_CA#.WlLLxlQ-c1J IMPACT: The LGBT Health and Development Program @ Northwestern University ▪http://www.impactprogram.org/lgbtq-youth/videos/ ▪http://www.impactprogram.org/topics/sex-ed/ ▪FOR PATIENTS Check It Out Guys ▪http://www.checkitoutguys.ca/ Sexual Health for Transgender & Gender Non-conforming People ▪https://genderdynamix.org.za/documents/sexual-health-for-transgender-gender-non-conforming-people/"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 52, "file": "frames/hx/sexual_052.jpg", "text": "www.lgbthealtheducation.org Collecting SO/GI Information www.lgbthealtheducation.org/topic/sogi/ 52"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 53, "file": "frames/hx/sexual_053.jpg", "text": "www.lgbthealtheducation.org Providing Information to Patients 53"}]</script>
<script>
"use strict";
var SLIDES = JSON.parse(document.getElementById('slidedata').textContent);
var DECKS = [
  ['intro','Intro to Hx Taking'],
  ['comm','Communication & Empathy'],
  ['cultural','Cultural Competence & Humility'],
  ['pmh','Past Medical History'],
  ['soap','SOAP Notes'],
  ['abbrev','Medical Abbreviations'],
  ['ros','Review of Systems'],
  ['sexual','Sexual History (Fenway)']
];
var DNAME = {}, DORD = {};
DECKS.forEach(function(d,i){ DNAME[d[0]]=d[1]; DORD[d[0]]=i; });

// order flat list by deck order then page
SLIDES.sort(function(a,b){ return (DORD[a.deck]-DORD[b.deck]) || (a.page-b.page); });

var cur = 0;
var $ = function(id){ return document.getElementById(id); };

// ---- sidebar deck list ----
(function(){
  var counts = {}, first = {};
  SLIDES.forEach(function(s,i){
    counts[s.deck] = (counts[s.deck]||0)+1;
    if(first[s.deck]===undefined) first[s.deck]=i;
  });
  var html = '';
  DECKS.forEach(function(d){
    var slug=d[0];
    html += '<button class="deckbtn" data-deck="'+slug+'" data-idx="'+(first[slug]||0)+'">'
          + '<span class="nm">'+d[1]+'</span>'
          + '<span class="ct">'+(counts[slug]||0)+'</span></button>';
  });
  $('decklist').innerHTML = html;
  Array.prototype.forEach.call(document.querySelectorAll('.deckbtn'), function(b){
    b.addEventListener('click', function(){
      go(parseInt(b.getAttribute('data-idx'),10));
      closeDrawer();
    });
  });
})();

// ---- render ----
function render(){
  var s = SLIDES[cur];
  $('slide').src = s.file;
  $('slide').alt = s.deck+' page '+s.page;
  $('capDeck').textContent = DNAME[s.deck] || s.deck;
  $('capPage').textContent = 'page '+s.page;
  var deckSlides = SLIDES.filter(function(x){ return x.deck===s.deck; });
  var posInDeck = deckSlides.findIndex(function(x){ return x===s; }) + 1;
  $('pos').textContent = (cur+1)+' / '+SLIDES.length;
  $('capPage').textContent = 'page '+posInDeck+' / '+deckSlides.length;
  $('txt').textContent = s.text || '(no text captured for this slide)';
  $('prev').disabled = (cur===0);
  $('next').disabled = (cur===SLIDES.length-1);
  // active deck highlight
  Array.prototype.forEach.call(document.querySelectorAll('.deckbtn'), function(b){
    b.classList.toggle('active', b.getAttribute('data-deck')===s.deck);
  });
  buildThumbs(s.deck);
  if(speaking) stopSpeak();
}

function go(n){
  if(n<0) n=0; if(n>SLIDES.length-1) n=SLIDES.length-1;
  cur=n; render();
}

// ---- thumbnails for current deck ----
var lastThumbDeck = null;
function buildThumbs(deck){
  if(deck!==lastThumbDeck){
    var strip = $('tstrip'); strip.innerHTML='';
    $('thumbHead').textContent = 'Slides in this deck ('+(DNAME[deck]||deck)+')';
    SLIDES.forEach(function(s,i){
      if(s.deck!==deck) return;
      var im = document.createElement('img');
      im.src = s.file; im.loading='lazy'; im.setAttribute('data-idx',i);
      im.title = 'page '+s.page;
      im.addEventListener('click', function(){ go(i); });
      strip.appendChild(im);
    });
    lastThumbDeck = deck;
  }
  Array.prototype.forEach.call($('tstrip').children, function(im){
    var on = parseInt(im.getAttribute('data-idx'),10)===cur;
    im.classList.toggle('on', on);
    if(on) im.scrollIntoView({block:'nearest',inline:'center'});
  });
}

// ---- nav ----
$('prev').addEventListener('click', function(){ go(cur-1); });
$('next').addEventListener('click', function(){ go(cur+1); });
document.addEventListener('keydown', function(e){
  if($('fs').classList.contains('on')){ if(e.key==='Escape'){ closeFs(); } return; }
  if(document.activeElement===$('q')) return;
  if(e.key==='ArrowLeft'){ go(cur-1); }
  else if(e.key==='ArrowRight'){ go(cur+1); }
});

// ---- fullscreen ----
function openFs(){ $('fsimg').src=$('slide').src; $('fs').classList.add('on'); }
function closeFs(){ $('fs').classList.remove('on'); }
$('slide').addEventListener('click', openFs);
$('fs').addEventListener('click', closeFs);
$('fsx').addEventListener('click', function(e){ e.stopPropagation(); closeFs(); });

// ---- search ----
function esc(t){ return t.replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
function snippet(text, q){
  var lo=text.toLowerCase(), pos=lo.indexOf(q);
  var start=Math.max(0,pos-32), end=Math.min(text.length,pos+q.length+60);
  var frag=(start>0?'…':'')+text.slice(start,end)+(end<text.length?'…':'');
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  return esc(frag).replace(re,'<mark>$1</mark>');
}
$('q').addEventListener('input', function(){
  var q=this.value.trim().toLowerCase();
  var box=$('results');
  if(q.length<2){ box.classList.remove('on'); box.innerHTML=''; return; }
  var hits=[];
  SLIDES.forEach(function(s,i){
    if(s.text && s.text.toLowerCase().indexOf(q)>=0) hits.push(i);
  });
  if(!hits.length){ box.innerHTML='<div class="rempty">No slides match “'+esc(q)+'”</div>'; box.classList.add('on'); return; }
  var html='';
  hits.slice(0,60).forEach(function(i){
    var s=SLIDES[i];
    html+='<div class="ritem" data-idx="'+i+'"><span class="rd">'+(DNAME[s.deck]||s.deck)+' · pg '+s.page+'</span>'
        + '<span class="rt">'+snippet(s.text,q)+'</span></div>';
  });
  if(hits.length>60) html+='<div class="rempty">'+hits.length+' matches — showing first 60</div>';
  box.innerHTML=html; box.classList.add('on');
  Array.prototype.forEach.call(box.querySelectorAll('.ritem'), function(r){
    r.addEventListener('click', function(){
      go(parseInt(r.getAttribute('data-idx'),10));
      box.classList.remove('on'); $('q').value='';
    });
  });
});
document.addEventListener('click', function(e){
  if(!e.target.closest('.searchbar')) $('results').classList.remove('on');
});

// ---- TTS ----
var synth = window.speechSynthesis;
var voices = [], chosen = null, speaking = false;
function pickDefault(){
  var prefs = ['Microsoft Ava','Microsoft Emma','Google US English','Microsoft Aria','Samantha'];
  for(var p=0;p<prefs.length;p++){
    for(var v=0;v<voices.length;v++){
      if(voices[v].name.indexOf(prefs[p])>=0) return voices[v];
    }
  }
  for(var v2=0;v2<voices.length;v2++){ if(/en[-_]US/i.test(voices[v2].lang)) return voices[v2]; }
  for(var v3=0;v3<voices.length;v3++){ if(/^en/i.test(voices[v3].lang)) return voices[v3]; }
  return voices[0]||null;
}
function loadVoices(){
  voices = synth ? synth.getVoices() : [];
  var sel=$('voice'); sel.innerHTML='';
  if(!voices.length){ sel.innerHTML='<option>Default</option>'; return; }
  chosen = chosen || pickDefault();
  voices.forEach(function(v,i){
    var o=document.createElement('option');
    o.value=i; o.textContent=v.name+' ('+v.lang+')';
    if(chosen && v.name===chosen.name) o.selected=true;
    sel.appendChild(o);
  });
}
if(synth){
  loadVoices();
  synth.onvoiceschanged = loadVoices;
  $('voice').addEventListener('change', function(){ chosen = voices[parseInt(this.value,10)]||chosen; });
}else{
  $('say').textContent='🔇 TTS not supported'; $('say').disabled=true;
}
$('rate').addEventListener('input', function(){ $('ratev').textContent=parseFloat(this.value).toFixed(1)+'x'; });
function stopSpeak(){ if(synth) synth.cancel(); speaking=false; $('say').classList.remove('speaking'); $('say').innerHTML='&#127911; Read this slide aloud'; }
function speak(){
  if(!synth) return;
  var s=SLIDES[cur];
  var t=(s.text||'').trim();
  if(!t){ return; }
  synth.cancel();
  var u=new SpeechSynthesisUtterance(t);
  if(chosen) u.voice=chosen;
  u.rate=parseFloat($('rate').value)||1;
  u.onend=stopSpeak; u.onerror=stopSpeak;
  speaking=true; $('say').classList.add('speaking'); $('say').innerHTML='&#9209; Stop';
  synth.speak(u);
}
$('say').addEventListener('click', function(){ if(speaking) stopSpeak(); else speak(); });

// ---- mobile drawer ----
function openDrawer(){ $('side').classList.add('open'); $('scrim').classList.add('on'); }
function closeDrawer(){ $('side').classList.remove('open'); $('scrim').classList.remove('on'); }
$('drawerbtn').addEventListener('click', openDrawer);
$('scrim').addEventListener('click', closeDrawer);

// ---- watermark ----
if(localStorage.getItem('dcDavidView')==='1'){ $('wm').style.display='none'; }

// ---- init ----
render();
</script>
</body></html>
