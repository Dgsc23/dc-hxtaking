<style>
:root{--bg:#0a0e1a;--card:#111a2e;--line:#22304d;--ink:#e6ecf5;--mut:#9fb0cc;--ac:#38bdf8;--gd:#34d399;--am:#fbbf24;--pk:#f472b6}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(1100px 560px at 50% -8%,#132038,#0a0e1a),#0a0e1a;color:var(--ink);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.5;padding:12px 12px 90px}
a{color:var(--ac)}
.back{display:inline-block;font-size:.85rem;text-decoration:none;color:var(--ac);margin-bottom:8px}
.back:hover{text-decoration:underline}
h1{font-size:1.28rem;text-align:center;margin:2px 0 2px;line-height:1.2}
.sub{text-align:center;color:var(--mut);font-size:.82rem;margin-bottom:12px}
.sub b{color:#7dd3fc}
/* search */
.searchbar{max-width:1180px;margin:0 auto 12px;position:relative}
#q{width:100%;background:var(--card);border:1px solid var(--line);border-radius:11px;color:var(--ink);
padding:11px 14px;font-size:.92rem;font-family:inherit}
#q:focus{outline:none;border-color:var(--ac)}
#results{position:absolute;z-index:40;left:0;right:0;top:calc(100% + 5px);background:#0e1526;border:1px solid var(--line);
border-radius:11px;max-height:52vh;overflow:auto;display:none;box-shadow:0 14px 40px rgba(0,0,0,.55)}
#results.on{display:block}
.ritem{padding:9px 13px;border-bottom:1px solid var(--line);cursor:pointer;font-size:.82rem}
.ritem:last-child{border-bottom:none}
.ritem:hover{background:#16233d}
.ritem .rd{color:var(--ac);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}
.ritem .rt{color:#cbd5e1;display:block;margin-top:2px}
.ritem mark{background:rgba(251,191,36,.32);color:#fde68a;padding:0 1px;border-radius:2px}
.rempty{padding:14px;color:var(--mut);font-size:.85rem;text-align:center}
/* layout */
.layout{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:230px 1fr;gap:16px;align-items:start}
/* sidebar */
.side{position:sticky;top:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;max-height:calc(100vh - 24px);overflow:auto}
.side h2{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#bae6fd;margin:2px 4px 8px}
.deckbtn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;
background:transparent;border:1px solid transparent;border-radius:9px;color:var(--ink);padding:9px 10px;
font-family:inherit;font-size:.85rem;cursor:pointer;margin-bottom:2px}
.deckbtn:hover{background:#16233d}
.deckbtn.active{background:linear-gradient(135deg,#0c2840,#0a1f33);border-color:var(--ac)}
.deckbtn .nm{font-weight:600;line-height:1.25}
.deckbtn .ct{flex:none;font-size:.68rem;color:var(--mut);background:#0a0e1a;border:1px solid var(--line);border-radius:999px;padding:1px 8px}
.deckbtn.active .ct{color:#bae6fd;border-color:var(--ac)}
/* main viewer */
.main{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;min-width:0}
.cap{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.cap .dk{font-weight:800;color:#bae6fd;font-size:1rem}
.cap .pg{color:var(--mut);font-size:.82rem}
.stage{position:relative;background:#060912;border:1px solid var(--line);border-radius:11px;overflow:hidden;
display:flex;align-items:center;justify-content:center;min-height:220px}
.stage img{max-width:100%;max-height:66vh;display:block;cursor:zoom-in}
.zbadge{position:absolute;bottom:8px;right:9px;font-size:.66rem;color:#cbd5e1;background:rgba(6,9,18,.75);
border:1px solid var(--line);border-radius:8px;padding:3px 8px;pointer-events:none}
/* nav */
.nav{display:flex;align-items:center;gap:10px;margin-top:11px}
.nav button{background:#0e1526;border:1px solid var(--line);color:var(--ink);border-radius:10px;
padding:10px 15px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;flex:1}
.nav button:hover:not(:disabled){border-color:var(--ac)}
.nav button:disabled{opacity:.35;cursor:default}
.nav .pos{flex:none;color:var(--mut);font-size:.8rem;min-width:74px;text-align:center}
/* tts row */
.tts{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap;
background:#0e1526;border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.tts button{background:linear-gradient(135deg,#0c355a,#0a2540);border:1px solid var(--ac);color:#dbeafe;
border-radius:10px;padding:9px 14px;font-family:inherit;font-size:.86rem;font-weight:700;cursor:pointer}
.tts button.speaking{background:linear-gradient(135deg,#3a0f2e,#26102a);border-color:var(--pk);color:#fbcfe8}
.tts label{font-size:.76rem;color:var(--mut);display:flex;align-items:center;gap:6px}
.tts select{background:#0a0e1a;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:.76rem;max-width:190px}
.tts input[type=range]{accent-color:var(--ac);width:96px}
.tts .spd{color:#bae6fd;font-weight:700;min-width:32px}
/* slide text */
.txt{margin-top:11px;background:#0b1120;border:1px solid var(--line);border-left:3px solid var(--am);
border-radius:9px;padding:11px 13px;font-size:.82rem;color:#cbd5e1;line-height:1.55;max-height:150px;overflow:auto}
/* thumbs */
.thumbs{margin-top:13px}
.thumbs h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:7px}
.tstrip{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px}
.tstrip img{height:62px;width:auto;border-radius:6px;border:2px solid transparent;cursor:pointer;flex:none;background:#060912}
.tstrip img.on{border-color:var(--ac)}
/* fullscreen */
#fs{position:fixed;inset:0;z-index:100;background:rgba(4,7,14,.94);display:none;align-items:center;justify-content:center;padding:14px;cursor:zoom-out}
#fs.on{display:flex}
#fs img{max-width:100%;max-height:100%;border-radius:8px}
#fs .x{position:absolute;top:14px;right:18px;font-size:1.7rem;color:#cbd5e1;background:none;border:none;cursor:pointer}
/* mobile drawer */
.drawerbtn{display:none;position:fixed;bottom:18px;left:14px;z-index:60;background:linear-gradient(135deg,#0c355a,#0a2540);
border:1px solid var(--ac);color:#dbeafe;border-radius:999px;padding:11px 16px;font-family:inherit;font-weight:800;font-size:.88rem;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.scrim{display:none;position:fixed;inset:0;z-index:70;background:rgba(4,7,14,.6)}
.scrim.on{display:block}
@media(max-width:820px){
  .layout{grid-template-columns:1fr}
  .drawerbtn{display:block}
  .side{position:fixed;top:0;left:0;bottom:0;z-index:80;width:250px;max-height:none;border-radius:0 14px 14px 0;
    transform:translateX(-104%);transition:transform .2s ease}
  .side.open{transform:translateX(0)}
}
.wm{position:fixed;bottom:6px;right:10px;font-size:9px;color:rgba(255,255,255,.22);pointer-events:none;z-index:5}
</style></head><body>

<script id="slidedata" type="application/json">[{"deck": "intro", "deckname": "HxTaking_Intro", "page": 1, "file": "frames/hx/intro_001.jpg", "text": "Intro to History Taking History Taking – CBS0201 Jennifer Noborikawa, DACM, L.Ac, Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised 1/3/24"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 2, "file": "frames/hx/intro_002.jpg", "text": "Objectives 1 Identify the main functions of the Medical Interview 2 Identify the benefits of establishing a good clinician – patient relationship 3 Evaluate impact of non-verbal communication of the clinician on a patient encounter"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 3, "file": "frames/hx/intro_003.jpg", "text": "Overview • Gathering a sensitive and nuanced history and performing a thorough and accurate examination deepens relationships with patients, focuses your assessment and sets the direction of your clinical reasoning"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 4, "file": "frames/hx/intro_004.jpg", "text": "3 Main Functions of the medical interview Build the relationship • Develop a rapport • Establish mutual respect • Establish trust • Convey empathy and compassion Assess and understand • Questioning & data gathering Collaborate for management • Patient Education The Medical Interview –The 3 Function Approach, 3rd edition, Steven A. Cole, JulianBird."}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 5, "file": "frames/hx/intro_005.jpg", "text": "What’s the big deal about taking a history? • During the medical interview and physical examination, you will • gather data to generate a hypothesis for the cause of a patient’sproblem(s). • collect information which will help as you develop a management plan • Remember: the interview and physical exam are essential for development of the clinician – patient bond"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 6, "file": "frames/hx/intro_006.jpg", "text": "The Importance of the Clinician-Patient Bond • Learning about your patient’s concerns helps you generate a differential diagnosis (road map to the cause of their problems) and your primary diagnosis (or diagnoses). • Effective communication necessitates the development of the clinician-patient relationship • People don’t always like telling strangers all about themselves"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 7, "file": "frames/hx/intro_007.jpg", "text": "Building a Relationship Functions of a Medical Interview"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 8, "file": "frames/hx/intro_008.jpg", "text": "Building a Relationship Clinicians should utilize interpersonal skills to accomplish the following: 1. Develop a rapport 2. Establish mutual respect 3. Establish trust 4. Convey empathy and compassion"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 9, "file": "frames/hx/intro_009.jpg", "text": "Developing a Rapport • Look the part: dress professionally • Have a pleasant demeanor – regardless of other factors you may be dealing with (this is difficult at times) • Appropriate touch • Address the patient by name • Establish eye contact • Reference information from a previous visit"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 10, "file": "frames/hx/intro_010.jpg", "text": "Establish MutualRespect • Focus on your patient, by doing this, you are able to ask the same from the patient • (i.e. please silent the cell phone or other electronics during the visit) • Address the patient formally (preferably by last name), unless permission given to use their first name. • Varies with length of relationship and with children/adolescents. • Honor your patient’s time. Try to minimize wait times when possible"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 11, "file": "frames/hx/intro_011.jpg", "text": "Establish Trust • Be honest with your patient. • If you don’t know, say you don’t know (this may be difficult in the beginning of your career • When you don’t know, make it your business to find out. Patient’s will respect your honesty. • Keep your word • If you say you are going to follow-up on something. Follow up."}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 12, "file": "frames/hx/intro_012.jpg", "text": "Convey empathy andcompassion • Honor and respect your patient’s emotions • Address difficult or sad moments or comments appropriately – more on this next week • Implement appropriate touch • Recommend support if needed. Assist in implementing support if (when) needed. • Careful of tone, pace of conversation, sincerity of expression"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 13, "file": "frames/hx/intro_013.jpg", "text": "Empathy = ability to understand and share the feelings of another. Putting yourself in the other person’s shoes. Compassion = Defined as “sympathetic consciousnessof others' distress together with a desire to alleviate it” Sympathy = \"the act or capacity of entering into or sharing the feelings or interests of another.“ Feeling compassion, sorrow, or pity for the hardships of another."}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 14, "file": "frames/hx/intro_014.jpg", "text": "What do you value in a clinician?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 15, "file": "frames/hx/intro_015.jpg", "text": "The First Step: Listening"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 16, "file": "frames/hx/intro_016.jpg", "text": "From a patient’s Perspective"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 17, "file": "frames/hx/intro_017.jpg", "text": "Regardless of what is happening, be present with your patient • Scenario 1: Your receptionist calls out sick, you have a full schedule and no one to answer the phone. You get a call from a woman who says her mother had passed away from natural causes, she was your first patient you had, and she loved seeing you. A new patient comes immediately after the phone call. • Can you stay present and attentive to your new patient? • Can you keep your professional demeanor?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 18, "file": "frames/hx/intro_018.jpg", "text": "Regardless of what is happening be present with your patient • Scenario 2: You have a brand-new practice, you are responsible for being the doctor, receptionist and the janitor. You are very excited because you have a new patient. During your history taking with this new patient, your phone rings. Excitedly, you begin to wonder if yet another new patient is on the other line (your student loan payment is due in 15 days). What do you do? A. Stay with the patient B. Answer the phone"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 19, "file": "frames/hx/intro_019.jpg", "text": "“Listen to your patient, they might betelling you their diagnosis.” – William Osler It is said that 80% of your diagnosis can come from your history taking"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 20, "file": "frames/hx/intro_020.jpg", "text": "1st Exercise – Listening • With the person next to you say five unrelated things. • Wait 15 seconds and have them repeat them back to you. • Were they able to do it? • Then switch and do it again • Example would be the following: • Ex1. • Ex2. Apple, Blue, Desk, Triangle, Otter Fox, Printer, Yellow, Microwave, Soda"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 21, "file": "frames/hx/intro_021.jpg", "text": "Building the relationship • Easier said than done? • How do you come across? • What are your non-verbal clues? How can you modify them or enhance them?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 22, "file": "frames/hx/intro_022.jpg", "text": "Why invest the energy in establishing a good clinician – patient relationship?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 23, "file": "frames/hx/intro_023.jpg", "text": "Benefits of a Good Clinician – Patient Relationship • Clinicians with good relationship skills will have patients who are more satisfied and more likely to adhere to treatment recommendations. • Roter, DL, Hall, JA. Communication and adherence: moving from prediction to understanding. Med Care. 2009; 47( 8): 823– 825."}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 24, "file": "frames/hx/intro_024.jpg", "text": "Non-verbal Communication The nonverbal behavior of the physician contributes significantly to the overall quality of the doctor- patient relationship. Quiet, attentive listening conveys interest and builds rapport more powerfully than virtually any other action or utterance the physician can make. Doctors who establish appropriate eye contact are more likely to detect emotional distress in their patients. Doctors who lean forward and have an open body posture also have more satisfied patients."}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 25, "file": "frames/hx/intro_025.jpg", "text": "Listening? What does the patient perceive?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 26, "file": "frames/hx/intro_026.jpg", "text": "In Class Exercise #2 • One person talk about yesterday’s events • The other listens intently, gather info, ask elaborative questions • Take note of eye contact, listeners attention, acknowledgements, and listener understanding • Then switch and the listener talks about yesterday’s event and your partner listens • You will then summarize in front of class • Let’s see how accurate and how well you do"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 27, "file": "frames/hx/intro_027.jpg", "text": "At Home Exercise"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 28, "file": "frames/hx/intro_028.jpg", "text": "Let’s Evaluate the Evaluator • How effective are you as a communicator? • Are you conveying what you mean to say? • Is your patient understanding your intent? • Are your patients hearing what you are actually saying? • What are you saying, when you're NOT saying anything? • What messages are your non-verbal cues sending?"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 29, "file": "frames/hx/intro_029.jpg", "text": "• During the next week, pay attention to people’s responses to you. Are they reflective of what you expected them to be, based on the intent of your communication? • If not, why do you think that is? • Do you find yourself having to explain yourself? -- frequently? • Observe your communication style • Pay attention to the way people respond to you. What non-verbal messages do you appear to be sending. The one constant that will be a part of all your patient encounters - is YOU!"}, {"deck": "intro", "deckname": "HxTaking_Intro", "page": 30, "file": "frames/hx/intro_030.jpg", "text": "References • Bickley, Lynn S., Bates’ Guide to Physical Examination, 12th Edition, (2017),Philadelphia, PA, Wolters Kluwer • Hall, JA , et al. Nonverbal sensitivity in medical students: implications for clinical interactions. J Gen Intern Med. 2009; 24( 11): 1217– 1222. • Halpern, J. What is clinical empathy? J Gen Intern Med. 2003; 18( 8): 670– 674. • Steven A. Cole, Julian Bird, The Medical Interview – The 3 Function Approach, 3rd edition, (2013), Elsevier • Sullivan, Debra D., Guide to Clinical Documentation, 3rd Edition, 2019, Philadelphia, PA, F.A.Davis • Jegosh, Et al. 2011 • Roter, DL, et al. The expression of emotion through nonverbal behavior in medical visits. Mechanisms and outcomes. J Gen intern Med. 2006; 21( Suppl 1): S28– S34. • Hall, JA , et al. Nonverbal sensitivity in medical students: implications for clinical interactions. J Gen Intern Med. 2009; 24( 11): 1217– 1222. • Roter, DL, et al. The expression of emotion through nonverbal behavior in medical visits. Mechanisms and outcomes. J Gen intern Med. 2006; 21( Suppl 1): S28– S34. • Roter, DL, et al. The expression of emotion through nonverbal behavior in medical visits. Mechanisms and outcomes. J Gen intern Med. 2006; 21( Suppl 1): S28– S34. • Goldberg, DP, et al. Training family doctors to recognize psychiatric illness with increased accuracy. Lancet. 1980; 2( 8193): 521– 523. • Roter, DL, et al. The expression of emotion through nonverbal behavior in medical visits. Mechanisms and outcomes. J Gen intern Med. 2006; 21( Suppl 1): S28– S34. • Hall, JA , et al. Nonverbal sensitivity in medical students: implications for clinical interactions. J Gen Intern Med. 2009; 24( 11): 1217– 1222. • Halpern, J. What is clinical empathy? J Gen Intern Med. 2003; 18( 8): 670– 674."}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 1, "file": "frames/hx/comm_001.jpg", "text": "Communication & Empathy History Taking – CBS0201 Jennifer Noborikawa, DACM, L.Ac, Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised 1/3/24"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 2, "file": "frames/hx/comm_002.jpg", "text": "Objectives • Examine effects of empathetic communication and its effects on patient –provider interactions • Define the difference between empathy and sympathy • Identify affect of attitudes and beliefs on patient - provider encounter"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 3, "file": "frames/hx/comm_003.jpg", "text": "Outline • Communication & Therapeutic Qualities of the Practitioner • Empathy • How does empathy benefit the clinician-patient relationship • Combining Efficiency and Empathy"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 4, "file": "frames/hx/comm_004.jpg", "text": "Therapeutic Qualities Borrowed from psychologist Carl Rogers, these are considered observable qualities in therapists with good clinical outcomes Respect Genuineness Empathy"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 5, "file": "frames/hx/comm_005.jpg", "text": "Respect & Genuineness Respect • Accept your patient as they are • Do not judge • Separate your personal feelings Genuineness • Be yourself as a person and a professional • Acknowledge your position (student) or lack of knowledge (e.g. referring out)"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 6, "file": "frames/hx/comm_006.jpg", "text": "What is Empathy? • The ability to understand and share the feelings of another. Putting yourself in the other person’s shoes. • Compare to sympathy"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 7, "file": "frames/hx/comm_007.jpg", "text": "Empathy vs. Sympathy"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 8, "file": "frames/hx/comm_008.jpg", "text": "Clinician’s Response Influences Patient Satisfaction, Outcome, and Compliance Studies reveal: Patients who received emotional support/education about their illness after surgery or myocardial infarction (MI) suffered fewer emotional and physical complications, and were discharged an average of 2 days earlier than those who did not receive such support1 Food for thought… the average hospital stay is ~ $2000 / day in the U.S."}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 9, "file": "frames/hx/comm_009.jpg", "text": "Clinician’s Response Influences Patient Satisfaction, Outcome, and Compliance Studies reveal: • Depression/depressive symptoms are associated with a 2- to 5-fold increase in post-MI complications or even death2,3 • Focus on the patient’s emotional state improves physical outcomes in hypertension, diabetes, and arthritis4"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 10, "file": "frames/hx/comm_010.jpg", "text": "Clinician’s Response Influences Patient Satisfaction, Outcome, and Compliance Studies reveal: • Healthcare practitioners who are more empathetic/sympathetic have more satisfied patients, AND patients who are satisfied with their health practitioners are more likely to comply5,6,7 • Important changes in physicians' communication skills were evident after an 8-hour program. The training improved the process and outcome of care without lengthening the visits.5"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 11, "file": "frames/hx/comm_011.jpg", "text": "4 Qualities of Empathy • Perspective Taking • To validate the experience of another person • Understanding that “someone’s perspective is their truth” • Staying out of Judgement • Yes, I understand, but “they got themselves into this situation” • Recognizing the emotion in the other person • Connecting with something that I experienced, which allows me to understand what someone else is feeling. • Communicating the emotion of the other person • Conveying to the other person “I hear you; I see you; I get it.”"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 12, "file": "frames/hx/comm_012.jpg", "text": "“Rarely does a response make something better. What makes something better is a connection.” Dr. Brene Brown on Empathy Connection Improved Patient Compliance Improved Provider Outcomes - Patientsatisfaction - Clinical improvement"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 13, "file": "frames/hx/comm_013.jpg", "text": "How to communicate empathy Levels of Response (Coulehan p. 31) Interchangeable Additive Ignoring Minimizing"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 14, "file": "frames/hx/comm_014.jpg", "text": "Levels of Response Positive • Interchangeable: Recognize the feelings and symptoms expressed by the patient and assess them accurately,intensity • Additive: practitioner recognizes what the patient expresses openly as well as what they feel but do not express. Negative • Ignoring: Do not hear what the patient said, or act as if you didn’t. You don’t respond to the cognitive or emotional content • Minimizing: respond to the feelings/symptoms at a lesser level than associated with the patient’s expressed concern"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 15, "file": "frames/hx/comm_015.jpg", "text": "Efficiency & Empathy"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 16, "file": "frames/hx/comm_016.jpg", "text": "What about efficiency? • Studies confirm that as many as ¾ of all diagnoses can be made by history alone8 • During the interview, gather enough information in a timely manner in order to narrow down your differential diagnosis – or even make your definitive diagnosis"}, {"deck": "comm", "deckname": "Communication_Empathy", "page": 17, "file": "frames/hx/comm_017.jpg", "text": "A Delicate Balance Gathering enough information to support either differential diagnosis or a definitive diagnosis Interacting and communicating with your patient in a manner thatvalidates their experience. Remember, their experience is their truth. Arriving at a conclusion in a timely manner so you accomplish your therapeutic tasks, stay on schedule and your patient leaves satisfied Efficiency Empathy Efficacy"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 1, "file": "frames/hx/cultural_001.jpg", "text": "Cultural Competence and Humility History Taking – CBS0201 Jennifer Noborikawa, DACM, L.Ac, Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised 1/3/24"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 2, "file": "frames/hx/cultural_002.jpg", "text": "Objectives • Examine definition of culture • Examine the definition of intersectionality • Examine cultural humility and its role in patient – provider encounter"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 3, "file": "frames/hx/cultural_003.jpg", "text": "Outline • Culture • Intersectionality • Cultural Competence • Cultural Humility"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 4, "file": "frames/hx/cultural_004.jpg", "text": "Culture Defined as: • a: the customary beliefs, social forms, and material traits of a racial, religious, or social group also : the characteristic features of everyday existence (such as diversions or a way of life) shared by people in a place or timepopular culture Southern culture • b: the set of shared attitudes, values, goals, and practices that characterizes an institution or organization a corporate culture focused on the bottom line • c: the set of values, conventions, or social practices associated with a particular field, activity, or societal characteristic"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 5, "file": "frames/hx/cultural_005.jpg", "text": "Culture Culture Economic Political Religious Psychological Biological"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 6, "file": "frames/hx/cultural_006.jpg", "text": "Many things affectculture: Culture Age Gender Identity Politics Class Religion Ethnicity"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 7, "file": "frames/hx/cultural_007.jpg", "text": "Intersectionality • Describes how race, class, gender, and other individual characteristics intersect and overlap with one another • Considers the ways that identities related to multiple socially constructed categories create unique sets of experiences • Understanding intersectionality helps us understand our patient’s experience better https://www.pdhealth.mil/news/blog/intersectionality-and-cultural-competence- quick-introduction"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 8, "file": "frames/hx/cultural_008.jpg", "text": "Self-Reflection Exercise"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 9, "file": "frames/hx/cultural_009.jpg", "text": "Who are you? • What has contributed to your culture? • What do you identify yourself as?"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 10, "file": "frames/hx/cultural_010.jpg", "text": "Cultural Competence"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 11, "file": "frames/hx/cultural_011.jpg", "text": "Cultural Concepts • Culture is a process through which ordinary activities and conditions take on an emotional tone and a moral meaning for participants • Cultural concepts do NOT equal race, or describe people who are physically similar and are thought to have the same beliefs, values and behaviors"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 12, "file": "frames/hx/cultural_012.jpg", "text": "Cultural Competence vs. Humility Competency • Bates: set of attitudes, skills, behaviors, and policies that enable organizations and staff to work effectively in cross-cultural situations” • Coulehan: “avoid stereotypes, bias, prejudice, classism, racism, ageism, xenophobia, homophobia, and sexism in your everyday interactions with patients” Humility • Bates: “process that requires humility as individuals continually engage in self-reflection and self- critique as lifelong learners and reflective practitioners • “the more you know about a particular culture, the more you realize you don’t know.”"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 13, "file": "frames/hx/cultural_013.jpg", "text": "Cultural Humility • The “ability to maintain an interpersonal stance that is other-oriented (or open to the other) in relation to aspects of cultural identity that are most important to the [person]” Commitment to self- evaluation and self- critique Fix power imbalances Develop partnerships and advocate for others"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 14, "file": "frames/hx/cultural_014.jpg", "text": "Cultural Competence vs Humility • Cultural competence is the ability to interact effectively with people of different cultures including socioeconomic differences • Cultural competence means to be respectful and responsive to the health beliefs and practices – and cultural and linguistic needs – of diverse populations. www.samhsa.gov>capt>culturalcompetence"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 15, "file": "frames/hx/cultural_015.jpg", "text": "Cultural Competence vs Humility Humility: freedom from pride or arrogance : the quality or state of being humble. • Cultural Humility • From Bates: “process that requires humility as individuals continually engage in self-reflection and self-critique as lifelong learners and reflective practitioners” • Requires • Respect • Acknowledging both differences and similarities • Dynamic communication and honest self assessment"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 16, "file": "frames/hx/cultural_016.jpg", "text": "The Problem with Cultural “Competence” • Suggests that culture can be reduced to a technical skill for which clinicians can be trained to develop expertise • Results in lists of “do’s and don’ts” that define how to treat patients of a given ethnic background"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 17, "file": "frames/hx/cultural_017.jpg", "text": "So, what do we do? A ‘Cross Cultural Approach’ • Communication Skills • Awareness of cross-cutting cultural and social issues • Health beliefs present in all cultures • Think of them as universal human beliefs, needs and traits"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 18, "file": "frames/hx/cultural_018.jpg", "text": "So, What are your Goals?"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 19, "file": "frames/hx/cultural_019.jpg", "text": "• Efficacy • Efficiency • Empathy • Accuracy • Cultural Competence • Cultural Humility • Clinician and PatientSatisfaction Goals I submit to you, as you accomplish these goals, this is how you develop the “art of caring”, and this is what distinguishes you from any other provider. Your style of delivery will be as unique as your fingerprint."}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 20, "file": "frames/hx/cultural_020.jpg", "text": "What would You do? • How can physicians with totally different backgrounds from their patients possibly relate to them and understand their cultures and furthermore, care for them effectively? • How well do you empathize? • How well can you exercise humility?"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 21, "file": "frames/hx/cultural_021.jpg", "text": "The Golden Rule • In the final analysis, we should treat our patients as we would want others to treat us during periods of vulnerability and fear • Patient centeredness is built on respect, sensitivity, composure, partnership, honesty, curiosity and tolerance"}, {"deck": "cultural", "deckname": "CulturalCompetence_Humility", "page": 22, "file": "frames/hx/cultural_022.jpg", "text": "References • Mumford, E, Schlesinger, HJ, Glass, GV. The effect of psychological intervention on recover from surgery and heart attacks: an analysis of the literature. Am J Public Health. 1982; 72(2):141-151. • Rozanski, A, et al. The epidemiology, pathophysiology, and management of psychosocial risk factors in cardiac practice:the emerging field of behavioral cardiology. J Am Coll Cardiol. 2005; 45(5): 637-651. • Blumenthal, JA, Lett, HS. Depression and cardiac risk. J Cardiopulm Rehabil. 2005; 25(2): 78-79. • Stewart, MA. Effective physician-patient communication and health outcomes: a review. CMAJ. 1995; 152(9):1423-1433. • Suchman, AL, et al. Physician satisfaction with primary care office visits. Collaborative Study Group of the American Academy on Physician and Patient. Med Care. 1993; 31(12):1083-1092. • Roter, DL, Hall, JA. Communication and adherence: moving from prediction to understanding. Med Care. 2009; 47(8):823-825. • Roter, DL, et al. Improving physicians’ interviewing skills and reducing patients’ emotional distress. A randomized clinical trial. Arch Intern Med. 1995; 155(17):1877-1884. • Peterson, MC, et al. Contributions of the history, physical examination, and laboratory investigation in making medical diagnoses. West J Med. 1992; 156(2):163-165. • Dr. Coco Cabrel • Dr. Brene Brown • Epner, D.e.; Baile, W.f., 2012, Patient Centered care: the Key to Cultural competency,Annals of Oncology 23 (Supplement 3), pg. 33- 43, DOI 10.93"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 1, "file": "frames/hx/pmh_001.jpg", "text": "Past Medical History HistoryTaking– CBS0201 JenniferNoborikawa,DACM,L.Ac,Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised1/3/24"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 2, "file": "frames/hx/pmh_002.jpg", "text": "Components of a History Subjective Chief Complaint HPI Past Medical History Family History Social/ Lifestyle/ Sexual Review of Systems Objective Assessment Plan"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 3, "file": "frames/hx/pmh_003.jpg", "text": "Past Medical History • Chronic conditions • Allergies • Hospitalizations • Trauma • Medications • FHx (FamilyHistory) • SHx (SurgicalHistory) • SoHx (Social History) • Sexual History • Review of Systems"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 4, "file": "frames/hx/pmh_004.jpg", "text": "F A O M A S H • F Family history • A Allergies • O Other illness (chronic conditions) and/ or other doctorsor specialists they may be seeing • Not necessarily related to their CC • M Medications • A Accidents • S Surgeries • H Hospitalizations"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 5, "file": "frames/hx/pmh_005.jpg", "text": "Family History • Immediatefamily • Age and health status of: Parents, Siblings, Children. Can ask about grandparents if history is known. • If deceased: what was the cause of death? • Note: If it appears illness is genetic (runs in family) may need to ask questions outside of the immediate family • Major focus of questions  does anyone in your family have a history of or currently has: diabetes, heart disease, strokes, cancer, arthritis, or any other disease/condition? • Remember to express empathy – if there is mention of a family member who is deceased or currently suffering as a result of a health condition."}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 6, "file": "frames/hx/pmh_006.jpg", "text": "Allergies Allergy status should be confirmed for each patient, at each visit. And for certain before prescribing any medication. • Medications : OTC, Rx, Herbs/Supplements • Latex • Environment: Seasonal (hay fever), Pet dander, Dust, Insects (bees),Etc. • Foods: Peanuts, Shellfish, Strawberries, Chocolate, Etc. • If any allergies: what type of reactions? • eg: Hives, swelling, airway obstruction, …. etc"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 7, "file": "frames/hx/pmh_007.jpg", "text": "Other Illnesses/Conditions or Doctors • What other diagnoses / conditions does the patient have? • Including childhood illness (obviously moreimportant for pediatric and young adult interviews). • For an adult with valvular heart disease, it would be important to know if they had rheumatic fever as a child. • When was the condition diagnosed? Is it currently being treated? How?"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 8, "file": "frames/hx/pmh_008.jpg", "text": "Other Chronic Illness • Does the patient have a history of, or are they being treated for any other chronic conditions i.e. • Hypertension • Diabetes • Heart Disease • COPD • Peripheral artery disease • Thyroid disorders • GI disorders • Mental Health conditions • Orthopedic conditions • Cancer"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 9, "file": "frames/hx/pmh_009.jpg", "text": "Is the patient being followed by or treated by any other physicians or specialists? • Chiropractor • Acupuncturist • Cardiologist • Endocrinologist • Dermatologist • Nephrologist • Psychologist or Psychiatrist • Neurologist • Gastroenterologist • Rheumatologist • Pulmonologist • Vascular Surgeon • Ophthalmologist • Naturopathic Doctor • Oncologist"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 10, "file": "frames/hx/pmh_010.jpg", "text": "Medications • Rx, OTCs, Herbs, Supplements, Vitamins, Minerals, Immunizations • What is currently being taken? • Why is it being utilized? • Dosage = amount and frequency? • How long? (meaning when did you start taking the med?) • List immunizations, date and reaction if any • Best to use immunization card as a template if available. If not document as: “per patient recall”"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 11, "file": "frames/hx/pmh_011.jpg", "text": "Accidents • When did they occur? • How did they happen? • What were the injuries? • Was there medical attention or care? • Have injuries healed completely or still ongoing?"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 12, "file": "frames/hx/pmh_012.jpg", "text": "Surgeries • Which procedure? • When did they occur? • What was the reason? • Results? • Complications?"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 13, "file": "frames/hx/pmh_013.jpg", "text": "Hospitalizations • When? • Why – what was the reason/the discharge diagnosis? • Duration of admission? • What type of treatmentreceived? • Procedures/ Tests/ Specialty consults (if known) • Residual problems? • Hospitalizations and surgeries are not synonymous, you cannot ask one to cover both"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 14, "file": "frames/hx/pmh_014.jpg", "text": "Social (Lifestyle) and Sexual History • Social and Sexual history - will be discussed in a future lecture"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 15, "file": "frames/hx/pmh_015.jpg", "text": "Review of Systems • Review of Systems – will be addressed in a future lecture."}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 16, "file": "frames/hx/pmh_016.jpg", "text": "So what exactly does all this look like?"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 17, "file": "frames/hx/pmh_017.jpg", "text": "What NOT to do!! • https://www.youtube.com/watch?v=r842Ylpa-nQ"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 18, "file": "frames/hx/pmh_018.jpg", "text": "Clinicians Corner: Some tips to consider when interviewing a patient. • https://www.youtube.com/watch?v=4wfjSfoHwl4"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 19, "file": "frames/hx/pmh_019.jpg", "text": "Let’s practice"}, {"deck": "pmh", "deckname": "PastMedicalHistory", "page": 20, "file": "frames/hx/pmh_020.jpg", "text": "Sample Write-up • 66-year-old male, retired engineer returns for follow up of chronic low back pain which started 6 months ago. He describes the pain as a “dull aching” type pain. Patient reports pain is improving over the past month, since he started seeing a chiropractor once/ week. Now he reports his back pain level has decreased to 3/10 (down from 8-9/10, at the onset, six months ago), and some days he is pain free. He denies falls or trauma to his back. Pain is worse after repeated bending and , i.e. working in his garden, and leaning over the engine of an antique car he is trying to restore. Denies numbness or tingling in extremities and denies radiation of his pain. Occasionally takes (1) Naprosyn 220mg tablet/d, takes approx. 4 tabs/ month, which offers mild temporary relief of his pain. No noticeable variation of pain throughout the day. Able to complete ADL’s without problems. • Allergies: No known drug allergies • Immunizations: Prevnar 13 – 8/2017 at CVS pharmacy • Medications: Multiple vitamin 1 daily and Naprosyn 220mg/d PRN • Hospitalizations: 2004 for cholecystectomy (laparoscopic) • Trauma: No major accidents • Family History: Father died of lung cancer at age 69, Mother had hypertension, and died at age 75 as a result of a stroke"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 1, "file": "frames/hx/soap_001.jpg", "text": "HPI, SOAP Note Components, Medical Abbreviations, and Patient Narrative History Taking – CBS0201 Jennifer Noborikawa, DACM, L.Ac, Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised 1/3/24"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 2, "file": "frames/hx/soap_002.jpg", "text": "Objectives of the Lecture Examine portions of the “SOAP” note Determine the findings associated with the chief complaint. Identify the question categories associated with a History of Present Illness Identify key components of a history Review of appropriate strategies to foster a positive doctor-patient encounter"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 3, "file": "frames/hx/soap_003.jpg", "text": "Build on what you have already learned… • As you conduct the interview, remain cognizant of the messages you are portraying (verbal and non-verbal) • Are you engaged with your patient? • Will they believe they can trustyou? • Will they believe you are listening to them? • Are you being empathetic?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 4, "file": "frames/hx/soap_004.jpg", "text": "THE SOAP NOTE A method to compile information and document data"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 5, "file": "frames/hx/soap_005.jpg", "text": "SOAP – 4 Main Sections • Subjective – The History section (HPI) • Contains the chief complaint and History of present illness • The patient’s perception of the problem • The patient’s description of how problem has evolved • Objective – Values, Physical Exam (PE), Data gathered • Assessment – Diagnoses, Differential Dx’s • Plan – Action plan"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 6, "file": "frames/hx/soap_006.jpg", "text": "Subjective"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 7, "file": "frames/hx/soap_007.jpg", "text": "The History Section Subjective – The History Section • Contains the chief complaint and History of present illness (HPI) • The patient’s perception of the problem • The patient’s description of how problem has evolved • Will also include their past medical history, social and sexual history"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 8, "file": "frames/hx/soap_008.jpg", "text": "Components of a History Your documentation should paint a picture. With proper documentation any clinician should be able to read the HPI and have a relatively clear picture of why the patient presented to you for evaluation."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 9, "file": "frames/hx/soap_009.jpg", "text": "Historian Reliability Who is giving you the information? Patient Not Patient • Alert • Competent • Mental capacity/impairment • Medications, substanceuse, stress • Intact memory • Alzheimer’s, dementia • Who? • Parent • Caretaker • Translator • Informed, trustworthy, reliable"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 10, "file": "frames/hx/soap_010.jpg", "text": "You and your patient are working together to put the pieces of the puzzle together, to arrive at the goal of a diagnosis."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 11, "file": "frames/hx/soap_011.jpg", "text": "Components of a History Subjective Chief Complaint HPI Past Medical History Famil History Social/ Lifestyle/ Sexual Review of Systems Objective Assessment Plan"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 12, "file": "frames/hx/soap_012.jpg", "text": "Chief Complaint (CC)"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 13, "file": "frames/hx/soap_013.jpg", "text": "Chief Complaint • This is the response from the patient to the question… Can you • “So , what brings you in today?” • “Hello , how can I help you today?” • “Hi , I understand you are experiencing today. tell me more about that? Even if the CC is listed on the intake form – confirm the problem. Ask the patient to reiterate the complaint for accuracy."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 14, "file": "frames/hx/soap_014.jpg", "text": "Chief Complaint • When possible, attempt to directly quote the patient’s own words. “Mrs. Smith reports, “it feels like there is a brick resting on my right upper back and shoulder area”."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 15, "file": "frames/hx/soap_015.jpg", "text": "Chief Complaint • The person providing the history is referred to as the historian • In some instances, the chief complaint is described by the caregiver for children, or patients incapable of responding. If that is the case, document the source of the information. • Ex: Caregiver (Niece, Doris Jones) reports • Brought in by Mother today, she states Johnny is experiencing"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 16, "file": "frames/hx/soap_016.jpg", "text": "History of Present Illness (HPI) “The HPI is a complete, clear, chronologic description of the problem(s) prompting the patient’s visit…”"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 17, "file": "frames/hx/soap_017.jpg", "text": "History of Present Illness The chief HPI identifies (per the patient’s own description), the details of the problem(s) they areexperiencing. How they became aware of it? How is the problem affecting them? What impact has the problem had on their life? Arethey able to complete their usual dailyroutine?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 18, "file": "frames/hx/soap_018.jpg", "text": "What information should be included? As you learn about conditions and diseases, think about which questions you would need to ask, to obtain a response to identify symptoms related to a that particular condition of disease. “Is your back pain worse with standing or walking? “Have you experienced any numbness or weakness in your legs? Your sense of what constitutes important data will grow exponentially as you learn about the pathophysiology of disease."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 19, "file": "frames/hx/soap_019.jpg", "text": "LOPQRST = “The How” L: Location O: Onset of complaint P: Prior, Palliative, Provocative, Progression Q: Quality of pain R: Radiation S: Severity T: Timing"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 20, "file": "frames/hx/soap_020.jpg", "text": "HPI – LOPQRST - Location • Ask the patient the location of the complaint • Ask the patient to “Point to area of involvement” • Patients may use incorrect anatomical vocabulary"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 21, "file": "frames/hx/soap_021.jpg", "text": "HPI – LOPQRST - Onset • When did the problem start? • Day/Week/Month/Year • Time • Mode of Injury? • What were you doing? Details • How was it done?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 22, "file": "frames/hx/soap_022.jpg", "text": "HPI – LOPQRST - Prior • Is this the first time the patient has experienced this problem? • If not: • When was the first occurrence? • Frequency? • How often does it occur? • Duration? • How long has it last? • Treatments? • Have you been treated or tried anything previously for this condition? • Have you seen any other doctors for this problem?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 23, "file": "frames/hx/soap_023.jpg", "text": "HPI – LOPQRST - Progression Since it started has it: • Improved? • Worsened? • Stayed the same?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 24, "file": "frames/hx/soap_024.jpg", "text": "HPI – LOPQRST- Palliative • What have you tried to help the symptoms? • Medications • OTC • Prescriptions • Herbs/Supplements • Positions/Movements • Previous treatments - Massage/Chiropractor/PT • Surgeries • What was the most helpful?"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 25, "file": "frames/hx/soap_025.jpg", "text": "HPI – LOPQRST - Provocative • What makes the symptoms worse? • Position • Movement • Medications • Foods • Modalities • Surgeries • Time"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 26, "file": "frames/hx/soap_026.jpg", "text": "HPI – LOPQRST - Quality • Describe the symptom • Pain • Sharp/Dull/Achy/Burning • Throbbing/Pounding/Pulsating • Paresthesias • Numbness/Tingling/Pins & Needles • Weakness • Fatigue • Dizziness “What does your pain feel like? What words would you use to describe what you are experiencing (feeling)?”"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 27, "file": "frames/hx/soap_027.jpg", "text": "HPI – Radiation/Referral • Radiation • Does the symptom travel from the point of origin? (Explain what this means to the patient) • Referral • Is the symptom located in a different location than the actual cause of the symptom? “Point to where you experience the most discomfort (or pain). Does it move anywhere from there?”"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 28, "file": "frames/hx/soap_028.jpg", "text": "HPI – Severity • Number Scale (Visual Analogue Scale, VAS) from 0-10 • Pain at onset? • Current? • At its best? • At its worst? • Mild/Moderate/Severe • Mild – doesn’t interfere w/Activities of Daily Living • Moderate – starting to interferew/ADLs • Severe – severely restricting ADLs"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 29, "file": "frames/hx/soap_029.jpg", "text": "Numerical analogue scale Visual analoguescale"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 30, "file": "frames/hx/soap_030.jpg", "text": "HPI – Timing/ Temporal • Time of day/Week/Month/Season/Year • Constant or intermittent? • If intermittent: • Frequency of episodes • Duration of episodes “Is the discomfort constant? How often does the problem occur? Have you noticed a pattern? How long does each episode last?”"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 31, "file": "frames/hx/soap_031.jpg", "text": "Summary LOPPPPQRST • L -> location • O -> onset • P -> priors • P -> palliative • P -> provocative • P -> progression • Q -> quality • R -> radiation/referral • S -> severity • T -> Timing/temporal"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 32, "file": "frames/hx/soap_032.jpg", "text": "Example of documentation of a HPI • 45-year old female complains of • Intermittent • Sharp pain • Left anterior hip pain • After falling from a ladder yesterday • Also states • Experiencing left leg numbness • But no radiation • Pain is 8 out of 10, denies change since onset • Ibuprofen 200mg every 4 hours • has had no effect on pain • Pain is worse with weight bearing, improves with sitting down • Has not seen another doctors for the CC • No prior history of left hip pain or known problems"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 33, "file": "frames/hx/soap_033.jpg", "text": "Example of a history form"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 34, "file": "frames/hx/soap_034.jpg", "text": "Summary As you obtain information during a patient’s visit, remember you are: • Outlining a meaningful history to direct clinical decision making for assessment and appropriate management."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 35, "file": "frames/hx/soap_035.jpg", "text": "Remember… • 80-90% of the diagnosis comes from the history"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 36, "file": "frames/hx/soap_036.jpg", "text": "Other Components of Subjective Apart from the HPI, there are several other parts of the subjectivehistory: • Allergies • PMH (Past Medical History)- Chronic conditions, Trauma,Hospitalizations • FHx (Family History) • SHx (Surgical History) • SoHx (Social History) • Sexual History • Immunizations • Review of systems"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 37, "file": "frames/hx/soap_037.jpg", "text": "Objective"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 38, "file": "frames/hx/soap_038.jpg", "text": "Objective VITAL SIGNS STATUS UPON PROVIDER’S PRESENTATION I.E. APPEARANCE (NAD VS. IN DISTRESS, BREATHING PATTERN, BODY POSITION, BODY HABITUS, DEMEANOR. PHYSICAL EXAM LABORATORY DATA SECTION"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 39, "file": "frames/hx/soap_039.jpg", "text": "Writing a History - Abbreviations Please see .PDF in your Canvas"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 40, "file": "frames/hx/soap_040.jpg", "text": "Patient Narrative"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 41, "file": "frames/hx/soap_041.jpg", "text": "Putting it all together • Compiling the information from your well-taken history allows you to write a narrative • A narrative is the patient’s history written in paragraph form rather than bullet points • It should be logically composed and coherent."}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 42, "file": "frames/hx/soap_042.jpg", "text": "Sample Template for a Written HPI (Bates) HPI Template (Basic—one chief complaint): Opening statement: Chief complaint in light of the patient's clinical context • Elaborate description of the chief complaint • Accompanying symptomatology • Absent pertinent symptomatology • Pertinent past medical history, family history, or social history • Concluding statement: How the patient got to the care site"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 43, "file": "frames/hx/soap_043.jpg", "text": "Medical Abbreviations"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 44, "file": "frames/hx/soap_044.jpg", "text": "Medical Abbreviations • Medical abbreviations may be used in SOAP notes or sometimes patient narratives for ease/efficiency of notetaking • Please see medical abbreviation pdf on Canvas"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 45, "file": "frames/hx/soap_045.jpg", "text": "SOAP Note Video"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 46, "file": "frames/hx/soap_046.jpg", "text": "References • Bickley, Lynn S., (2017), Bates’ Guide to Physical Examination, 12th Edition, Philadelphia, PA, Wolters Kluwer • Coulehan, J. L., & Block, M. R. (2005). The medical interview: Mastering skills for clinical practice. Philadelphia: Davis. • Dr. Catherine H. Leduc, DC • Dr. Vanessa Smith, DACM, L.Ac, Dipl.OM"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 47, "file": "frames/hx/soap_047.jpg", "text": "Let’s Practice"}, {"deck": "soap", "deckname": "SOAP_Notes", "page": 48, "file": "frames/hx/soap_048.jpg", "text": "Practice for HPI - CC and L,O,P,(P,P,P)Q,R,S,T • Mrs. Davis has been in good health and asymptomatic until she fell last week in her garden. She tripped over a sprinkler head and since then she has been experiencing low back pain. She denies head injury or loss of consciousness. Initially she reports her pain was “pretty bad, I’d say a 9/10”, and it lasted all day. “I took (2) Tylenol Extra Strength tablets daily for 3 consecutive days and I have been applying “Icy Hot” and ice packs”. “ I am happy to report the pain has finally improved, it has only been level 2- 3/10 the past couple of days”. Mrs. Davis states, the pain doesn’t move anywhere but it does increase slightly if she lifts something heavy, and “it’s always worse at the end of the day”."}, {"deck": "abbrev", "deckname": "MedicalAbbreviations", "page": 1, "file": "frames/hx/abbrev_001.jpg", "text": "Commonly Used Abbreviations in Written Patient History Abbreviation Meaning Pt, pt ,pt. Patient y.o. Year-old M Male F Female W White B Black, African-American H Hispanic Other Ethnicities Written out L (often circled) Left R (often circled) Right LMP Last menstural period OB Obstetrics, obstetrical, obstetrician Gyne, Gyn Gynecologic, gynecological, gynecology, gynecologist IUD Intrauterine device BCPs Birth control pills GPA System G Gravidus, L. pregnancy P Paritus, L. parturition, birth A, Ab Abortus, L. Abortion, which includes miscarriages e.g. G4P3A1 = 4 Pregnancies, 3 births, 1 abortion or miscarriage G0 Nulligravida (n), nulligravidous (adj.) – patient has never been pregnant P0 Nullipara (n.), nulliparaous (adj.) – patient has never given birth G1 Primigravida (n.), primigravidous (adj.) – first pregnancy P1 Prmipara, primip, (n) primiparous (adj.) – first birth Multigravida, multigravidous No abbreviation – had multiple pregnancies Multipara, multip, multiparous No Abbreviation – had multiple births h/o History of c/o Complains of s/p Status post, after – usually used following an event like surgical procedure, injury or illness e.g.: 6d s/p MI, 1wk s/p appendectomy D Day, days Wk, wk. (wks) Week (weeks) Mo, mo. (mos, mos.) Month (months) Yr, yr. (yrs, yrs.) Year (years) Hr, hr., (hrs, hrs.) Hour (hours) 𝑐̅ With 𝑠̅ Without"}, {"deck": "abbrev", "deckname": "MedicalAbbreviations", "page": 2, "file": "frames/hx/abbrev_002.jpg", "text": "𝑝̅ After Δ Change Ø None N/A Not applicable Rx Prescription Sig Directions BID, b.i.d Bis in die, twice a day TID, t.i.d Ter in die, three times a day QID, q.i.d Quarter in die, four times a day Q Quaque, every, each, per QD Every day, write out daily to avoid confusion On JCAHO forbidden list QOD Every other day write out every other day to avoid confusion Prn Pro re nata, as needed PO Per os, by mouth NPO Nil per os, nothing by mouth NKA No known allergies NKDA No known drug allergies OTC Over-the-counter medications EtOH Alcohol Tx Treatment or therapy Hx History Dx Diagnosis S/S Symptoms and Signs (or signs and symptoms) R/O Rule out SOB Shortness of breath DOB Date of birth DOE Dyspnea on exertion DOA Dead on arrival DNR Do not resuscitate HA Headache MI Myocardial infarction CHF Congestive heart failure HTN Hypertension COPD Chronic obstructive pulmonary disease GERD Gastroesophogeal reflux disease T1D Type 1 Diabetes T2D Type 2 Diabetes NAD No acute distress STD(s) STI(s) Sexual transmitted disease(s) Sexual transmitted infection(s) GI Gastrointestinal GU Genitourinary RUQ Right upper quadrant (of abdomen)"}, {"deck": "abbrev", "deckname": "MedicalAbbreviations", "page": 3, "file": "frames/hx/abbrev_003.jpg", "text": "LUQ Left upper quadrant RLQ Right lower quadrant LLQ Left lower quadrant N/V Nausea/vomiting N/V/D Nausea/vomiting/diarrhea URI Upper respiratory infection UTI Urinary tract infection WNL Within normal limits"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 1, "file": "frames/hx/ros_001.jpg", "text": "Review of Systems and Assessment History Taking – CBS0201 Jennifer Noborikawa, DACM, L.Ac, Dipl.[O]M Revised by Matthew Miller DC, CCSP®, ATC Revised 1/3/24"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 2, "file": "frames/hx/ros_002.jpg", "text": "Objectives • Describe the purpose for performing a Review Of Systems • Highlight the importance of the Review of Systems as a component of the patient’s history • Identify the systems that should be addressed during the Review of Systems • Discover how information from the Review of Systems may offer additional information regarding the chief complaint, HPI or PMH • Determine the appropriate questions to ask related to the various systems."}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 3, "file": "frames/hx/ros_003.jpg", "text": "Components of a History Subjective Chief Complaint HPI Past Medical History Family History Social/ Lifestyle/ Sexual Review of Systems Objective Assessment Plan"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 4, "file": "frames/hx/ros_004.jpg", "text": "ROS – Why ask? • Discussion of the various body organ systems that may uncover problems not already mentioned or pertinent negatives that may support your diagnosis or help streamline your differential diagnoses. • Sometimes patients leave out pertinent facts or pieces of their history, because they don’t realize the connection to a problem they may be experiencing. • To reveal the presence or absence of common symptoms related to major body systems. • Provides an opportunity to review the patient history in another format by asking ‘head to toe’ related questions."}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 5, "file": "frames/hx/ros_005.jpg", "text": "Format • Acceptable to use closed ended \"yes or no\" questions. • This part of the history may seem cumbersome to you initially, but with practice it you will begin to flow through it fairly succinctly. • Questions in the ROS will vary based on the patient’s age, complaints and general state of health based on your clinical judgement. • You may often uncover major health events during the ROS that should be added to the History of Present illness or Past MedicalHistory. • The questions of the Review of Systems can be asked during the physical exam of that body area. Ex: GI system questions can be asked during the abdominal exam, or Musculoskeletal questions can be asked during the spine exam"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 6, "file": "frames/hx/ros_006.jpg", "text": "Transitioning into the ROS • “I’d like next to ask some general questions about your health to make sure I haven’t missed anything.” • “I’d like you to think about things that may have bothered you recently or in the last year (if annual exam).” • “Since our time is limited, let me ask you about these concerns while I do your exam. Would that be okay?”"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 7, "file": "frames/hx/ros_007.jpg", "text": "Systems in Review of Systems • Constitutional/ General • Skin • HEENT • Cardiovascular • Respiratory • Gastrointestinal • Genitourinary • Musculoskeletal • Neurologic • Psychiatric • Endocrine • Hematologic/Lymphatic"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 8, "file": "frames/hx/ros_008.jpg", "text": "Stay organized & move through your list in an organized fashion Generally, working top down is helpful."}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 9, "file": "frames/hx/ros_009.jpg", "text": "General • Change in weight: • i.e. Unintentional weight loss? Weight gain ? • Weakness • Fatigue • Fever • Night sweats • Change in sleep patterns"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 10, "file": "frames/hx/ros_010.jpg", "text": "Skin • Rashes, lumps, sores, itching, dryness, color change of skin (cyanosis, rubor, jaundice) moles or lesions • A - asymmetry • B - borders • C - color • D – diameter • E – evolving (is the lesion changing?) • Changes in hair (growth/loss, oily/dry, color) or nails (cracking, spooning, clubbing, color, growth)"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 11, "file": "frames/hx/ros_011.jpg", "text": "https://www.google.com/url?sa=i&source=imgres&cd=&cad=rj a&uact=8&ved=2ahUKEwjg9IDD- JLeAhWCgFQKHd8UABkQjRx6BAgBEAU&url=https%3A%2F%2F www.txid.org%2F%3Fpage_id%3D3412&psig=AOvVaw0AeOME A-VqZh-11S0hhr1K&ust=1540053506325545"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 12, "file": "frames/hx/ros_012.jpg", "text": "Head • Head/Face pain • Injuries • Symmetry of face"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 13, "file": "frames/hx/ros_013.jpg", "text": "Eyes • Corrective lenses? – Glasses, Reading glasses or contact lenses (confirm no eye surgeries) • Visual changes: Blurry, scotomas, diplopia, auras, floaters, halos, photophobia • Pain • Tearing or dryness • Redness, irritation, Discharge • Glaucoma, cataracts • Treatments? (i.e. injections for MD) • Last eye exam?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 14, "file": "frames/hx/ros_014.jpg", "text": "Ears • Hearing aids? • Changes in hearing • Tinnitus • Vertigo • Pain, Discharge, Itchy • Hx of Infection"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 15, "file": "frames/hx/ros_015.jpg", "text": "Nose & Sinuses • Frequent colds/sinus infections • Runny nose, congestion, pain, itchy, epistaxis • Sense of smell"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 16, "file": "frames/hx/ros_016.jpg", "text": "Mouth and Throat • History of dental work • Dentures or partials • Bleeding or irritation of the gums • Difficulty chewing, swallowing • Pain, irritation • Frequent sore throats • Hoarseness • Dry mouth • Last dental appt • Dysgeusia (paraguesia) or aguesia = distortion of taste or loss of taste"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 17, "file": "frames/hx/ros_017.jpg", "text": "Neck • Swollen glands/ lymph nodes • Pain • Stiffness • Lumps • Goiter • History of thyroid problems"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 18, "file": "frames/hx/ros_018.jpg", "text": "Cardiovascular • “Heart trouble” • Chest pain • Palpitations • Dyspnea – PND? (paroxysmal nocturnal dyspnea?) • Orthopnea (# of pillows?), sitting up to sleep? • Edema – hands, ankles, feet? • History of murmurs, Hypertension, CHF, MI, Afib? • Cyanosis • Exercise intolerance • Fatigue • Past ECG? ECHO? Nuclear medicine test? Other cardiac procedures?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 19, "file": "frames/hx/ros_019.jpg", "text": "Respiratory • Cough • Sputum (color, quantity, frequency) • Hemoptysis • Dyspnea (SOB) • Wheezing pleuritic pain) • Cyanosis • Chest X-ray • Asthma • How well controlled? • COPD • Pneumonia • Pain (any pain w/ breathing, i.e. • TB • Pastmedications?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 20, "file": "frames/hx/ros_020.jpg", "text": "Gastrointestinal • Dysphagia • Heartburn • Nausea • Regurgitation • GERD • Change in appetite, weight loss • Belching/gas • Abdominal Pain • Gallstones, hepatitis, cirrhosis • Pancreaticdisorders • Cancer • Change in stool color, size, consistency • Constipation • Diarrhea • Food intolerance • Hematochezia, melena/Blood in stools • Hemorrhoids • Last Colonoscopy?–result?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 21, "file": "frames/hx/ros_021.jpg", "text": "Urinary (GU) • Frequency • Dysuria (difficult urination/ painful urination) • Retention • Polyuria • Nocturia • Flank pain • Suprapubic pain • Color, odor, D/C • Hematuria • Decreased strength of flow • Dribbling, hesitance • Stones, incontinence • Known prostate problems or elevated PSA • Cancer"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 22, "file": "frames/hx/ros_022.jpg", "text": "Genital • Male • Hernia • Circumcised • STI • Penile discharge, lesions or ulcerations • Sexual dysfunction • Performance • Desire • Pain • Pain • Penile • Scrotal • Deformities (or perceived deformities) • Masses • Female • Age of menarche • Regularity, frequency, duration of menses • Bleeding between • Incontinence • STIs • Vaginal Itching • Discharge • Pregnancies • Last PAP"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 23, "file": "frames/hx/ros_023.jpg", "text": "Musculoskeletal • Muscle/joint/bone pain, stiffness, weakness, instability • Neck or back pain • Injury • Altered/restricted ROM – assistance? Cane, walker, wheel-chair? Prosthetics? • Edema • Bony deformity • Systemic symptoms associated w/ joint pain – i.e. fever, chills, rash, weight loss or weakness"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 24, "file": "frames/hx/ros_024.jpg", "text": "Peripheral Vascular • Any muscle pain (intermittent claudication), or leg cramps? • Any varicose veins? • Have you ever had clots in your veins? • Any swelling in your calves, legs, or feet? • Any changes in the color of your fingertips or toes during cold weather? • Any swelling with redness or tenderness?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 25, "file": "frames/hx/ros_025.jpg", "text": "Neurologic • Changes in mental status • Fainting, lightheadedness • Recurrent falls • HAs, dizziness, numbness, paresthesia (“pins & needles”), paresis, paralysis • Tremors, Involuntary movements, Seizures"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 26, "file": "frames/hx/ros_026.jpg", "text": "Psychiatric • Changes in mood • Depressed, anxious, tension, memory change • Difficulty concentrating • Insomnia/sleep disturbances • Thoughts of suicide, plan, previous attempts, PHQ- 9 if not already done (compare with previous scores if available) • Previous or current psychotherapy • Psychiatric admissions"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 27, "file": "frames/hx/ros_027.jpg", "text": "Endocrine • Thyroid masses, enlarged, tender • Heat or cold intolerance • Excessive sweating, fatigue • Hunger, thirst, unexplained weight changes • Change in face or body hair, fat distribution • Weight changes • Energy level changes • Trouble sleeping • Changes in skin color (i.e. Addison’s)"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 28, "file": "frames/hx/ros_028.jpg", "text": "Hematologic/ Lymphatic • Anemia? • Past Transfusion (reactions to transfusion)? • Leukemia? • Easy bruising/bleeding • History of blood clots • On a “Blood Thinner” - on anticoagulation therapy? • Why?... Clot, A. Fib or stroke?"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 29, "file": "frames/hx/ros_029.jpg", "text": "The Big Picture • As you develop a keen understanding of the functions of the various systems of the body, and learn the symptoms that manifest as a result of dysfunction; you will come to appreciate the beauty of review of symptoms as a tool to assist you in both disease management and prevention for the patients you serve."}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 30, "file": "frames/hx/ros_030.jpg", "text": "VIDEO • https://youtu.be/3ogLfVVRU04"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 31, "file": "frames/hx/ros_031.jpg", "text": "Assessment • Once you have completed the history and physical exam you reach the point in the visit when you need to analyze the data you have available to you and determine the patient’s problems. • This is when you apply your skill as a clinician to move from you from description and observation to analysis and interpretation. • Your clinical reasoning process is vital as this is what helps you interpret your findings, set forth the problems and move from each problem to its action plan. • *As you progress in the program you will learn the pathophysiology about disease states which will help you hone your skills as a clinician*"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 32, "file": "frames/hx/ros_032.jpg", "text": "Steps for Identifying Problems and Making Diagnoses • Identify abnormal findings. • Localize findings anatomically. • Cluster the clinical findings. • Search for the probable cause of the findings. • Cluster the clinical data. • Generate hypotheses about the causes of the patient’s problems • Test the hypotheses and establish a working diagnosis Bates’ Guide to Physical Examination and History Taking"}, {"deck": "ros", "deckname": "ReviewOfSystems", "page": 33, "file": "frames/hx/ros_033.jpg", "text": "References • Bickley, Lynn S., (2017), Bates’ Guide to Physical Examination, 12th Edition, Philadelphia, PA, Wolters Kluwer • Ball, Jane W., Dains, Joyce E., Flynn, John A., Solomon, Barry S., Stewart, Rosalyn W., (2015), Seidel’s Physical Examination Handbook, 8th Edition, St. Louis, MO, Elsevier • Swartz, Mark H., (2014), Textbook of Physical Diagnosis, 7th Edition, Philadelphia, PA, Elsevier • Review of Symptoms - Dr. Catherine H. Leduc, DC • Review of Systems – Dr. Vanessa Smith, DACM, L.Ac, Dipl.OM"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 1, "file": "frames/hx/sexual_001.jpg", "text": "fenwayhealth.org Taking a Sexual History with Sexual and Gender Minority Individuals Julie Thompson, PA-C Medical Director of Trans Health, Fenway Health March 2020"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 2, "file": "frames/hx/sexual_002.jpg", "text": "fenwayhealth.org OBJECTIVES 1. Review terminology and recognize the diversity of gender identities and sexual orientation 2. Describe barriers to care experience in the LGBT communities and how these directly impact health disparities 3. Provide recommendations on how to talk about sex and bodies with cultural competency and humility 4. Recommend tips for a trauma-informed approach to care"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 3, "file": "frames/hx/sexual_003.jpg", "text": "fenwayhealth.org SEX AND GENDER Sex and gender core determinants of health Sex – biological differences ▪Anatomy, chromosomes, hormones, genes, etc. Gender – social and cultural distinctions ▪Multidimensional ▪Psychological, social, behavioral ▪Gender identity, gender expression, gender roles"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 4, "file": "frames/hx/sexual_004.jpg", "text": "fenwayhealth.org SEXUAL ORIENTATION AND GENDER IDENTITY ARE NOT THE SAME ▪All people have a sexual orientation and gender identity ▪How people identify can change ▪Terminology varies Gender Identity ≠ Sexual Orientation Sexual Orientation Gender Identity"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 5, "file": "frames/hx/sexual_005.jpg", "text": "fenwayhealth.org SEXUAL ORIENTATION Sexual orientation: how a person identifies their physical and emotional attraction to others ▪Identity ▪Straight, gay, lesbian, bisexual, queer, other ▪Desire/Attraction ▪Behavior ▪Men who have sex with men- MSM (MSMW) ▪Women who have sex with women- WSW (WSWM) Identity Do you consider yourself gay, lesbian, bisexual, straight, queer, something else? Attraction What gender(s) are you attracted to physically and emotionally? Behavior What gender(s) are your sexual partner(s)? Dimensions of Sexual Orientation:"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 6, "file": "frames/hx/sexual_006.jpg", "text": "fenwayhealth.org GENDER IDENTITY AND GENDER EXPRESSION Gender identity ▪A person’s internal sense of their gender (do I consider myself male, female, neither, both?) Gender Expression ▪How one presents themselves through their behavior, mannerisms, speech patterns, dress, hairstyles, etc * May change"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 7, "file": "frames/hx/sexual_007.jpg", "text": "fenwayhealth.org TERMINOLOGY Transgender: Gender identity not congruent with the assigned sex at birth - Alternate terminology Trans vs cis ▪Transgender woman, trans feminine individual, a woman of trans experience (MtF) ▪Transgender man, trans masculine individual, a man of trans experience (FtM) ▪Non-binary, genderqueer - AMAB = assigned male at birth - AFAB = assigned female at birth"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 8, "file": "frames/hx/sexual_008.jpg", "text": "fenwayhealth.org NON-BINARY IDENTITIES James, S. E., Herman, J. L., Rankin, S., Keisling, M., Mottet, L., & Anafi, M. (2016). The Report of the 2015 U.S. Transgender Survey. Washington, DC: National Center for Transgender Equality."}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 9, "file": "frames/hx/sexual_009.jpg", "text": "fenwayhealth.org GENDER DIVERSITY ▪Gender identity is often described as being on a spectrum, but perhaps more accurately as a spectrum or constellation"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 10, "file": "frames/hx/sexual_010.jpg", "text": "fenwayhealth.org SEXUAL ORIENTATION OF GENDER DIVERSE INDIVIDUALS 2015 US Trans Survey"}, {"deck": "sexual", "deckname": "Fenway_SexualHx", "page": 11, "file": "frames/hx/sexual_011.jpg", "text": "fenwayhealth.org “LGBT individuals encompass all races and ethnicities, religions, and social classes. Sexual orientation and gender identity questions are not asked on most national or State surveys, making it difficult to estimate the number of LGBT individuals and their health needs. Research suggests that LGBT individuals face health disparities linked to societal stigma, discrimination, and denial of their civil and human rights. Discrimination against LGBT persons has been associated with high rates of psychiatric disorders, substance abuse, and suicide. Experiences of violence and victimization are frequent for LGBT individuals, and have long-lasting effects on the individual and the community. Personal, family, and social acceptance of sexual orientation and gender identity affects the mental health and personal safety of LGBT individuals. The LGBT companion document to Healthy People 2010 highlighted the need for more research to document, understand, and address the environmental factors that contribute to health disparities in the LGBT community.
