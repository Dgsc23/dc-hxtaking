<script>
var DATA=[
  {cat:'Interview & Communication', title:'Medical interview - 3 functions', s:['Objective: recall the 3 main functions of the medical interview (Cole & Bird). Say it out loud now, then I’ll give it back.', 'Answer: The medical interview has 3 main functions (Cole & Bird): (1) Build the relationship, (2) Assess and understand, (3) Collaborate for management.\n\nBuild the relationship = develop rapport, establish mutual respect, establish trust, and convey empathy and compassion. Assess and understand = questioning and data gathering. Collaborate for management = patient education.\n\nDuring the interview and physical exam you gather data to generate a hypothesis for the cause of the problem and collect information to develop a management plan; this helps generate a differential diagnosis (road map to the cause) and the primary diagnosis.\n\nOsler: \'Listen to your patient, they might be telling you their diagnosis.\' The SOAP/HPI deck states 80-90% of the diagnosis comes from the history (the Intro deck cites ~80%).']},
  {cat:'Interview & Communication', title:'Empathy, compassion, sympathy; non-verbal communication', s:['Objective: recall the definitions of empathy, compassion, and sympathy, and the role of non-verbal communication. Say it out loud now, then I’ll give it back.', 'Answer: Empathy = the ability to understand and share the feelings of another; putting yourself in the other person\'s shoes. Compassion = \'sympathetic consciousness of others\' distress together with a desire to alleviate it.\' Sympathy = entering into or sharing another\'s feelings; feeling pity or sorrow for another\'s hardships.\n\nThe nonverbal behavior of the physician contributes significantly to the overall quality of the doctor-patient relationship.\n\nQuiet, attentive listening conveys interest and builds rapport more powerfully than virtually any other action or utterance the physician can make.\n\nDoctors who establish appropriate eye contact are more likely to detect emotional distress; doctors who lean forward and have an open body posture have more satisfied patients.\n\nFrom the patient\'s perspective, listening is a defining feature of a \'good\' doctor (enables accurate diagnoses, maintains the relationship, acts as a therapeutic agent); good relationships lead to patients who are more satisfied and more likely to adhere to treatment (Roter & Hall, 2009).']},
  {cat:'SOAP & Documentation', title:'SOAP - 4 main sections', s:['Objective: recall the 4 sections of a SOAP note and what each contains. Say it out loud now, then I’ll give it back.', 'Answer: SOAP has 4 sections: Subjective, Objective, Assessment, Plan.\n\nSubjective = the History section (HPI); contains the chief complaint and history of present illness, the patient\'s perception of the problem, and how the problem has evolved. It also includes past medical history, social history, and sexual history.\n\nObjective = values, Physical Exam (PE), and data gathered (vital signs; status/appearance on presentation; physical exam; laboratory data).\n\nAssessment = diagnoses and differential diagnoses (Dx\'s). Plan = the action plan.']},
  {cat:'History Components', title:'Components of a history and the historian', s:['Objective: recall the components of a history and what makes a reliable historian. Say it out loud now, then I’ll give it back.', 'Answer: Under Subjective, the full history includes: Chief Complaint, HPI, Past Medical History, Family History, Social/Lifestyle/Sexual, and Review of Systems.\n\nDocumentation should \'paint a picture\' - any clinician reading the HPI should have a relatively clear picture of why the patient presented.\n\nThe person providing the history is the \'historian.\' Consider reliability: a patient historian should be alert, competent, and have intact memory (impaired by medications, substance use, stress, Alzheimer\'s, or dementia); a non-patient historian (parent, caretaker, translator) should be informed, trustworthy, and reliable.']},
  {cat:'History Components', title:'Chief Complaint (CC)', s:['Objective: recall how to elicit and document the Chief Complaint. Say it out loud now, then I’ll give it back.', 'Answer: The CC is the patient\'s response to questions like \'So..., what brings you in today?\' Even if the CC is on the intake form, confirm the problem and ask the patient to reiterate it for accuracy. When possible, directly quote the patient\'s own words (e.g., \'it feels like there is a brick resting on my right upper back and shoulder area\').\n\nIf a caregiver provides the CC (children or patients unable to respond), document the source of the information (e.g., \'Caregiver (Niece, Doris Jones) reports...\').']},
  {cat:'History Components', title:'HPI definition and LOPQRST', s:['Objective: recall the definition of the HPI and every letter of LOPQRST. Say it out loud now, then I’ll give it back.', 'Answer: The HPI is \'a complete, clear, chronologic description of the problem(s) prompting the patient\'s visit.\'\n\nLOPQRST = \'The How.\' L: Location; O: Onset of complaint; P: Prior, Palliative, Provocative, Progression; Q: Quality of pain; R: Radiation; S: Severity; T: Timing. The expanded summary is LOPPPPQRST (priors, palliative, provocative, progression).\n\nLocation: ask where and have the patient point to the area (patients may use incorrect anatomical vocabulary). Onset: when it started (day/week/month/year, time) and mode of injury. Progression: since it started, improved, worsened, or stayed the same.\n\nPrior: first time or not; if not, first occurrence, frequency, duration, prior treatments, other doctors seen. Palliative: what has helped and what was most helpful. Provocative: what makes it worse (position, movement, medications, foods, modalities, surgeries, time).\n\nQuality: describe the symptom - pain (sharp/dull/achy/burning; throbbing/pounding/pulsating), paresthesias (numbness/tingling/pins & needles), weakness, fatigue, dizziness.\n\nRadiation = the symptom travels from its point of origin; Referral = the symptom is located in a different place than its actual cause.\n\nSeverity: 0-10 Numeric/Visual Analogue Scale (at onset, current, best, worst). Mild = doesn\'t interfere with ADLs; Moderate = starting to interfere; Severe = severely restricting ADLs. Timing/Temporal: constant or intermittent; if intermittent, note frequency and duration of episodes.']},
  {cat:'SOAP & Documentation', title:'Narrative, abbreviations, and other subjective components', s:['Objective: recall what a narrative is, the use of abbreviations, and the other subjective components. Say it out loud now, then I’ll give it back.', 'Answer: A narrative is the patient\'s history written in paragraph form (not bullet points), logically composed and coherent. Medical abbreviations may be used in SOAP notes or narratives for efficiency.\n\nBates\' basic HPI template: opening statement (CC in clinical context), elaborate description of the CC, accompanying symptomatology, absent pertinent symptomatology, pertinent PMH/FH/social history, and a concluding statement of how the patient got to the care site.\n\nOther subjective components beyond the HPI include allergies, PMH (chronic conditions, trauma, hospitalizations), FHx, SHx (surgical), SoHx (social), sexual history, immunizations, and review of systems.']},
  {cat:'History Components', title:'Past Medical History components and FAOMASH', s:['Objective: recall the Past Medical History components and every letter of FAOMASH. Say it out loud now, then I’ll give it back.', 'Answer: PMH components on the slides: chronic conditions, allergies, hospitalizations, trauma, medications, FHx (family history), SHx (surgical history), SoHx (social history), sexual history, and review of systems.\n\nThe slides DO spell out FAOMASH: F = Family history, A = Allergies, O = Other illness (chronic conditions) and/or other doctors/specialists seen (not necessarily related to the CC), M = Medications, A = Accidents, S = Surgeries, H = Hospitalizations.']},
  {cat:'History Components', title:'Family history, allergies, chronic illness, medications', s:['Objective: recall how to take family history, allergies, chronic illness, and medications. Say it out loud now, then I’ll give it back.', 'Answer: Family history focuses on immediate family (age and health status of parents, siblings, children; grandparents if known); if deceased, ask the cause of death. Major focus: does anyone have diabetes, heart disease, strokes, cancer, arthritis, or other conditions.\n\nAllergy status should be confirmed for each patient at each visit, and for certain before prescribing any medication; categories include medications, latex, environment, and foods; if allergic, ask the type of reaction (hives, swelling, airway obstruction).\n\nOther chronic illnesses to ask about: hypertension, diabetes, heart disease, COPD, peripheral artery disease, thyroid disorders, GI disorders, mental health conditions, orthopedic conditions, cancer. For medications ask: what is taken, why, dosage (amount and frequency), and how long; list immunizations with date and reaction (or document \'per patient recall\').']},
  {cat:'History Components', title:'Accidents, surgeries, hospitalizations', s:['Objective: recall how to ask about accidents, surgeries, and hospitalizations. Say it out loud now, then I’ll give it back.', 'Answer: Accidents: when they occurred, how they happened, the injuries, whether medical care was given, and whether injuries healed or are ongoing. Surgeries: which procedure, when, the reason, results, and complications.\n\nHospitalizations: when, why (reason/discharge diagnosis), duration, treatment received (procedures/tests/specialty consults), and residual problems. Hospitalizations and surgeries are NOT synonymous - you cannot ask one to cover both.']},
  {cat:'ROS', title:'ROS - Purpose', s:['Objective: recall the purpose of the Review of Systems. Say it out loud now, then I’ll give it back.', 'Answer: The Review of Systems is a discussion of the various body organ systems that may uncover problems not already mentioned, or pertinent negatives that support your diagnosis or help streamline your differential diagnoses.\n\nPatients often leave out pertinent facts of their history because they do not realize the connection to a problem; the ROS reveals the presence or absence of common symptoms of major body systems.\n\nThe ROS reviews the patient history in another format by asking \'head to toe\' related questions.']},
  {cat:'ROS', title:'ROS - Format', s:['Objective: recall the correct format and timing of the Review of Systems. Say it out loud now, then I’ll give it back.', 'Answer: It is acceptable to use closed-ended \'yes or no\' questions in the ROS.\n\nQuestions vary based on the patient\'s age, complaints, and general state of health, using your clinical judgement.\n\nROS questions can be asked during the physical exam of that body area (e.g., GI questions during the abdominal exam, musculoskeletal questions during the spine exam).\n\nYou may uncover major health events during the ROS that should be added to the History of Present Illness or Past Medical History.']},
  {cat:'ROS', title:'ROS - Systems list', s:['Objective: recall the full list of ROS body systems. Say it out loud now, then I’ll give it back.', 'Answer: Systems addressed: Constitutional/General, Skin, HEENT (Head, Eyes, Ears, Nose/Sinuses, Mouth/Throat, Neck), Cardiovascular, Respiratory, Gastrointestinal, Genitourinary, Musculoskeletal, Neurologic, Psychiatric, Endocrine, and Hematologic/Lymphatic.\n\nStay organized and move through your list in an organized fashion; generally, working top down is helpful.']},
  {cat:'ROS', title:'ROS - Skin ABCDE', s:['Objective: recall the skin ABCDE screen and what else the skin ROS covers. Say it out loud now, then I’ll give it back.', 'Answer: For skin lesions/moles, use ABCDE: Asymmetry, Borders, Color, Diameter, Evolving (is the lesion changing?).\n\nSkin screening also covers rashes, lumps, sores, itching, dryness, color change (cyanosis, rubor, jaundice), and changes in hair or nails (cracking, spooning, clubbing).']},
  {cat:'ROS', title:'ROS - Assessment / clinical reasoning', s:['Objective: recall the Assessment step and Bates\' process for identifying problems. Say it out loud now, then I’ll give it back.', 'Answer: After the history and physical, assessment is where you analyze the data and move from description and observation to analysis and interpretation.\n\nBates\' steps for identifying problems: identify abnormal findings, localize them anatomically, cluster the clinical findings, search for the probable cause, generate hypotheses, then test them to establish a working diagnosis.']},
  {cat:'Interview & Communication', title:'Therapeutic Qualities', s:['Objective: recall the three therapeutic qualities (Carl Rogers). Say it out loud now, then I’ll give it back.', 'Answer: Borrowed from psychologist Carl Rogers, three therapeutic qualities observed in practitioners with good clinical outcomes are Respect, Genuineness, and Empathy.\n\nRespect means accepting your patient as they are, not judging, and separating your personal feelings; Genuineness means being yourself and acknowledging your position as a student or lack of knowledge (e.g., referring out).']},
  {cat:'Interview & Communication', title:'Empathy vs Sympathy', s:['Objective: recall how empathy differs from sympathy. Say it out loud now, then I’ll give it back.', 'Answer: Empathy is the ability to understand and share the feelings of another - putting yourself in the other person\'s shoes - and is compared/contrasted with sympathy.\n\nBrene Brown: \'Rarely does a response make something better. What makes something better is a connection.\'']},
  {cat:'Interview & Communication', title:'4 Qualities of Empathy', s:['Objective: recall the four qualities of empathy. Say it out loud now, then I’ll give it back.', 'Answer: The four qualities of empathy are: Perspective Taking (validate the other\'s experience; their perspective is their truth), Staying out of Judgement, Recognizing the emotion in the other person, and Communicating the emotion back (\'I hear you; I see you; I get it\').']},
  {cat:'Interview & Communication', title:'Empathy improves outcomes', s:['Objective: recall the evidence that empathy improves patient outcomes. Say it out loud now, then I’ll give it back.', 'Answer: Patients who received emotional support/education after surgery or MI had fewer complications and were discharged about 2 days earlier than those who did not.\n\nMore empathetic/sympathetic practitioners have more satisfied patients, and satisfied patients are more likely to comply; an 8-hour communication training program improved care without lengthening visits.']},
  {cat:'Interview & Communication', title:'Levels of Empathic Response', s:['Objective: recall Coulehan\'s levels of empathic response. Say it out loud now, then I’ll give it back.', 'Answer: Coulehan\'s levels of response: positive levels are Interchangeable (accurately recognize and assess feelings/symptoms the patient expresses) and Additive (recognize both what the patient expresses and what they feel but do not express).\n\nNegative levels are Ignoring (not responding to the cognitive or emotional content) and Minimizing (responding at a lesser level than the patient\'s expressed concern).']},
  {cat:'Interview & Communication', title:'Efficiency & Empathy', s:['Objective: recall the balance of efficiency and empathy in the interview. Say it out loud now, then I’ll give it back.', 'Answer: As many as three quarters of all diagnoses can be made by history alone.\n\nA delicate balance of Efficiency, Empathy, and Efficacy: gather enough information in a timely manner, validate the patient\'s experience, and arrive at a conclusion so the patient leaves satisfied.']},
  {cat:'Cultural Competence & Humility', title:'Culture & Intersectionality', s:['Objective: recall the definitions of culture and intersectionality. Say it out loud now, then I’ll give it back.', 'Answer: Culture is the customary beliefs, social forms, and material traits of a racial, religious, or social group, plus shared attitudes, values, goals, and practices; it is affected by politics, class, gender, religion, age, and ethnicity.\n\nIntersectionality describes how race, class, gender, and other characteristics intersect and overlap, creating unique sets of experiences; understanding it helps you understand your patient\'s experience better.']},
  {cat:'Cultural Competence & Humility', title:'Cultural Competence vs Humility', s:['Objective: recall the difference between cultural competence and cultural humility. Say it out loud now, then I’ll give it back.', 'Answer: Cultural competence (Bates) is a set of attitudes, skills, behaviors, and policies that enable organizations and staff to work effectively in cross-cultural situations; it means being respectful and responsive to the health beliefs, practices, and cultural/linguistic needs of diverse populations.\n\nCultural humility (Bates) is a process requiring humility as individuals continually engage in self-reflection and self-critique as lifelong learners and reflective practitioners - \'the more you know about a particular culture, the more you realize you don\'t know.\'']},
  {cat:'Cultural Competence & Humility', title:'Cultural Humility requirements', s:['Objective: recall what cultural humility requires and the problem with competence. Say it out loud now, then I’ll give it back.', 'Answer: Cultural humility requires respect, acknowledging both differences and similarities, dynamic communication, and honest self-assessment; it commits to self-evaluation, fixing power imbalances, and developing partnerships/advocating for others.\n\nThe problem with \'competence\' is that it suggests culture can be reduced to a technical skill and results in lists of \'do\'s and don\'ts\' for treating patients of a given ethnic background.']},
  {cat:'Cultural Competence & Humility', title:'Cross-Cultural Approach & Goals', s:['Objective: recall the cross-cultural approach and the Golden Rule. Say it out loud now, then I’ll give it back.', 'Answer: A \'Cross Cultural Approach\' uses communication skills, awareness of cross-cutting cultural and social issues, and recognizing health beliefs as universal human beliefs, needs, and traits.\n\nThe Golden Rule: treat patients as we would want to be treated during periods of vulnerability and fear; patient centeredness is built on respect, sensitivity, composure, partnership, honesty, curiosity, and tolerance.']},
  {cat:'Sexual & Social', title:'Why take a sexual history', s:['Objective: recall why a sexual history is taken for all patients. Say it out loud now, then I’ll give it back.', 'Answer: Sexual health history is an important part of a routine medical exam for ALL patients, regardless of gender identity or sexual orientation.\n\nSexual health is integral to general health; it is associated with happiness, well-being, and longevity, and may indicate psychiatric or other medical disorders or the need for primary prevention (immunizations, contraception, PEP, PrEP).']},
  {cat:'Sexual & Social', title:'Sex vs Gender / SO vs GI', s:['Objective: recall the difference between sex and gender, and orientation vs gender identity. Say it out loud now, then I’ll give it back.', 'Answer: Sex refers to biological differences (anatomy, chromosomes, hormones, genes); gender refers to social and cultural distinctions (gender identity, expression, roles).\n\nSexual orientation and gender identity are NOT the same; all people have both, and how people identify can change.']},
  {cat:'Sexual & Social', title:'Establishing the relationship', s:['Objective: recall how to establish the relationship before a sexual history. Say it out loud now, then I’ll give it back.', 'Answer: Establish rapport with effective listening and mirroring (names, pronouns, body parts), an individualized/holistic approach, and by asking permission: ask if it is ok to discuss a sexual history and be transparent about why you are asking.\n\nStart all appointments with clothes ON, and approach trauma experiences slowly and at a time when support can be offered.']},
  {cat:'Sexual & Social', title:'Non-judgmental, patient-centered language', s:['Objective: recall how to use non-judgmental, patient-centered language. Say it out loud now, then I’ll give it back.', 'Answer: Take an anatomic inventory and establish which words you and the patient will use: \'When referring to your genitals, are there specific terms that you use?\'\n\nUse open-ended questions to capture diverse sexual behaviors, validate all practices by asking about both high and low risk activities (and pleasures), and avoid assumptions about what kinds of sex someone has.']},
  {cat:'Sexual & Social', title:'CDC 5 Ps and the 8 Ps', s:['Objective: recall the CDC 5 P\'s and the Fenway 8 P\'s. Say it out loud now, then I’ll give it back.', 'Answer: The CDC\'s 5 P\'s of the sexual history are: Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy.\n\nFenway expands these to 8 P\'s: Preferences, Partners, Practices, Protection for STIs, Past history of STIs, Pregnancy, Pleasure, and Partner Violence.']},
  {cat:'Sexual & Social', title:'Trauma-informed care', s:['Objective: recall the trauma-informed care approach and how to respond to disclosure. Say it out loud now, then I’ll give it back.', 'Answer: Any exam or procedure has the potential to be traumatizing; before the exam, review prior experiences, explain the purpose, offer to talk through the steps, and remind the patient \'You\'re in control here. If you want me to stop at any point, please let me know.\'\n\nResponding to disclosure: Listen and communicate belief (\'That must have been frightening\'), validate the decision to disclose, emphasize that violence is unacceptable, be clear the patient is not to blame (\'What happened is not your fault\'), and make a safety plan / provide resources.']},
  {cat:'Sexual & Social', title:'Ask everyone / reduce stigma', s:['Objective: recall why you ask everyone and how to reduce stigma. Say it out loud now, then I’ll give it back.', 'Answer: Ask ALL people and make it policy - asking everyone normalizes the questions; nearly 80% of providers believed patients would refuse to disclose orientation, but only about 10% of patients said they would refuse.\n\nEveryone has activities they find \'icky\'; we cannot eliminate our bias by pretending not to have any - the guidance is to \'find your Yucks and fix your face.\'']}
];
if(localStorage.getItem('dcDavidView')==='1'){var _w=document.querySelector('.wm');if(_w)_w.style.display='none';}
DATA.forEach(function(d,i){d._i=i;});
var SECTIONS=['Interview & Communication','Cultural Competence & Humility','SOAP & Documentation','History Components','ROS','Sexual & Social'];
document.getElementById('cnt').textContent=DATA.length+' objectives.';
var testMode=false, filter='__all', order=[], idx=0;
var catSel=document.getElementById('catSel');
function inFilter(d){return filter==='__all'||d.cat===filter;}
catSel.innerHTML='<option value="__all">All sections ('+DATA.length+')</option>'+SECTIONS.map(function(s){
  var n=DATA.filter(function(d){return d.cat===s;}).length; if(!n)return '';
  return '<option value="'+s.replace(/"/g,'')+'">'+s+' ('+n+')</option>';
}).join('');
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function build(){order=DATA.filter(inFilter).map(function(d){return d._i;});idx=0;render();}
function render(){
  if(!order.length)return;
  var d=DATA[order[idx]];
  document.getElementById('qtag').textContent=d.cat;
  document.getElementById('qttl').textContent=d.title;
  document.getElementById('qprompt').textContent=d.s[0];
  var ans=document.getElementById('qanswer');
  ans.textContent=d.s[1];
  var rev=document.getElementById('revealBtn');
  if(testMode){ans.classList.add('hidden');rev.classList.remove('hidden');}
  else{ans.classList.remove('hidden');rev.classList.add('hidden');}
  document.getElementById('prog').textContent='Objective '+(idx+1)+' of '+order.length;
  document.getElementById('secLab').textContent=d.cat;
  (function(){var oi=order[idx];var host=document.getElementById('qanswer');var mr=document.getElementById('hxmedia');if(!mr){mr=document.createElement('div');mr.id='hxmedia';mr.className='hx-mrow';host.parentNode.insertBefore(mr,host);}mr.innerHTML='';var sb=document.createElement('button');sb.className='hx-mbtn';sb.innerHTML='\uD83C\uDFA7 Hear it';sb.onclick=function(){hxSay((d.s[1]||d.s[0]||''),d.title);};mr.appendChild(sb);var s=window.HX_SLD&&window.HX_SLD[oi];if(s){var ib=document.createElement('button');ib.className='hx-mbtn sld';ib.innerHTML='\uD83D\uDDBC\uFE0F Slide';ib.onclick=function(){hxSlide(s);};mr.appendChild(ib);}})();
}
document.getElementById('revealBtn').onclick=function(){
  document.getElementById('qanswer').classList.remove('hidden');
  this.classList.add('hidden');
};
document.getElementById('nextBtn').onclick=function(){if(!order.length)return;idx=(idx+1)%order.length;render();};
document.getElementById('prevBtn').onclick=function(){if(!order.length)return;idx=(idx-1+order.length)%order.length;render();};
var testBtn=document.getElementById('testBtn');
testBtn.onclick=function(){testMode=!testMode;testBtn.textContent=(testMode?'\u{1F441} Test mode: ON':'\u{1F441} Test mode: OFF');testBtn.classList.toggle('on',testMode);render();};
catSel.onchange=function(){filter=catSel.value;build();};
build();
</script>

<style>
#hxbar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:1200;background:#0b1220;border-top:2px solid #38bdf8;padding:8px 12px;align-items:center;gap:9px;flex-wrap:wrap}
#hxbar .hb{background:#132132;color:#bae6fd;border:1px solid #24425c;border-radius:7px;padding:5px 9px;font-size:.72rem;cursor:pointer;font-family:inherit;font-weight:700}
#hxbar .hb:hover{background:#1c405c;color:#fff}
.hx-mrow{display:flex;flex-wrap:wrap;gap:7px;margin:9px 0 2px}
.hx-mbtn{background:rgba(56,189,248,.15);color:#7dd3fc;border:1px solid #38bdf8;border-radius:9px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit}
.hx-mbtn:hover{background:rgba(56,189,248,.32);color:#fff}
.hx-mbtn.sld{background:rgba(52,211,153,.15);color:#6ee7b7;border-color:#10b981}.hx-mbtn.sld:hover{background:rgba(52,211,153,.3)}
#hxslide{display:none;position:fixed;inset:0;z-index:1300;background:rgba(0,0,0,.9);align-items:center;justify-content:center;flex-direction:column;padding:14px;cursor:zoom-out}
#hxslideImg{max-width:100%;max-height:86vh;border-radius:8px;box-shadow:0 12px 44px rgba(0,0,0,.7);background:#fff}
</style>
<script id="hx-media-shared">
(function(){
 var vl=[],vA=null,vB=null,rate=1.0;
 function pickA(){return vl.find(function(v){return /microsoft.*ava.*natural/i.test(v.name);})||vl.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||vl.find(function(v){return /google us english/i.test(v.name);})||vl.find(function(v){return /en[-_]US/i.test(v.lang);})||vl.find(function(v){return /^en/i.test(v.lang);})||vl[0]||null;}
 function pickB(){return vl.find(function(v){return /microsoft.*emma.*natural/i.test(v.name);})||vl.find(function(v){return /microsoft.*(aria|jenny).*natural/i.test(v.name);})||vl.find(function(v){return /google uk english female/i.test(v.name);})||vA;}
 function load(){if(!window.speechSynthesis)return;vl=speechSynthesis.getVoices()||[];vA=pickA();vB=pickB();}
 if(window.speechSynthesis){load();speechSynthesis.onvoiceschanged=load;var t=0,iv=setInterval(function(){t++;load();if(vA||t>20)clearInterval(iv);},250);}
 window.hxRate=function(r){rate=r;Array.prototype.forEach.call(document.querySelectorAll(".hx-rate"),function(s){s.textContent=r.toFixed(2)+"x";});};
 window.hxStop=function(){if(window.speechSynthesis)speechSynthesis.cancel();};
 window.hxSay=function(text,label){if(!window.speechSynthesis){return;}speechSynthesis.cancel();
   var bar=document.getElementById("hxbar");if(bar)bar.style.display="flex";
   var lbl=document.getElementById("hxlabel");if(lbl)lbl.textContent="🎧 "+(label||"Read aloud");
   var u=new SpeechSynthesisUtterance(String(text).replace(/<[^>]+>/g," ").replace(/\s+/g," "));
   u.rate=rate;if(vA){u.voice=vA;u.lang=vA.lang||"en-US";}speechSynthesis.speak(u);};
 window.hxSayQA=function(q,a,label){if(!window.speechSynthesis)return;speechSynthesis.cancel();
   var bar=document.getElementById("hxbar");if(bar)bar.style.display="flex";
   var lbl=document.getElementById("hxlabel");if(lbl)lbl.textContent="🎧 "+(label||"Q & A");
   function strip(x){return String(x).replace(/<[^>]+>/g," ").replace(/\s+/g," ");}
   var uq=new SpeechSynthesisUtterance(strip(q));uq.rate=rate;if(vA){uq.voice=vA;uq.lang=vA.lang||"en-US";}
   var ua=new SpeechSynthesisUtterance(strip(a));ua.rate=rate;if(vB){ua.voice=vB;ua.lang=vB.lang||"en-US";}
   speechSynthesis.speak(uq);speechSynthesis.speak(ua);};
 window.hxGal=null;window.hxGi=0;
 window.hxSlide=function(fr){if(!fr)return;var arr=Array.isArray(fr)?fr:[fr];if(!arr.length)return;window.hxGal=arr;window.hxGi=0;
   document.getElementById("hxslideImg").src=arr[0];document.getElementById("hxslCount").textContent=arr.length>1?("1 / "+arr.length):"";
   document.getElementById("hxslNav").style.display=arr.length>1?"flex":"none";document.getElementById("hxslide").style.display="flex";};
 window.hxGalStep=function(d){if(!window.hxGal)return;window.hxGi=(window.hxGi+d+window.hxGal.length)%window.hxGal.length;
   document.getElementById("hxslideImg").src=window.hxGal[window.hxGi];document.getElementById("hxslCount").textContent=(window.hxGi+1)+" / "+window.hxGal.length;};
})();
</script>
<div id="hxbar">
 <span id="hxlabel" style="color:#7dd3fc;font-size:.8rem;font-weight:700;white-space:nowrap"></span>
 <button class="hb" onclick="hxRate(0.8)">0.8x</button><button class="hb" onclick="hxRate(1)">1x</button><button class="hb" onclick="hxRate(1.25)">1.25x</button><button class="hb" onclick="hxRate(1.5)">1.5x</button><button class="hb" onclick="hxRate(2)">2x</button>
 <span class="hx-rate" style="color:#bae6fd;font-size:.72rem;font-weight:700;min-width:42px;text-align:center">1.00x</span>
 <button class="hb" onclick="hxStop();document.getElementById('hxbar').style.display='none';">■ Stop</button>
</div>
<div id="hxslide" onclick="if(event.target===this)this.style.display='none'">
 <img id="hxslideImg" alt="slide">
 <div id="hxslNav" style="display:none;gap:16px;margin-top:12px;align-items:center">
  <button onclick="event.stopPropagation();hxGalStep(-1)" style="background:#132132;color:#bae6fd;border:1px solid #38bdf8;border-radius:8px;padding:8px 16px;cursor:pointer">&#8249;</button>
  <span id="hxslCount" style="color:#bae6fd;font-size:.85rem;font-weight:700"></span>
  <button onclick="event.stopPropagation();hxGalStep(1)" style="background:#132132;color:#bae6fd;border:1px solid #38bdf8;border-radius:8px;padding:8px 16px;cursor:pointer">&#8250;</button></div>
 <div style="position:fixed;top:12px;right:18px;color:#fff;font-size:26px;font-weight:800;pointer-events:none">&#215;</div>
</div>
