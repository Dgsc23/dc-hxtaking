<h1>&#9889; Written-Final Cram Sheet</h1>
<div class="sub">Every high-yield point from the CBS0201 lecture decks &mdash; for the 50-MC written final (Wed 7/29).</div>

<div class="wm">DC Study Supply &mdash; Dr. David Gramling, PhD</div>
<script>
var CRAM = [{"topic": "Medical interview - 3 functions", "points": ["The medical interview has 3 main functions (Cole & Bird): (1) Build the relationship, (2) Assess and understand, (3) Collaborate for management.", "Build the relationship = develop rapport, establish mutual respect, establish trust, and convey empathy and compassion. Assess and understand = questioning and data gathering. Collaborate for management = patient education.", "During the interview and physical exam you gather data to generate a hypothesis for the cause of the problem and collect information to develop a management plan; this helps generate a differential diagnosis (road map to the cause) and the primary diagnosis.", "Osler: 'Listen to your patient, they might be telling you their diagnosis.' The SOAP/HPI deck states 80-90% of the diagnosis comes from the history (the Intro deck cites ~80%)."], "source": "HxTaking_Intro.pdf"}, {"topic": "Empathy, compassion, sympathy; non-verbal communication", "points": ["Empathy = the ability to understand and share the feelings of another; putting yourself in the other person's shoes. Compassion = 'sympathetic consciousness of others' distress together with a desire to alleviate it.' Sympathy = entering into or sharing another's feelings; feeling pity or sorrow for another's hardships.", "The nonverbal behavior of the physician contributes significantly to the overall quality of the doctor-patient relationship.", "Quiet, attentive listening conveys interest and builds rapport more powerfully than virtually any other action or utterance the physician can make.", "Doctors who establish appropriate eye contact are more likely to detect emotional distress; doctors who lean forward and have an open body posture have more satisfied patients.", "From the patient's perspective, listening is a defining feature of a 'good' doctor (enables accurate diagnoses, maintains the relationship, acts as a therapeutic agent); good relationships lead to patients who are more satisfied and more likely to adhere to treatment (Roter & Hall, 2009)."], "source": "HxTaking_Intro.pdf"}, {"topic": "SOAP - 4 main sections", "points": ["SOAP has 4 sections: Subjective, Objective, Assessment, Plan.", "Subjective = the History section (HPI); contains the chief complaint and history of present illness, the patient's perception of the problem, and how the problem has evolved. It also includes past medical history, social history, and sexual history.", "Objective = values, Physical Exam (PE), and data gathered (vital signs; status/appearance on presentation; physical exam; laboratory data).", "Assessment = diagnoses and differential diagnoses (Dx's). Plan = the action plan."], "source": "SOAP_Notes.pdf"}, {"topic": "Components of a history and the historian", "points": ["Under Subjective, the full history includes: Chief Complaint, HPI, Past Medical History, Family History, Social/Lifestyle/Sexual, and Review of Systems.", "Documentation should 'paint a picture' - any clinician reading the HPI should have a relatively clear picture of why the patient presented.", "The person providing the history is the 'historian.' Consider reliability: a patient historian should be alert, competent, and have intact memory (impaired by medications, substance use, stress, Alzheimer's, or dementia); a non-patient historian (parent, caretaker, translator) should be informed, trustworthy, and reliable."], "source": "SOAP_Notes.pdf"}, {"topic": "Chief Complaint (CC)", "points": ["The CC is the patient's response to questions like 'So..., what brings you in today?' Even if the CC is on the intake form, confirm the problem and ask the patient to reiterate it for accuracy. When possible, directly quote the patient's own words (e.g., 'it feels like there is a brick resting on my right upper back and shoulder area').", "If a caregiver provides the CC (children or patients unable to respond), document the source of the information (e.g., 'Caregiver (Niece, Doris Jones) reports...')."], "source": "SOAP_Notes.pdf"}, {"topic": "HPI definition and LOPQRST", "points": ["The HPI is 'a complete, clear, chronologic description of the problem(s) prompting the patient's visit.'", "LOPQRST = 'The How.' L: Location; O: Onset of complaint; P: Prior, Palliative, Provocative, Progression; Q: Quality of pain; R: Radiation; S: Severity; T: Timing. The expanded summary is LOPPPPQRST (priors, palliative, provocative, progression).", "Location: ask where and have the patient point to the area (patients may use incorrect anatomical vocabulary). Onset: when it started (day/week/month/year, time) and mode of injury. Progression: since it started, improved, worsened, or stayed the same.", "Prior: first time or not; if not, first occurrence, frequency, duration, prior treatments, other doctors seen. Palliative: what has helped and what was most helpful. Provocative: what makes it worse (position, movement, medications, foods, modalities, surgeries, time).", "Quality: describe the symptom - pain (sharp/dull/achy/burning; throbbing/pounding/pulsating), paresthesias (numbness/tingling/pins & needles), weakness, fatigue, dizziness.", "Radiation = the symptom travels from its point of origin; Referral = the symptom is located in a different place than its actual cause.", "Severity: 0-10 Numeric/Visual Analogue Scale (at onset, current, best, worst). Mild = doesn't interfere with ADLs; Moderate = starting to interfere; Severe = severely restricting ADLs. Timing/Temporal: constant or intermittent; if intermittent, note frequency and duration of episodes."], "source": "SOAP_Notes.pdf"}, {"topic": "Narrative, abbreviations, and other subjective components", "points": ["A narrative is the patient's history written in paragraph form (not bullet points), logically composed and coherent. Medical abbreviations may be used in SOAP notes or narratives for efficiency.", "Bates' basic HPI template: opening statement (CC in clinical context), elaborate description of the CC, accompanying symptomatology, absent pertinent symptomatology, pertinent PMH/FH/social history, and a concluding statement of how the patient got to the care site.", "Other subjective components beyond the HPI include allergies, PMH (chronic conditions, trauma, hospitalizations), FHx, SHx (surgical), SoHx (social), sexual history, immunizations, and review of systems."], "source": "SOAP_Notes.pdf"}, {"topic": "Past Medical History components and FAOMASH", "points": ["PMH components on the slides: chronic conditions, allergies, hospitalizations, trauma, medications, FHx (family history), SHx (surgical history), SoHx (social history), sexual history, and review of systems.", "The slides DO spell out FAOMASH: F = Family history, A = Allergies, O = Other illness (chronic conditions) and/or other doctors/specialists seen (not necessarily related to the CC), M = Medications, A = Accidents, S = Surgeries, H = Hospitalizations."], "source": "PastMedicalHistory.pdf"}, {"topic": "Family history, allergies, chronic illness, medications", "points": ["Family history focuses on immediate family (age and health status of parents, siblings, children; grandparents if known); if deceased, ask the cause of death. Major focus: does anyone have diabetes, heart disease, strokes, cancer, arthritis, or other conditions.", "Allergy status should be confirmed for each patient at each visit, and for certain before prescribing any medication; categories include medications, latex, environment, and foods; if allergic, ask the type of reaction (hives, swelling, airway obstruction).", "Other chronic illnesses to ask about: hypertension, diabetes, heart disease, COPD, peripheral artery disease, thyroid disorders, GI disorders, mental health conditions, orthopedic conditions, cancer. For medications ask: what is taken, why, dosage (amount and frequency), and how long; list immunizations with date and reaction (or document 'per patient recall')."], "source": "PastMedicalHistory.pdf"}, {"topic": "Accidents, surgeries, hospitalizations", "points": ["Accidents: when they occurred, how they happened, the injuries, whether medical care was given, and whether injuries healed or are ongoing. Surgeries: which procedure, when, the reason, results, and complications.", "Hospitalizations: when, why (reason/discharge diagnosis), duration, treatment received (procedures/tests/specialty consults), and residual problems. Hospitalizations and surgeries are NOT synonymous - you cannot ask one to cover both."], "source": "PastMedicalHistory.pdf"}, {"topic": "ROS - Purpose", "source": "ReviewOfSystems.pdf", "points": ["The Review of Systems is a discussion of the various body organ systems that may uncover problems not already mentioned, or pertinent negatives that support your diagnosis or help streamline your differential diagnoses.", "Patients often leave out pertinent facts of their history because they do not realize the connection to a problem; the ROS reveals the presence or absence of common symptoms of major body systems.", "The ROS reviews the patient history in another format by asking 'head to toe' related questions."]}, {"topic": "ROS - Format", "source": "ReviewOfSystems.pdf", "points": ["It is acceptable to use closed-ended 'yes or no' questions in the ROS.", "Questions vary based on the patient's age, complaints, and general state of health, using your clinical judgement.", "ROS questions can be asked during the physical exam of that body area (e.g., GI questions during the abdominal exam, musculoskeletal questions during the spine exam).", "You may uncover major health events during the ROS that should be added to the History of Present Illness or Past Medical History."]}, {"topic": "ROS - Systems list", "source": "ReviewOfSystems.pdf", "points": ["Systems addressed: Constitutional/General, Skin, HEENT (Head, Eyes, Ears, Nose/Sinuses, Mouth/Throat, Neck), Cardiovascular, Respiratory, Gastrointestinal, Genitourinary, Musculoskeletal, Neurologic, Psychiatric, Endocrine, and Hematologic/Lymphatic.", "Stay organized and move through your list in an organized fashion; generally, working top down is helpful."]}, {"topic": "ROS - Skin ABCDE", "source": "ReviewOfSystems.pdf", "points": ["For skin lesions/moles, use ABCDE: Asymmetry, Borders, Color, Diameter, Evolving (is the lesion changing?).", "Skin screening also covers rashes, lumps, sores, itching, dryness, color change (cyanosis, rubor, jaundice), and changes in hair or nails (cracking, spooning, clubbing)."]}, {"topic": "ROS - Assessment / clinical reasoning", "source": "ReviewOfSystems.pdf", "points": ["After the history and physical, assessment is where you analyze the data and move from description and observation to analysis and interpretation.", "Bates' steps for identifying problems: identify abnormal findings, localize them anatomically, cluster the clinical findings, search for the probable cause, generate hypotheses, then test them to establish a working diagnosis."]}, {"topic": "Therapeutic Qualities", "source": "Communication_Empathy.pdf", "points": ["Borrowed from psychologist Carl Rogers, three therapeutic qualities observed in practitioners with good clinical outcomes are Respect, Genuineness, and Empathy.", "Respect means accepting your patient as they are, not judging, and separating your personal feelings; Genuineness means being yourself and acknowledging your position as a student or lack of knowledge (e.g., referring out)."]}, {"topic": "Empathy vs Sympathy", "source": "Communication_Empathy.pdf", "points": ["Empathy is the ability to understand and share the feelings of another - putting yourself in the other person's shoes - and is compared/contrasted with sympathy.", "Brene Brown: 'Rarely does a response make something better. What makes something better is a connection.'"]}, {"topic": "4 Qualities of Empathy", "source": "Communication_Empathy.pdf", "points": ["The four qualities of empathy are: Perspective Taking (validate the other's experience; their perspective is their truth), Staying out of Judgement, Recognizing the emotion in the other person, and Communicating the emotion back ('I hear you; I see you; I get it')."]}, {"topic": "Empathy improves outcomes", "source": "Communication_Empathy.pdf", "points": ["Patients who received emotional support/education after surgery or MI had fewer complications and were discharged about 2 days earlier than those who did not.", "More empathetic/sympathetic practitioners have more satisfied patients, and satisfied patients are more likely to comply; an 8-hour communication training program improved care without lengthening visits."]}, {"topic": "Levels of Empathic Response", "source": "Communication_Empathy.pdf", "points": ["Coulehan's levels of response: positive levels are Interchangeable (accurately recognize and assess feelings/symptoms the patient expresses) and Additive (recognize both what the patient expresses and what they feel but do not express).", "Negative levels are Ignoring (not responding to the cognitive or emotional content) and Minimizing (responding at a lesser level than the patient's expressed concern)."]}, {"topic": "Efficiency & Empathy", "source": "Communication_Empathy.pdf", "points": ["As many as three quarters of all diagnoses can be made by history alone.", "A delicate balance of Efficiency, Empathy, and Efficacy: gather enough information in a timely manner, validate the patient's experience, and arrive at a conclusion so the patient leaves satisfied."]}, {"topic": "Culture & Intersectionality", "source": "CulturalCompetence_Humility.pdf", "points": ["Culture is the customary beliefs, social forms, and material traits of a racial, religious, or social group, plus shared attitudes, values, goals, and practices; it is affected by politics, class, gender, religion, age, and ethnicity.", "Intersectionality describes how race, class, gender, and other characteristics intersect and overlap, creating unique sets of experiences; understanding it helps you understand your patient's experience better."]}, {"topic": "Cultural Competence vs Humility", "source": "CulturalCompetence_Humility.pdf", "points": ["Cultural competence (Bates) is a set of attitudes, skills, behaviors, and policies that enable organizations and staff to work effectively in cross-cultural situations; it means being respectful and responsive to the health beliefs, practices, and cultural/linguistic needs of diverse populations.", "Cultural humility (Bates) is a process requiring humility as individuals continually engage in self-reflection and self-critique as lifelong learners and reflective practitioners - 'the more you know about a particular culture, the more you realize you don't know.'"]}, {"topic": "Cultural Humility requirements", "source": "CulturalCompetence_Humility.pdf", "points": ["Cultural humility requires respect, acknowledging both differences and similarities, dynamic communication, and honest self-assessment; it commits to self-evaluation, fixing power imbalances, and developing partnerships/advocating for others.", "The problem with 'competence' is that it suggests culture can be reduced to a technical skill and results in lists of 'do's and don'ts' for treating patients of a given ethnic background."]}, {"topic": "Cross-Cultural Approach & Goals", "source": "CulturalCompetence_Humility.pdf", "points": ["A 'Cross Cultural Approach' uses communication skills, awareness of cross-cutting cultural and social issues, and recognizing health beliefs as universal human beliefs, needs, and traits.", "The Golden Rule: treat patients as we would want to be treated during periods of vulnerability and fear; patient centeredness is built on respect, sensitivity, composure, partnership, honesty, curiosity, and tolerance."]}, {"topic": "Why take a sexual history", "source": "Fenway_SexualHx.pdf", "points": ["Sexual health history is an important part of a routine medical exam for ALL patients, regardless of gender identity or sexual orientation.", "Sexual health is integral to general health; it is associated with happiness, well-being, and longevity, and may indicate psychiatric or other medical disorders or the need for primary prevention (immunizations, contraception, PEP, PrEP)."]}, {"topic": "Sex vs Gender / SO vs GI", "source": "Fenway_SexualHx.pdf", "points": ["Sex refers to biological differences (anatomy, chromosomes, hormones, genes); gender refers to social and cultural distinctions (gender identity, expression, roles).", "Sexual orientation and gender identity are NOT the same; all people have both, and how people identify can change."]}, {"topic": "Establishing the relationship", "source": "Fenway_SexualHx.pdf", "points": ["Establish rapport with effective listening and mirroring (names, pronouns, body parts), an individualized/holistic approach, and by asking permission: ask if it is ok to discuss a sexual history and be transparent about why you are asking.", "Start all appointments with clothes ON, and approach trauma experiences slowly and at a time when support can be offered."]}, {"topic": "Non-judgmental, patient-centered language", "source": "Fenway_SexualHx.pdf", "points": ["Take an anatomic inventory and establish which words you and the patient will use: 'When referring to your genitals, are there specific terms that you use?'", "Use open-ended questions to capture diverse sexual behaviors, validate all practices by asking about both high and low risk activities (and pleasures), and avoid assumptions about what kinds of sex someone has."]}, {"topic": "CDC 5 Ps and the 8 Ps", "source": "Fenway_SexualHx.pdf", "points": ["The CDC's 5 P's of the sexual history are: Partners, Practices, Protection for STDs, Past history of STDs, and Prevention of pregnancy.", "Fenway expands these to 8 P's: Preferences, Partners, Practices, Protection for STIs, Past history of STIs, Pregnancy, Pleasure, and Partner Violence."]}, {"topic": "Trauma-informed care", "source": "Fenway_SexualHx.pdf", "points": ["Any exam or procedure has the potential to be traumatizing; before the exam, review prior experiences, explain the purpose, offer to talk through the steps, and remind the patient 'You're in control here. If you want me to stop at any point, please let me know.'", "Responding to disclosure: Listen and communicate belief ('That must have been frightening'), validate the decision to disclose, emphasize that violence is unacceptable, be clear the patient is not to blame ('What happened is not your fault'), and make a safety plan / provide resources."]}, {"topic": "Ask everyone / reduce stigma", "source": "Fenway_SexualHx.pdf", "points": ["Ask ALL people and make it policy - asking everyone normalizes the questions; nearly 80% of providers believed patients would refuse to disclose orientation, but only about 10% of patients said they would refuse.", "Everyone has activities they find 'icky'; we cannot eliminate our bias by pretending not to have any - the guidance is to 'find your Yucks and fix your face.'"]}];
// group topics into sections by keyword
var SECTIONS=[
 {id:"interview",icon:"&#129309;",name:"Interview & Communication",kw:["interview","empath","sympath","therapeutic","non-verbal","efficiency","levels of"]},
 {id:"cultural",icon:"&#127757;",name:"Cultural Competence & Humility",kw:["cultur","intersection","cross-cultural"]},
 {id:"soap",icon:"&#128221;",name:"SOAP & Documentation",kw:["soap","narrative","abbreviation","components of a history"]},
 {id:"history",icon:"&#129658;",name:"History Components (CC, HPI, PMH)",kw:["chief complaint","hpi","lopqrst","past medical","faomash","family history","allergies","accidents","surgeries","hospital"]},
 {id:"ros",icon:"&#129658;",name:"Review of Systems",kw:["ros","review of systems","skin abcde"]},
 {id:"sexual",icon:"&#9877;",name:"Sexual & Social History",kw:["sexual","social","gender","5 ps","8 ps","trauma","stigma","non-judgmental","relationship"]}
];
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function boldMn(s){return esc(s).replace(/\b(LOPQRST|FAOMASH|SOAP|HPI|CC|PMH|ROS|ABCDE|5 Ps|8 Ps)\b/g,'<span class="mn">$1</span>');}
function sectionFor(topic){
  var t=(topic||'').toLowerCase();
  for(var i=0;i<SECTIONS.length;i++){ if(SECTIONS[i].kw.some(function(k){return t.indexOf(k)>=0;})) return SECTIONS[i].id; }
  return "history";
}
var bySec={};SECTIONS.forEach(function(s){bySec[s.id]=[];});
CRAM.forEach(function(c){bySec[sectionFor(c.topic)].push(c);});
var toc=document.getElementById('toc'), secWrap=document.getElementById('sections');
SECTIONS.forEach(function(s){
  var items=bySec[s.id]; if(!items.length)return;
  toc.innerHTML+='<a href="#'+s.id+'">'+s.icon+' '+esc(s.name.split(' ')[0])+'</a>';
  var h='<section id="'+s.id+'"><div class="sh"><h2>'+s.icon+' '+esc(s.name)+'</h2></div>';
  items.forEach(function(c){
    h+='<h3>'+boldMn(c.topic)+(c.source?(' <span class="src">'+esc(c.source)+'</span>'):'')+'</h3><ul>';
    (c.points||[]).forEach(function(p){h+='<li>'+boldMn(p)+'</li>';});
    h+='</ul>';
  });
  h+='</section>'; secWrap.innerHTML+=h;
});
</script>
